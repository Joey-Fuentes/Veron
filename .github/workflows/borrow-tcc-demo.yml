name: borrow-tcc-demo

# SPIKE (invariants suspended). Re-cut of Part A on the NON-DEBUG path.
#
# The previous cut built an aarch64 M2-Planet with --debug + blood-elf + the
# debug ELF header and it segfaulted instantly under qemu-user (that debug
# layout is only ever run on real aarch64 upstream, never under qemu-user).
# This cut uses the plain ELF header / no debug — the exact shape that ran
# green in borrow-m2.
#
#   GATE  : a real program (functions + multiply + loop) compiles for aarch64
#           and runs under QEMU -> exit 55. Uses the known-good non-debug path.
#   BONUS : self-host M2-Planet on aarch64 (non-debug), run under QEMU, and
#           byte-compare its output vs the host build. Reported, NON-gating —
#           so a green "real program on aarch64" never depends on whether the
#           big self-host binary survives qemu-user.
#
# Part B (reach tcc via Mes) is deferred: the probe showed Mes stops needing
# a generated include/mes/config.h + version/preprocessing scaffolding, i.e.
# live-bootstrap's mes-step driver. That's the heavier follow-on, out of scope
# for this quick tracer. Upstreams fetched as build deps, not vendored.

on:
  push:
    paths:
      - 'spikes/borrow-tcc/**'
      - '.github/workflows/borrow-tcc-demo.yml'
  workflow_dispatch:

concurrency:
  group: borrow-tcc-demo-${{ github.ref }}
  cancel-in-progress: true

jobs:
  sample-aarch64:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - name: Install QEMU (aarch64) + build basics
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends qemu-user gcc make git

      - name: Fetch upstream build deps
        run: |
          git clone --recursive --depth 1 https://github.com/oriansj/M2-Planet.git upstream-m2planet
          git clone --recursive --depth 1 https://github.com/oriansj/mescc-tools.git upstream-mescc

      - name: Build host tools (M2-Planet, M1, hex2)
        run: |
          make -C upstream-m2planet M2-Planet
          make -C upstream-mescc M1 hex2

      - name: GATE — real program on aarch64 (non-debug path)
        run: |
          set -ex
          ROOT="$GITHUB_WORKSPACE"
          M2P="$ROOT/upstream-m2planet/bin/M2-Planet"
          M1="$ROOT/upstream-mescc/bin/M1"
          HEX2="$ROOT/upstream-mescc/bin/hex2"
          LIB="$ROOT/upstream-m2planet/M2libc/aarch64"

          cat > "$ROOT/prog.c" <<'EOF'
          int sq(int x)
          {
          	return x * x;
          }
          int main()
          {
          	int s;
          	int i;
          	s = 0;
          	i = 1;
          	while(i < 6)
          	{
          		s = s + sq(i);
          		i = i + 1;
          	}
          	return s;
          }
          EOF

          "$M2P" --architecture aarch64 -f "$ROOT/prog.c" -o "$ROOT/prog.M1"
          "$M1" -f "$LIB/aarch64_defs.M1" -f "$LIB/libc-core.M1" -f "$ROOT/prog.M1" \
                --little-endian --architecture aarch64 -o "$ROOT/prog.hex2"
          "$HEX2" -f "$LIB/ELF-aarch64.hex2" -f "$ROOT/prog.hex2" \
                --little-endian --architecture aarch64 --base-address 0x400000 -o "$ROOT/prog.elf"

          set +e; qemu-aarch64 "$ROOT/prog.elf"; prc=$?; set -e
          echo "real-program exit: $prc (expect 55)"
          echo "prc=$prc" > "$ROOT/gate.env"
          [ "$prc" = 55 ]

      - name: BONUS — self-host M2-Planet on aarch64 (non-debug, non-gating)
        continue-on-error: true
        run: |
          set -x
          ROOT="$GITHUB_WORKSPACE"
          M1="$ROOT/upstream-mescc/bin/M1"
          HEX2="$ROOT/upstream-mescc/bin/hex2"
          cd "$ROOT/upstream-m2planet"

          # Build aarch64 M2-Planet WITHOUT --debug / blood-elf, plain ELF header.
          ./bin/M2-Planet \
            --architecture aarch64 \
            -f M2libc/aarch64/linux/bootstrap.c -f M2libc/bootstrap.c \
            -f cc.h -f M2libc/bootstrappable.c \
            -f cc_globals.c -f cc_reader.c -f cc_strings.c -f cc_types.c \
            -f cc_emit.c -f cc_core.c -f cc_macro.c -f cc.c \
            --bootstrap-mode \
            -o "$ROOT/cc.M1"
          "$M1" -f M2libc/aarch64/aarch64_defs.M1 -f M2libc/aarch64/libc-core.M1 \
                -f "$ROOT/cc.M1" --little-endian --architecture aarch64 -o "$ROOT/cc.hex2"
          "$HEX2" -f M2libc/aarch64/ELF-aarch64.hex2 -f "$ROOT/cc.hex2" \
                --little-endian --architecture aarch64 --base-address 0x400000 \
                -o "$ROOT/M2-Planet.aarch64"

          printf 'int main()\n{\n\treturn 42;\n}\n' > "$ROOT/t.c"
          ./bin/M2-Planet --architecture aarch64 -f "$ROOT/t.c" -o "$ROOT/host.M1"

          set +e
          qemu-aarch64 "$ROOT/M2-Planet.aarch64" --architecture aarch64 -f "$ROOT/t.c" -o "$ROOT/self.M1"
          src=$?
          set -e

          selfhost=no
          if [ "$src" = 0 ] && cmp -s "$ROOT/host.M1" "$ROOT/self.M1"; then selfhost=yes; fi
          echo "selfhost=$selfhost" > "$ROOT/bonus.env"
          echo "self-host run exit: $src ; byte-identical: $selfhost"

      - name: Summary
        if: always()
        run: |
          ROOT="$GITHUB_WORKSPACE"
          . "$ROOT/gate.env" 2>/dev/null || prc="?"
          . "$ROOT/bonus.env" 2>/dev/null || selfhost="n/a"
          {
            echo "## borrow-tcc — Part A re-cut (non-debug)"
            echo '```'
            echo "GATE  real program (fns+mul+loop) exit : $prc  (expect 55)"
            echo "BONUS self-host M2-Planet aarch64       : ${selfhost:-n/a}  (byte-identical vs host)"
            echo '```'
            if [ "${selfhost:-no}" = yes ]; then
              echo "Self-host cleared: the debug ELF header was the segfault cause."
            else
              echo "Self-host still not byte-identical/failed under qemu-user — deeper than the header; the GATE proves real aarch64 codegen regardless."
            fi
          } >> "$GITHUB_STEP_SUMMARY"
