name: stage1-as-demo

# SPIKE (invariants suspended). Stage 1 = macro-as: a TWO-PASS NUMERIC LABEL
# RESOLVER, written in stage0-as's OWN language (subroutines + shifts + brk) and
# assembled by stage0-as. It reads assembly with multi-char labels, computes each
# label's assembled position, and emits LABEL-FREE stage0-as assembly with every
# branch/adr reference rewritten to a numeric @<pos> (definitions dropped). This
# RETIRES the single-char pool: label count is bounded only by memory, not the
# 128-entry symtab, so stage 2/3 can grow without a ceiling.
#
#   prog.s1 | stage1 | stage0-as | elf out && ./out
#
# Checks: (1) a multi-char-label program resolved through stage1 + stage0-as is
# BYTE-IDENTICAL to real `as` of the equivalent (numeric refs encode the same
# offsets); (2) it RUNS correctly; (3) an adr+memory program with a multi-char
# DATA label resolves numerically and runs; (4) a program with FAR more labels
# than the old 88-slot pool (200) resolves to label-free numeric output and runs.

on:
  push:
    paths:
      - 'spikes/stage1-as/**'
      - 'spikes/stage0-as/**'
      - 'spikes/elf/**'
      - '.github/workflows/stage1-as-demo.yml'
  workflow_dispatch:

concurrency:
  group: stage1-as-demo-${{ github.ref }}
  cancel-in-progress: true

jobs:
  demo:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends qemu-user binutils-aarch64-linux-gnu
      - name: Build stage0-as + elf, then stage1; resolve, byte-check, run
        run: |
          aarch64-linux-gnu-as -o s0.o spikes/stage0-as/stage0-as.aarch64.s
          aarch64-linux-gnu-ld -static -o stage0-as s0.o
          aarch64-linux-gnu-as -o elf.o spikes/elf/elf.aarch64.s
          aarch64-linux-gnu-ld -static -o elf elf.o
          hex() { od -An -v -tx1 "$1" | tr -d ' \n'; }

          # --- build the stage1 executable (stage1.s0 assembled by stage0-as) ---
          cat spikes/stage1-as/stage1-as.s0 | qemu-aarch64 ./stage0-as | qemu-aarch64 ./elf stage1
          test -x stage1 || { echo "stage1 not built"; exit 1; }

          # --- 1) multi-char labels: resolve -> assemble -> byte-compare vs as ---
          printf 'mov x0 0\nmov x1 5\n:count\nadd x0 x0 1\ncmp x0 x1\nb.ne count\nbl addtwo\nmov x8 93\nsvc\n:addtwo\nadd x0 x0 2\nret\n' > loop.s1
          cat loop.s1 | qemu-aarch64 ./stage1 > loop.resolved
          echo "resolved:"; cat loop.resolved
          cat loop.resolved | qemu-aarch64 ./stage0-as > loop.bin
          printf '.text\n.global _start\n_start:\n\tmov x0,#0\n\tmov x1,#5\ncount:\n\tadd x0,x0,#1\n\tcmp x0,x1\n\tb.ne count\n\tbl addtwo\n\tmov x8,#93\n\tsvc #0\naddtwo:\n\tadd x0,x0,#2\n\tret\n' > loop_ref.s
          aarch64-linux-gnu-as -o loop_ref.o loop_ref.s
          aarch64-linux-gnu-objcopy -O binary --only-section=.text loop_ref.o loop_ref.bin
          loop_ok=no; cmp -s loop.bin loop_ref.bin && loop_ok=yes

          # run it (expect exit 7: loop to 5, addtwo +2)
          cat loop.resolved | qemu-aarch64 ./stage0-as | qemu-aarch64 ./elf loop.elf
          set +e; qemu-aarch64 ./loop.elf; loop_rc=$?; set -e

          # --- 2) adr + memory with a multi-char DATA label (store 9, read back) ---
          printf 'mov x0 9\nadr x1 slot\nmov x2 0\nstrb w0 x1 x2\nmov x0 0\nldrb w0 x1 x2\nmov x8 93\nsvc\n:slot\n.byte 0\n' > mem.s1
          cat mem.s1 | qemu-aarch64 ./stage1 | qemu-aarch64 ./stage0-as | qemu-aarch64 ./elf mem.elf
          set +e; qemu-aarch64 ./mem.elf; mem_rc=$?; set -e

          # --- 3) large input (brk buffers + read loop): ~10KB in, must not truncate ---
          yes 'mov x0 0' | head -1200 > big.s1; printf 'mov x8 93\nsvc\n' >> big.s1
          in_bytes=$(wc -c < big.s1)
          out_bytes=$(cat big.s1 | qemu-aarch64 ./stage1 | wc -c)
          big_ok=no; [ "$out_bytes" -ge $((in_bytes - 200)) ] && big_ok=yes

          # --- 4) NO CEILING: 200 distinct labels (far past the old 88-slot pool) ---
          # A fall-through chain of 200 labels; exit code == 200 iff every label
          # resolved to the right position. The resolved output must be LABEL-FREE
          # (definitions dropped) and use numeric @<pos> references.
          : > res.s1
          echo 'mov x0 0' >> res.s1
          for i in $(seq 0 199); do printf 'b R%04d\n:R%04d\nadd x0 x0 1\n' "$i" "$i" >> res.s1; done
          printf 'mov x8 93\nsvc\n' >> res.s1
          cat res.s1 | qemu-aarch64 ./stage1 > res.resolved
          labelfree=no; grep -q '^:' res.resolved || labelfree=yes
          numeric=no; grep -q 'b @' res.resolved && numeric=yes
          cat res.resolved | qemu-aarch64 ./stage0-as | qemu-aarch64 ./elf res.elf
          set +e; qemu-aarch64 ./res.elf; res_rc=$?; set -e
          pool_ok=no; [ "$res_rc" = 200 ] && [ "$labelfree" = yes ] && [ "$numeric" = yes ] && pool_ok=yes

          echo "loop ours: $(hex loop.bin)"
          echo "loop ref : $(hex loop_ref.bin)"
          {
            echo "## stage1-as — numeric label resolver (pool retired)"
            echo '```'
            echo "resolved == real as (byte-identical) : $loop_ok"
            echo "loop w/ multi-char labels exit       : $loop_rc  (expect 7)"
            echo "adr+mem w/ multi-char data label exit: $mem_rc  (expect 9)"
            echo "large input (~${in_bytes}B) not truncated : $big_ok  (out=${out_bytes}B)"
            echo "200-label program (no pool) exit     : $res_rc  (expect 200, label-free=$labelfree numeric=$numeric)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$loop_ok" = yes ] && [ "$loop_rc" = 7 ] && [ "$mem_rc" = 9 ] && [ "$big_ok" = yes ] && [ "$pool_ok" = yes ]; then
            echo "PASS: stage1 resolves multi-char labels to LABEL-FREE numeric output (byte-identical to as), runs, handles large inputs, and resolves a 200-label program (no pool, no ceiling)."
          else
            echo "FAIL: loop_ok=$loop_ok loop_rc=$loop_rc mem_rc=$mem_rc big_ok=$big_ok res_ok=$pool_ok (res_rc=$res_rc labelfree=$labelfree numeric=$numeric)"
            exit 1
          fi
