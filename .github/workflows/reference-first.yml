name: reference-first

# SPIKE. PHASE 1: PROVE THE REFERENCE, THEN OURS.
#
# Repinned to M2-Planet 1.13.1 (bd2fe4b) + M2libc 68a23cf + mescc-tools 5adfbf3,
# the set stage0-posix pins. See spikes/UPSTREAM-PINS.md.
#
# LESSON APPLIED: this workflow does not hand-write a single -f list. Every one
# of my hand-written lists has been wrong -- most recently against 1.13.1, whose
# M2libc has no bootstrap.c at all. Upstream ships its own self-build recipe at
# test/test1000/hello-aarch64.sh, versioned with the source. We read the list
# out of that file and use it.
#
# Better still: that script already knows how to run its own artifact, gated on
# get_machine. Registering qemu binfmt handlers and setting the documented
# GET_MACHINE_OVERRIDE_ALWAYS_RUN escape hatch makes upstream's own test execute
# the aarch64 binary -- the most authoritative reference check available.
#
# Nothing here exceeds a 120s timeout.

on:
  push:
    paths:
      - '.github/workflows/reference-first.yml'
  workflow_dispatch:

concurrency:
  group: reference-first-${{ github.ref }}
  cancel-in-progress: true

jobs:
  reference:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      M2PLANET_SHA: bd2fe4b0659fd0ad3f476a5ad0ef801bd134665d
      M2LIBC_SHA: 68a23cfd05d5a355ba7a30c770d684cbe86fcc4e
      MESCC_SHA: 5adfbf3
    steps:
      - uses: actions/checkout@v5

      - name: Install toolchain (with binfmt so aarch64 binaries just run)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qemu-user qemu-user-static binfmt-support \
            binutils-aarch64-linux-gnu gcc make
          sudo update-binfmts --display 2>/dev/null | grep -i aarch64 || true

      - name: Fetch upstreams at the pinned set
        run: |
          . tools/ab.sh
          git clone https://github.com/oriansj/M2-Planet.git upstream-m2planet
          git -C upstream-m2planet checkout "$M2PLANET_SHA"
          git -C upstream-m2planet submodule update --init --recursive
          git clone --recursive https://github.com/oriansj/mescc-tools.git upstream-mescc
          git -C upstream-mescc checkout -q "$MESCC_SHA"
          make -C upstream-m2planet M2-Planet
          make -C upstream-mescc M1 hex2 blood-elf get_machine
          echo "  PINS RESOLVED:"
          echo "    M2-Planet   $(git -C upstream-m2planet rev-parse HEAD)"
          echo "    M2libc      $(git -C upstream-m2planet/M2libc rev-parse HEAD)"
          echo "    mescc-tools $(git -C upstream-mescc rev-parse HEAD)"
          echo "  M2-Planet version: $(grep -m2 -A2 '^# 1\.' upstream-m2planet/CHANGELOG.org 2>/dev/null | head -3 | tr '\n' ' ')"
          ab_rule 'HOST ORACLES'
          ab_art 'M2-Planet' upstream-m2planet/bin/M2-Planet
          ab_art 'M1'        upstream-mescc/bin/M1
          ab_art 'hex2'      upstream-mescc/bin/hex2

      - name: 'P1.0 what does THIS M2libc actually contain?'
        run: |
          echo "  --- M2libc top level ---"
          ls -1 upstream-m2planet/M2libc/*.c upstream-m2planet/M2libc/*.h 2>/dev/null | sed 's|.*/|    |'
          echo "  --- M2libc/aarch64 ---"
          ls -1 upstream-m2planet/M2libc/aarch64/ 2>/dev/null | sed 's|^|    |'
          echo "  --- M2libc/aarch64/linux ---"
          ls -1 upstream-m2planet/M2libc/aarch64/linux/ 2>/dev/null | sed 's|^|    |'

      - name: "P1.0b upstream's OWN aarch64 self-build recipe"
        run: |
          S=upstream-m2planet/test/test1000/hello-aarch64.sh
          if [ ! -f "$S" ]; then echo "  MISSING: $S"; ls upstream-m2planet/test/ | head; exit 1; fi
          echo "  --- $S ---"
          sed 's/^/    /' "$S"
          echo
          # Pull the -f list straight out of it. This is the authoritative,
          # version-correct file list; do not hand-write one.
          grep -oE '^[[:space:]]*-f [A-Za-z0-9_./-]+' "$S" | awk '{printf "-f %s ", $2}' > /tmp/flist
          echo "  extracted -f list:"
          tr ' ' '\n' < /tmp/flist | paste - - | sed 's/^/    /'
          echo "  uses --debug: $(grep -c -- '--debug' "$S")"
          echo "  uses blood-elf: $(grep -c 'blood-elf' "$S")"
          echo "  ELF header: $(grep -oE 'ELF-aarch64[A-Za-z-]*\.hex2' "$S" | head -1)"
          echo "  base address: $(grep -oE '0x[0-9A-Fa-f]+' "$S" | tail -1)"

      - name: "P1.1 RUN upstream's own aarch64 test, execution forced on"
        continue-on-error: true
        run: |
          # hello-aarch64.sh gates running its artifact on get_machine; the
          # script itself documents GET_MACHINE_OVERRIDE_ALWAYS_RUN as the
          # escape hatch. With binfmt registered the aarch64 binary executes.
          cd upstream-m2planet
          export PATH="$PWD/bin:$PWD/../upstream-mescc/bin:$PATH"
          export GET_MACHINE_OVERRIDE_ALWAYS_RUN=1
          set +e
          timeout 120 sh test/test1000/hello-aarch64.sh
          echo "  upstream test rc=$?"
          set -e
          ls -l test/results/ 2>/dev/null | sed 's/^/    /' || true

      - name: 'P1.2 build the aarch64 M2-Planet from the EXTRACTED list'
        continue-on-error: true
        run: |
          . tools/ab.sh
          M=upstream-m2planet; L=$M/M2libc; S=upstream-mescc
          FL=$(cat /tmp/flist)
          echo "  using: $FL"
          # paths in the script are relative to the M2-Planet root
          cd $M
          FL2=$(echo "$FL" | sed 's#-f #-f #g')
          set +e
          timeout 120 bin/M2-Planet --architecture aarch64 --bootstrap-mode $FL2 -o ../A.M1
          echo "  compile rc=$?"
          set -e
          cd ..
          ab_art 'A.M1' A.M1
          [ -s A.M1 ] || { echo "  no .M1 -- see the extracted list above"; exit 0; }
          ab_run 'assemble' 120 A.hex2 \
            $S/bin/M1 -f $L/aarch64/aarch64_defs.M1 -f $L/aarch64/libc-core.M1 \
              -f A.M1 --little-endian --architecture aarch64 -o A.hex2
          ab_run 'link' 120 M2-A \
            $S/bin/hex2 -f $L/aarch64/ELF-aarch64.hex2 -f A.hex2 \
              --little-endian --architecture aarch64 --base-address 0x00600000 -o M2-A
          chmod +x M2-A 2>/dev/null || true
          printf 'int main(){return 42;}' > t.c
          ab_run 'RUN it on t.c' 120 A.out \
            qemu-aarch64 ./M2-A --architecture aarch64 --bootstrap-mode -f t.c -o A.out
          $M/bin/M2-Planet --architecture aarch64 --bootstrap-mode -f t.c -o host.out || true
          ab_cmp '  vs host output' A.out host.out

      - name: 'PHASE 1 VERDICT'
        run: |
          echo "  Read P1.0b for upstream's real recipe and P1.1 for whether"
          echo "  upstream's own test passes when its artifact is actually run."
          echo "  P1.2 repeats it with the extracted list and reports the bytes."
