name: elf-proto

# DIAGNOSTIC run. The hand-built ELF exited 1 with no signal; this workflow
# finds out why by (1) running a real ld-linked exit(42) binary to prove QEMU
# works here, (2) running our ELF under `qemu -strace` to see its syscalls,
# and (3) printing `readelf -l` for both so we can diff the program headers.
# Nothing is gated — we want all the output.

on:
  push:
    paths:
      - 'spikes/elf-proto/**'
      - '.github/workflows/elf-proto.yml'
  workflow_dispatch:

concurrency:
  group: elf-proto-${{ github.ref }}
  cancel-in-progress: true

jobs:
  proto:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Install toolchain (qemu-user + aarch64 binutils)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qemu-user binutils-aarch64-linux-gnu

      - name: Reference — real ld-linked exit(42) (proves QEMU works)
        run: |
          printf '.text\n.global _start\n_start:\n\tmov x0, #42\n\tmov x8, #93\n\tsvc #0\n' > ref.s
          aarch64-linux-gnu-as -o ref.o ref.s
          aarch64-linux-gnu-ld -static -o ref.elf ref.o
          echo "=== run reference under qemu ==="
          set +e; qemu-aarch64 ./ref.elf; echo "REF exit: $?"; set -e
          echo "=== reference program headers (known-good) ==="
          readelf -l ref.elf
          echo "=== reference entry ==="
          readelf -h ref.elf | grep -i entry

      - name: Ours — hand-built ELF (strace + headers)
        run: |
          python3 spikes/elf-proto/elf_proto.py
          echo "=== our program headers ==="
          readelf -l a.elf
          echo "=== run ours under qemu -strace (shows guest syscalls) ==="
          set +e
          qemu-aarch64 -strace ./a.elf
          echo "OURS exit: $?"
          set -e
          echo "=== also try plain run, capture any stderr ==="
          set +e
          qemu-aarch64 ./a.elf 2>&1
          echo "OURS(plain) exit: $?"
          set -e
