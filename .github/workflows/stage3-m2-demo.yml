name: stage3-m2-demo

# SPIKE (invariants suspended). THE HANDOFF: our stage-2 compiler builds
# M2-Planet from M2-Planet's own source, and the resulting binary compiles C.
#
#   M2-Planet source --[ stage2 | stage1 | stage0-as | elf ]--> M2-Planet
#   prog.c           --[ that M2-Planet ]--------------------->  prog.M1
#
# This is the node the whole ladder was aimed at: M2-Planet becomes the de-facto
# "stage 3", with no throwaway intermediate compiler. See
# spikes/stage2-mini-c/TARGET-SUBSET.md.
#
# THE ONE SUBSTITUTION, stated plainly: M2libc/aarch64/linux/bootstrap.c is NOT
# passed to our compiler. Its entire content is six functions written in M1
# mnemonics inside asm() -- read, write, open, close, brk, exit -- and our own
# builtins supply all six with matching syscall numbers and argument order (m53
# for five of them, m69 for brk), which is exactly why that file can be dropped
# instead of us embedding an M1 assembler. Every other file of the upstream
# --bootstrap-mode -f list is compiled as-is, unpatched. The -f list itself is
# taken from M2-Planet's own test/test1000/hello-aarch64.sh.
#
# Scope: this demo proves the binary RUNS and emits M1 for real programs. It does
# not yet drive the emitted .M1 through M1/hex2 into an executable -- that is the
# borrow-m2 spike's job, and wiring the two together is the next rung.

on:
  push:
    paths:
      - 'spikes/stage2-mini-c/**'
      - 'spikes/stage1-as/**'
      - 'spikes/stage0-as/**'
      - 'spikes/elf/**'
      - '.github/workflows/stage3-m2-demo.yml'
  workflow_dispatch:

concurrency:
  group: stage3-m2-demo-${{ github.ref }}
  cancel-in-progress: true

jobs:
  demo:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v5

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends qemu-user binutils-aarch64-linux-gnu

      - name: Fetch M2-Planet (pinned) + M2libc submodule
        env:
          M2PLANET_SHA: bd2fe4b0659fd0ad3f476a5ad0ef801bd134665d
        run: |
          git clone https://github.com/oriansj/M2-Planet.git upstream-m2planet
          git -C upstream-m2planet checkout "$M2PLANET_SHA"
          git -C upstream-m2planet submodule update --init --recursive
          echo "M2-Planet pinned at: $(git -C upstream-m2planet rev-parse HEAD)"
          echo "M2libc submodule at: $(git -C upstream-m2planet/M2libc rev-parse HEAD)"

      - name: Build the ladder
        run: |
          aarch64-linux-gnu-as -o s0.o spikes/stage0-as/stage0-as.aarch64.s
          aarch64-linux-gnu-ld -static -o stage0-as s0.o
          aarch64-linux-gnu-as -o elf.o spikes/elf/elf.aarch64.s
          aarch64-linux-gnu-ld -static -o elf elf.o
          cat spikes/stage1-as/stage1-as.s0 | qemu-aarch64 ./stage0-as | qemu-aarch64 ./elf stage1
          cat spikes/stage2-mini-c/stage2-mini-c.s1 | qemu-aarch64 ./stage1 | qemu-aarch64 ./stage0-as | qemu-aarch64 ./elf stage2
          test -x stage2 || { echo "stage2 not built"; exit 1; }

      - name: Build M2-Planet with stage 2
        run: |
          M=upstream-m2planet
          # The upstream --bootstrap-mode -f list, minus the arch bootstrap.c
          # (see the header note). Our "-f" equivalent is concatenated stdin.
          cat \
            $M/M2libc/bootstrap.c \
            $M/M2libc/bootstrappable.c \
            $M/cc.h \
            $M/cc_globals.c \
            $M/cc_reader.c \
            $M/cc_strings.c \
            $M/cc_types.c \
            $M/cc_emit.c \
            $M/cc_core.c \
            $M/cc_macro.c \
            $M/cc.c \
            > m2.c
          echo "translation unit: $(wc -c < m2.c) bytes"
          qemu-aarch64 ./stage2 < m2.c > m2.s1
          echo "stage2 emitted  : $(wc -c < m2.s1) bytes"
          cat m2.s1 | qemu-aarch64 ./stage1 | qemu-aarch64 ./stage0-as | qemu-aarch64 ./elf M2-Planet
          test -x M2-Planet || { echo "M2-Planet not built"; exit 1; }
          echo "M2-Planet binary: $(wc -c < M2-Planet) bytes"

      - name: Compile sample programs with it
        run: |
          ok=yes
          try() {
            printf '%s' "$2" > t.c
            set +e
            qemu-aarch64 ./M2-Planet --architecture aarch64 --bootstrap-mode \
              -f t.c -o t.M1 > out.log 2> err.log
            rc=$?
            set -e
            if [ "$rc" = 0 ] && [ -s t.M1 ]; then
              printf '  [OK ] %-22s %s bytes of M1\n' "$1" "$(wc -c < t.M1)"
            else
              ok=no
              printf '  [XX ] %-22s rc=%s\n' "$1" "$rc"
              head -3 err.log | sed 's/^/         /'
            fi
          }
          try 'arithmetic + locals' 'int main(){int a;a=6;int b;b=7;return a*b;}'
          try 'recursion'           'int fib(int n){if(n<2){return n;}return fib(n-1)+fib(n-2);}int main(){return fib(10);}'
          try 'while loop'          'int main(){int i;int s;i=0;s=0;while(i<10){s=s+i;i=i+1;}return s;}'
          try 'strings + pointers'  'int len(char* p){int n;n=0;while(p[n]){n=n+1;}return n;}int main(){return len("hello");}'
          try 'for + break'         'int main(){int i;int s;s=0;for(i=0;i<9;i=i+1){if(i==5){break;}s=s+i;}return s;}'

          # Show one output in full, so a human can see it is real M1.
          printf '%s' 'int main(){int a;a=6;int b;b=7;return a*b;}' > t.c
          qemu-aarch64 ./M2-Planet --architecture aarch64 --bootstrap-mode -f t.c -o t.M1
          echo "--- t.M1 for 'return a*b' ---"
          cat t.M1

          [ "$ok" = yes ] || { echo "FAIL: a sample program did not compile"; exit 1; }
          echo "PASS: stage2 built M2-Planet from its own source, and that M2-Planet compiled 5 programs to M1."
