name: m2libc-113-bisect

# SPIKE. Our stage 2 at the 1.13.1 pin -- BOTH ARMS, on the same artifact.
#
# THE COMPARISON IS SELF-COMPILATION, not a sample program. Upstream's
# test/test1000/hello-aarch64.sh builds an aarch64 M2-Planet and then has that
# binary compile M2-Planet's ENTIRE source for x86, checking the result against
# a published sha256 in test/test1000/proof.answer. That answer file is the
# gold standard: it is upstream's number, not ours.
#
#   REFERENCE : test1000 builds refM2P, refM2P self-compiles -> proof
#   OURS      : our ladder builds M2-ours, M2-ours self-compiles -> ours_proof
#   GATE      : ours_proof == proof, byte for byte, AND == proof.answer's sha256
#
# The -f list for the proof is never hand-written. It is lifted from the trace
# of upstream's own script, because four reconstructed lists in a row were wrong.
#
# THE SUBSTITUTION (ours arm only). 1.13.1's aarch64/linux/bootstrap.c is the
# WHOLE mini-libc (fgetc fputc fputs fwrite open fopen close fclose brk malloc
# strlen memset calloc free exit) with asm() in only 6 of them, and there is no
# generic bootstrap.c to omit the way m71 did. tools/drop_asm.py cuts at
# FUNCTION granularity; m53/m69 builtins supply open/close/brk/exit; and
# spikes/stage2-mini-c/m2libc-shim.c supplies fgetc/fputc, the two left over.
# Only our stage 2 needs this -- M2-Planet itself compiles asm() fine, so the
# reference arm and the self-compilation input are upstream's source unpatched.
#
# Q1-Q3 (constant lookup, per-file segfault bisect, in-file bisect) have been
# REMOVED. Their findings are recorded in spikes/UPSTREAM-PINS.md -- stage 2
# hangs on M2libc/stdlib.c and segfaults on stdio.c, neither of which is on the
# critical path since the patched bootstrap.c supplies the libc -- and re-deriving
# them cost minutes on every run. Restore from git history if they are needed.

on:
  push:
    paths:
      - 'spikes/stage2-mini-c/**'
      - '.github/workflows/m2libc-113-bisect.yml'
  workflow_dispatch:

concurrency:
  group: m2libc-113-bisect-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bisect:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    env:
      M2PLANET_SHA: bd2fe4b0659fd0ad3f476a5ad0ef801bd134665d
      M2LIBC_SHA: 68a23cfd05d5a355ba7a30c770d684cbe86fcc4e
      MESCC_SHA: 5adfbf3
    steps:
      - uses: actions/checkout@v5
      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qemu-user qemu-user-static binfmt-support \
            binutils-aarch64-linux-gnu gcc make
      - name: Fetch upstreams
        run: |
          git clone https://github.com/oriansj/M2-Planet.git upstream-m2planet
          git -C upstream-m2planet checkout "$M2PLANET_SHA"
          git -C upstream-m2planet submodule update --init --recursive
          git clone --recursive https://github.com/oriansj/mescc-tools.git upstream-mescc
          git -C upstream-mescc checkout -q "$MESCC_SHA"
          make -C upstream-m2planet M2-Planet
          make -C upstream-mescc M1 hex2 blood-elf get_machine
          echo "  PINS: M2-Planet $(git -C upstream-m2planet rev-parse --short HEAD)  M2libc $(git -C upstream-m2planet/M2libc rev-parse --short HEAD)"

      - name: Build the ladder
        run: |
          aarch64-linux-gnu-as -o s0.o spikes/stage0-as/stage0-as.aarch64.s
          aarch64-linux-gnu-ld -static -o stage0-as s0.o
          aarch64-linux-gnu-as -o elf.o spikes/elf/elf.aarch64.s
          aarch64-linux-gnu-ld -static -o elf elf.o
          cat spikes/stage1-as/stage1-as.s0 \
            | qemu-aarch64 ./stage0-as | qemu-aarch64 ./elf stage1
          cat spikes/stage2-mini-c/stage2-mini-c.s1 \
            | qemu-aarch64 ./stage1 | qemu-aarch64 ./stage0-as | qemu-aarch64 ./elf stage2
          echo "  LADDER BUILT FROM:"
          printf '    %-26s %8s  %s\n' stage2-mini-c.s1 \
            "$(wc -c < spikes/stage2-mini-c/stage2-mini-c.s1)" \
            "$(sha256sum spikes/stage2-mini-c/stage2-mini-c.s1 | cut -c1-16)"
          printf '    %-26s %8s  %s\n' stage1-as.s0 \
            "$(wc -c < spikes/stage1-as/stage1-as.s0)" \
            "$(sha256sum spikes/stage1-as/stage1-as.s0 | cut -c1-16)"
          printf '    %-26s %8s\n' 'stage2 binary' "$(wc -c < stage2)"

      - name: 'REFERENCE: upstream test1000 builds the aarch64 M2-Planet'
        run: |
          . tools/ab.sh
          cd upstream-m2planet
          export PATH="$PWD/bin:$PWD/../upstream-mescc/bin:$PATH"
          export GET_MACHINE_OVERRIDE_ALWAYS_RUN=1
          # Run THEIR script and keep what it makes. Capture the trace: the
          # proof invocation in it is the -f list we must not hand-write.
          set +e
          timeout 600 sh test/test1000/hello-aarch64.sh > "$GITHUB_WORKSPACE/test1000.log" 2>&1
          rc=$?
          set -e
          tail -25 "$GITHUB_WORKSPACE/test1000.log" | sed 's/^/    /'
          [ "$rc" = 0 ] || { echo "REFERENCE FAILED rc=$rc"; exit 1; }
          cd ..
          cp upstream-m2planet/test/results/test1000-aarch64-binary refM2P
          chmod +x refM2P
          ab_rule 'REFERENCE aarch64 M2-Planet (verified by upstream sha256)'
          ab_art 'refM2P'                 refM2P
          ab_art 'proof (its self-compile)' upstream-m2planet/test/test1000/proof

      - name: 'OURS: patch only the asm() functions, build M2-Planet with our ladder'
        continue-on-error: true
        run: |
          . tools/ab.sh
          M=upstream-m2planet; L=$M/M2libc
          # m71 omitted a whole file. At 1.13.1 that file is the entire
          # mini-libc, so omit at FUNCTION granularity instead: drop the
          # asm()-bodied syscall wrappers our m53/m69 builtins already supply,
          # compile every other function unpatched.
          echo "  what drop_asm removes from aarch64/linux/bootstrap.c:"
          python3 tools/drop_asm.py --list $L/aarch64/linux/bootstrap.c | sed 's/^/    /'
          python3 tools/drop_asm.py $L/aarch64/linux/bootstrap.c > patched_bootstrap.c
          ab_rule 'THE SUBSTITUTION'
          ab_art 'bootstrap.c (upstream)' $L/aarch64/linux/bootstrap.c
          ab_art 'bootstrap.c (patched)'  patched_bootstrap.c
          echo "    asm() blocks remaining: $(grep -c 'asm(' patched_bootstrap.c)"

          # upstream's own 1.13.1 -f list, with only that one file patched
          # The shim supplies fgetc/fputc, the only two dropped functions our
          # builtins do not already cover -- open/close come from m53, brk from
          # m69, exit from m53. It goes AFTER the patched bootstrap.c so that
          # file's enums (NULL EOF TRUE FALSE stdin/stdout/stderr EXIT_*) are in
          # scope, and before M2-Planet's own sources.
          cat patched_bootstrap.c spikes/stage2-mini-c/m2libc-shim.c \
              $L/bootstrappable.c \
              $M/cc.h $M/cc_globals.c $M/cc_reader.c $M/cc_strings.c \
              $M/cc_types.c $M/cc_emit.c $M/cc_core.c $M/cc_macro.c $M/cc.c > m2.c
          ab_art 'm2libc-shim.c' spikes/stage2-mini-c/m2libc-shim.c
          ab_art 'm2.c (our translation unit)' m2.c
          set +e
          timeout 300 qemu-aarch64 ./stage2 < m2.c > m2.s1
          echo "  stage2 rc=$? emitted=$(wc -c < m2.s1) bytes"
          set -e
          { grep -oE '^adr x[0-9]+ [A-Za-z_][A-Za-z0-9_]*$' m2.s1 | awk '{print $3}'
            grep -oE '^bl [A-Za-z_][A-Za-z0-9_]*$' m2.s1 | awk '{print $2}'; } | sort -u > /tmp/r
          grep -oE '^:[A-Za-z_][A-Za-z0-9_]*$' m2.s1 | sed 's/^://' | sort -u > /tmp/d
          echo "  unresolved: $(comm -23 /tmp/r /tmp/d | tr '\n' ' ' | sed 's/^ *$/NONE/')"
          [ -s m2.s1 ] || exit 0
          cat m2.s1 | qemu-aarch64 ./stage1 | qemu-aarch64 ./stage0-as \
            | qemu-aarch64 ./elf M2-ours 2>/dev/null || true
          chmod +x M2-ours 2>/dev/null || true
          ab_art 'M2-Planet (ours)' M2-ours
      - name: 'SELF-COMPILE: both compilers build M2-Planet from its own source'
        run: |
          . tools/ab.sh
          ROOT="$PWD"
          echo 'fail' > selfcompile.status
          [ -s M2-ours ] || { echo "our arm produced no M2-Planet -- see OURS above."; exit 0; }

          # Lift the proof invocation verbatim from upstream's own trace.
          CMD=$(grep -m1 -- '--architecture x86' test1000.log | sed 's/^+ *//')
          [ -n "$CMD" ] || { echo "no proof invocation in test1000.log"; exit 0; }
          ARGS=${CMD#*test1000-aarch64-binary }
          printf '%s\n' "$ARGS" > proof.args
          printf '%s\n' $ARGS | awk '$0=="-f"{getline; print}' > proof.files
          echo "  upstream's -f list: $(wc -l < proof.files) files, reused verbatim"

          cd upstream-m2planet
          OURS_ARGS=$(sed 's|-o test/test1000/proof|-o ours_proof|' "$ROOT/proof.args")
          ab_rule 'SELF-COMPILATION: M2-Planet compiles its own entire source'
          ab_run 'ours self-compiles' 900 ours_proof \
            qemu-aarch64 "$ROOT/M2-ours" $OURS_ARGS
          ab_art 'reference proof' test/test1000/proof
          ab_art 'ours_proof'      ours_proof
          ab_cmp '  ours vs reference' ours_proof test/test1000/proof
          [ -s ours_proof ] && echo 'ok' > "$ROOT/selfcompile.status"
          exit 0

      - name: 'DIAGNOSE: why the self-compile crashed, or why its output differs'
        continue-on-error: true
        run: |
          . tools/ab.sh
          ROOT="$PWD"
          if [ "$(cat selfcompile.status 2>/dev/null)" = ok ]; then
            # It produced output. If that output is WRONG, that needs its own
            # diagnosis -- a crash and a byte-diff are different problems.
            cd upstream-m2planet
            if cmp -s ours_proof test/test1000/proof; then
              echo "  self-compile matched the reference; nothing to diagnose."
              exit 0
            fi
            echo "  === OUTPUT DIFFERS -- where and how ==="
            printf '    ours %s bytes, reference %s bytes (ours is %s shorter)\n' \
              "$(wc -c < ours_proof)" "$(wc -c < test/test1000/proof)" \
              "$(( $(wc -c < test/test1000/proof) - $(wc -c < ours_proof) ))"
            printf '    lines: ours %s, reference %s\n' \
              "$(wc -l < ours_proof)" "$(wc -l < test/test1000/proof)"
            FIRST=$(cmp ours_proof test/test1000/proof 2>&1 | grep -oE 'line [0-9]+' | head -1 | cut -d' ' -f2)
            echo "    first difference at line ${FIRST:-?}"
            echo
            echo "    --- reference, lines $((FIRST-8))..$((FIRST+8)) ---"
            sed -n "$((FIRST-8)),$((FIRST+8))p" test/test1000/proof | sed 's/^/      /'
            echo "    --- ours, same range ---"
            sed -n "$((FIRST-8)),$((FIRST+8))p" ours_proof | sed 's/^/      /'
            echo
            echo "    --- how many lines differ in total ---"
            diff <(cat ours_proof) <(cat test/test1000/proof) > /tmp/pd.diff 2>&1 || true
            echo "      diff hunks : $(grep -c '^[0-9]' /tmp/pd.diff || echo 0)"
            echo "      only in ref: $(grep -c '^>' /tmp/pd.diff || echo 0) lines"
            echo "      only in ours: $(grep -c '^<' /tmp/pd.diff || echo 0) lines"
            echo
            echo "    --- the 20 most common lines present ONLY in the reference ---"
            grep '^>' /tmp/pd.diff | sed 's/^> //' | sort | uniq -c | sort -rn | head -20 | sed 's/^/      /'
            echo "    --- the 20 most common lines present ONLY in ours ---"
            grep '^<' /tmp/pd.diff | sed 's/^< //' | sort | uniq -c | sort -rn | head -20 | sed 's/^/      /'
            echo
            echo "    --- which emitted FUNCTION does the first difference fall in? ---"
            head -n "$FIRST" test/test1000/proof | grep -E '^:FUNCTION_' | tail -1 | sed 's/^/      /'
            echo
            echo "    --- X86 CANARY: do they differ on a TINY x86 input? ---"
            # The existing canary is aarch64-only; the divergence is x86 codegen.
            cd "$ROOT"
            printf 'struct T{int a; int b; int c;};\nint f(struct T* p){return p->c;}\nint main(){struct T* q; q=0; return f(q);}\n' > x86c.c
            for A in x86 aarch64; do
              qemu-aarch64 ./M2-ours --architecture $A --bootstrap-mode -f x86c.c -o o.$A.M1 2>/dev/null || true
              upstream-m2planet/bin/M2-Planet --architecture $A --bootstrap-mode -f x86c.c -o h.$A.M1 2>/dev/null || true
              if cmp -s o.$A.M1 h.$A.M1; then
                printf '      %-8s IDENTICAL (%s bytes)\n' "$A" "$(wc -c < o.$A.M1)"
              else
                printf '      %-8s DIFFER  ours=%s host=%s\n' "$A" \
                  "$(wc -c < o.$A.M1)" "$(wc -c < h.$A.M1)"
                echo "        --- first differing lines ---"
                diff o.$A.M1 h.$A.M1 | head -12 | sed 's/^/          /'
              fi
            done
            cd upstream-m2planet
            echo
            echo "    --- upstream 1.13.1 source of the emitters that differ ---"
            # The diff is a codegen CHOICE, so print the branch that makes it.
            for fn in write_add_immediate write_load_immediate emit_add_immediate; do
              echo "      ===== $fn ====="
              awk "/^[a-z].*[ *]$fn\\(/,/^}\$/" cc_emit.c | head -46 | sed 's/^/        /'
            done
            exit 0
          fi
          [ -s M2-ours ] || { echo "  no M2-ours to diagnose."; exit 0; }
          M=upstream-m2planet

          # ---- 1. CANARY: is M2-ours broken outright, or only at scale? ------
          ab_rule 'CANARY: a small input through both compilers'
          printf 'int main(){int i;int s;s=0;for(i=1;i<10;i=i+1){s=s+i;}return s;}' > c.c
          ab_run 'ours  compiles c.c' 120 ours.M1 \
            qemu-aarch64 ./M2-ours --architecture aarch64 --bootstrap-mode -f c.c -o ours.M1
          ab_run 'host  compiles c.c' 120 host.M1 \
            $M/bin/M2-Planet --architecture aarch64 --bootstrap-mode -f c.c -o host.M1
          ab_cmp '  ours vs host' ours.M1 host.M1

          # ---- 2. HOW FAR DID IT GET? syscalls are cheap and bounded --------
          echo
          echo "  --- last syscalls before the fault (full proof input) ---"
          cd $M
          OURS_ARGS=$(sed 's|-o test/test1000/proof|-o strace_out|' "$ROOT/proof.args")
          set +e
          timeout 300 qemu-aarch64 -strace "$ROOT/M2-ours" $OURS_ARGS \
            > /dev/null 2> "$ROOT/strace.log"
          set -e
          cd "$ROOT"
          echo "    opens seen : $(grep -c 'open' strace.log || true)"
          echo "    writes seen: $(grep -c 'write(' strace.log || true)"
          tail -12 strace.log | sed 's/^/    /'

          # ---- 3. SMALLEST FAULTING PREFIX of upstream's -f list ------------
          echo
          echo "  --- bisecting upstream's -f list for the smallest faulting prefix ---"
          N=$(wc -l < proof.files)
          faults() {   # faults <n>  -> 0 if that prefix segfaults
            pre=''
            for f in $(head -n "$1" proof.files); do pre="$pre -f $M/$f"; done
            set +e
            timeout 200 qemu-aarch64 ./M2-ours --architecture x86 $pre -o /tmp/b.M1 \
              >/dev/null 2>&1
            r=$?
            set -e
            [ "$r" -ge 128 ]        # any fatal signal: 139 SEGV, 132 SIGILL, ...
          }
          if ! faults "$N"; then
            echo "    full list does not fault in isolation -- not reproducible here."
          else
            lo=1; hi=$N
            while [ "$lo" -lt "$hi" ]; do
              mid=$(( (lo + hi) / 2 ))
              if faults "$mid"; then hi=$mid; else lo=$(( mid + 1 )); fi
              echo "    ... narrowed to $lo..$hi"
            done
            echo "    SMALLEST FAULTING PREFIX: $lo file(s)"
            head -n "$lo" proof.files | sed 's/^/      /'
            echo "$lo" > minfault.n
          fi

          # ---- 4. MAP THE FAULT PC through our own label map ----------------
          echo
          echo "  --- faulting PC, mapped through m2.s1 (tools/pcmap.py) ---"
          pre=''
          if [ -s minfault.n ]; then
            NF=$(cat minfault.n)
          else
            echo "    no minimal prefix; tracing the FULL input instead"
            NF=$(wc -l < proof.files)
          fi
          for f in $(head -n "$NF" proof.files); do pre="$pre -f $M/$f"; done
          set +e
          timeout 300 qemu-aarch64 -d cpu -D fault.log ./M2-ours \
            --architecture x86 $pre -o /tmp/b.M1 >/dev/null 2>&1
          set -e
          echo "    trace size: $(du -h fault.log 2>/dev/null | cut -f1)"
          PC=$(grep -o 'PC=[0-9a-f]\{8,\}' fault.log | tail -1 | cut -d= -f2)
          LR=$(grep -o 'X30=[0-9a-f]\{8,\}' fault.log | tail -1 | cut -d= -f2)
          echo "    PC=0x$PC  X30=0x$LR"
          # The value stack x9 is based at brk(0), i.e. just ABOVE the image. If
          # x9 has UNDERFLOWED it points INTO the code, and `str x0 x9` inside a
          # builtin overwrites the program's own instructions -- which is what a
          # UDEF at a byte that disassembles cleanly on disk means.
          X9=$(grep -o 'X09=[0-9a-f]\{8,\}' fault.log | tail -1 | cut -d= -f2)
          X11=$(grep -o 'X11=[0-9a-f]\{8,\}' fault.log | tail -1 | cut -d= -f2)
          IMGEND=$((0x400000 + $(wc -c < M2-ours)))
          echo "    x9 (value stack)=0x$X9   x11 (frame stack)=0x$X11"
          printf '    image ends 0x%x  --  x9 is %s the image\n' "$IMGEND" \
            "$([ -n "$X9" ] && [ $((0x$X9)) -lt "$IMGEND" ] && echo 'INSIDE (UNDERFLOWED -- it is overwriting code)' || echo 'above (ok)')"
          echo "    image: $(wc -c < M2-ours) bytes at base 0x400000 -> ends 0x$(printf '%x' $((0x400000 + $(wc -c < M2-ours)))) "
          [ -n "$PC" ] && python3 tools/pcmap.py m2.s1 "0x$PC" "0x$LR" | sed 's/^/    /'
          echo "    --- last 3 labels in the emitted image ---"
          python3 tools/pcmap.py m2.s1 --list 2>/dev/null | tail -3 | sed 's/^/      /'

          # DIRECT CHECK: are the bytes actually in the image the instructions
          # m2.s1 says should be there? The fault is inside an emitted builtin
          # runtime, so compare the tail byte-for-byte instead of assuming.
          echo
          echo "    --- what m2.s1 says the tail should be (from :brk on) ---"
          awk '/^:brk$/,0' m2.s1 | head -12 | sed 's/^/      /'
          echo "    --- how many times each builtin runtime was emitted ---"
          for b in calloc free open read write close exit brk; do
            printf '      %-8s %s\n' "$b" "$(grep -c "^:$b\$" m2.s1)"
          done
          echo "    --- last 48 bytes of the image, disassembled ---"
          tail -c 48 M2-ours > tail.bin
          aarch64-linux-gnu-objdump -D -b binary -m aarch64 \
            --adjust-vma=$((0x400000 + $(wc -c < M2-ours) - 48)) tail.bin \
            2>/dev/null | tail -14 | sed 's/^/      /'
          rm -f fault.log tail.bin

      - name: 'GENERATIONS: our M2-Planet rebuilds itself five times'
        continue-on-error: true
        run: |
          . tools/ab.sh
          ROOT="$PWD"; M=upstream-m2planet
          # ABSOLUTE paths: this step cd's into $M, so anything relative to the
          # repo root stops resolving after that (exit 127, command not found).
          L="$ROOT/$M/M2libc"; S="$ROOT/upstream-mescc/bin"
          # THE FIXPOINT TEST. G0 = M2-ours, built by our stage 2 from the
          # PATCHED source. Every generation after that is built by the previous
          # generation from upstream's UNPATCHED -f list -- our M2-Planet handles
          # asm() perfectly well, so the substitution applies to G0 ONLY and
          # drops out of the chain immediately.
          #
          #   G2 == refM2P            -> the chain self-corrects; the patch was
          #                              the whole difference
          #   Gn == G(n-1) != refM2P  -> a STABLE but wrong fixpoint; the defect
          #                              is reproduced faithfully by our codegen
          #   Gn drifts or dies       -> the error compounds each generation
          #
          # The recipe is lifted from upstream's own test1000 trace, not written
          # by hand -- only the compiler binary is substituted each round.
          BARGS=$(grep -m1 -- '--architecture aarch64 -f' test1000.log | sed 's/^+ *//')
          BARGS=${BARGS#*bin/M2-Planet }
          BARGS=$(printf '%s' "$BARGS" | sed 's|-o .*$||')
          echo "  build args lifted from upstream's trace:"
          printf '    %s\n' "$BARGS" | fold -w 100 | sed '2,$s/^/      /'
          echo

          for t in blood-elf M1 hex2; do
            [ -x "$S/$t" ] || { echo "  MISSING TOOL: $S/$t"; exit 0; }
          done
          cd "$ROOT/$M"
          cp "$ROOT/M2-ours" gen0
          chmod +x gen0
          ab_rule 'GENERATIONS (G0 = our ladder + patched source; G1.. = unpatched)'
          ab_art 'refM2P (the reference)' "$ROOT/refM2P"
          ab_art 'G0     (ours)'          gen0
          prev=gen0
          for n in 1 2 3 4 5; do
            set +e
            timeout 900 qemu-aarch64 "./$prev" $BARGS -o g$n.M1 2> g$n.err
            rc=$?
            set -e
            if [ "$rc" != 0 ] || [ ! -s g$n.M1 ]; then
              echo "  G$n: COMPILE FAILED rc=$rc"
              head -3 g$n.err | sed 's/^/      ! /'
              break
            fi
            "$S/blood-elf" --64 -f g$n.M1 --little-endian --entry _start \
              -o g$n-footer.M1 2>/dev/null
            "$S/M1" -f "$L/aarch64/aarch64_defs.M1" -f "$L/aarch64/libc-core.M1" \
              -f g$n.M1 -f g$n-footer.M1 --little-endian --architecture aarch64 \
              -o g$n.hex2 2>/dev/null
            "$S/hex2" -f "$L/aarch64/ELF-aarch64-debug.hex2" -f g$n.hex2 \
              --little-endian --architecture aarch64 --base-address 0x400000 \
              -o gen$n 2>/dev/null
            chmod +x gen$n 2>/dev/null || true
            if [ ! -s gen$n ]; then echo "  G$n: LINK FAILED"; break; fi
            printf '  G%-2s rc=%-3s .M1=%-9s binary=%-9s sha=%s\n' \
              "$n" "$rc" "$(wc -c < g$n.M1)" "$(wc -c < gen$n)" \
              "$(sha256sum gen$n | cut -c1-16)"
            if cmp -s gen$n "$prev"; then
              echo "      == G$((n-1))  -- FIXPOINT REACHED"
            else
              echo "      != G$((n-1))  ($(cmp gen$n $prev 2>&1 | head -1 | sed 's/.*differ: //'))"
            fi
            if cmp -s gen$n "$ROOT/refM2P"; then
              echo "      == refM2P -- MATCHES THE REFERENCE"
            else
              echo "      != refM2P (ours $(wc -c < gen$n) vs ref $(wc -c < $ROOT/refM2P) bytes)"
            fi
            prev=gen$n
          done
          echo
          echo "  If G1 or G2 matches refM2P, the substitution was the whole story."
          echo "  If the chain settles on a stable non-matching binary, our codegen"
          echo "  reproduces its own defect exactly -- which is a much better place"
          echo "  to be than drifting, and makes the diff the thing to chase."

      - name: 'GATE: ours_proof matches upstream published sha256'
        run: |
          . tools/ab.sh
          if [ "$(cat selfcompile.status 2>/dev/null)" != ok ]; then
            echo "FAIL: our M2-Planet did not self-compile -- see DIAGNOSE above."
            exit 1
          fi
          cd upstream-m2planet
          EXPECT=$(awk '{print $1}' test/test1000/proof.answer)
          GOT=$(sha256sum ours_proof | awk '{print $1}')
          echo "  upstream proof.answer : $EXPECT"
          echo "  ours                  : $GOT"
          if [ "$GOT" = "$EXPECT" ]; then
            echo "PASS: our stage-2-built M2-Planet compiled M2-Planet's entire source"
            echo "      and the result matches upstream's own published sha256."
          else
            echo "FAIL: self-compilation output does not match upstream's answer file."
            exit 1
          fi

