name: selfhost-demo

# SPIKE (invariants suspended). EVERY OPERATION IS RUN TWICE.
#
# Rule for this workflow: nothing runs without a reference doing the SAME thing
# on the SAME input. Every artifact reports size + sha256. Every stage reports
# ours, theirs, and whether the bytes match. No stage fails the job early --
# everything reports, and one summary at the end decides.
#
# The references are upstream's own tools built by host gcc. That is legitimate
# because they are ORACLES: they never appear on our build path, they only say
# what the right answer is.
#
#   stage             ours                          reference
#   ----------------  ----------------------------  --------------------------
#   build M2-Planet   stage2 | stage1 | s0as | elf  upstream M2-Planet -> aarch64
#   build M1          stage2 | stage1 | s0as | elf  upstream M2-Planet -> aarch64
#   build hex2        stage2 | stage1 | s0as | elf  upstream M2-Planet -> aarch64
#   compile C         our M2-Planet                 host M2-Planet
#   assemble .M1      our M1                        host M1
#   link .hex2        our hex2                      host hex2
#   run               the ELF ours produced         the ELF theirs produced
#
# Both targets, aarch64 and x86, at every stage.

on:
  push:
    paths:
      - 'spikes/stage2-mini-c/**'
      - 'spikes/stage1-as/**'
      - 'spikes/stage0-as/**'
      - 'spikes/elf/**'
      - '.github/workflows/selfhost-demo.yml'
  workflow_dispatch:

concurrency:
  group: selfhost-demo-${{ github.ref }}
  cancel-in-progress: true

jobs:
  selfhost:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    env:
      M2PLANET_SHA: bd2fe4b0659fd0ad3f476a5ad0ef801bd134665d
      M2LIBC_SHA: 68a23cfd05d5a355ba7a30c770d684cbe86fcc4e
      MESCC_SHA: 5adfbf3
    steps:
      - uses: actions/checkout@v5

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qemu-user binutils-aarch64-linux-gnu gcc make

      - name: Fetch upstreams and build the oracles
        run: |
          . tools/ab.sh
          git clone https://github.com/oriansj/M2-Planet.git upstream-m2planet
          git -C upstream-m2planet checkout "$M2PLANET_SHA"
          git -C upstream-m2planet submodule update --init --recursive
          git -C upstream-m2planet/M2libc fetch --depth 50 origin "$M2LIBC_SHA" 2>/dev/null || true
          git -C upstream-m2planet/M2libc checkout -q "$M2LIBC_SHA" 2>/dev/null \
            || echo "  NOTE: M2libc already at the gitlink for this M2-Planet commit"
          git clone --recursive https://github.com/oriansj/mescc-tools.git upstream-mescc
          git -C upstream-mescc checkout -q "$MESCC_SHA"
          echo "  PINS RESOLVED:"
          echo "    M2-Planet   $(git -C upstream-m2planet rev-parse HEAD)"
          echo "    M2libc      $(git -C upstream-m2planet/M2libc rev-parse HEAD)"
          [ -d upstream-mescc ] && echo "    mescc-tools $(git -C upstream-mescc rev-parse HEAD)"
          make -C upstream-m2planet M2-Planet
          make -C upstream-mescc M1 hex2
          ab_rule 'ORACLES (host gcc -- never on our build path)'
          ab_art 'M2-Planet (host)' upstream-m2planet/bin/M2-Planet
          ab_art 'M1 (host)'        upstream-mescc/bin/M1
          ab_art 'hex2 (host)'      upstream-mescc/bin/hex2
          echo "  M2-Planet   $(git -C upstream-m2planet rev-parse HEAD)"
          echo "  M2libc      $(git -C upstream-m2planet/M2libc rev-parse HEAD)"
          echo "  mescc-tools $(git -C upstream-mescc rev-parse HEAD)"

      - name: Build our ladder
        run: |
          . tools/ab.sh
          aarch64-linux-gnu-as -o s0.o spikes/stage0-as/stage0-as.aarch64.s
          aarch64-linux-gnu-ld -static -o stage0-as s0.o
          aarch64-linux-gnu-as -o elf.o spikes/elf/elf.aarch64.s
          aarch64-linux-gnu-ld -static -o elf elf.o
          cat spikes/stage1-as/stage1-as.s0 \
            | qemu-aarch64 ./stage0-as | qemu-aarch64 ./elf stage1
          cat spikes/stage2-mini-c/stage2-mini-c.s1 \
            | qemu-aarch64 ./stage1 | qemu-aarch64 ./stage0-as | qemu-aarch64 ./elf stage2
          ab_rule 'OUR LADDER'
          ab_art 'stage2-mini-c.s1' spikes/stage2-mini-c/stage2-mini-c.s1
          ab_art 'stage0-as' stage0-as
          ab_art 'stage1'    stage1
          ab_art 'stage2'    stage2

      - name: 'REGRESSION (our own bugs -- no reference applies)'
        run: |
          g() {
            printf '%s' "$3" > g.c
            qemu-aarch64 ./stage2 < g.c > g.s1
            cat g.s1 | qemu-aarch64 ./stage1 | qemu-aarch64 ./stage0-as | qemu-aarch64 ./elf g.elf
            set +e; timeout 30 qemu-aarch64 ./g.elf; v=$?; set -e
            printf '  %-40s got=%-5s want=%-5s %s\n' "$1" "$v" "$2" \
              "$([ "$v" = "$2" ] && echo OK || echo '<<< FAIL')"
            [ "$v" = "$2" ]
          }
          B='struct b{char* Text;int type;};'
          g 'm73 struct** global has storage' 7 'struct b{int x;}; struct b** g; int main(){g=calloc(4,8);if(g==0){return 1;}return 7;}'
          g 'm74 member[i] store keeps value' 65 "$B"'int main(){struct b* a;a=calloc(1,16);a->Text=calloc(8,1);a->Text[0]=65;return a->Text[0];}'
          g 'm74 word member subscript' 77 'struct w{int* v;int t;};int main(){struct w* a;a=calloc(1,16);a->v=calloc(4,8);a->v[2]=77;return a->v[2];}'
          NB='char* S;int cp(struct b* a,int n){int i;i=0;while(i<=n){a->Text[i]=S[i];i=i+1;}return i;}int main(){struct b* a;a=calloc(1,16);a->Text=calloc(16,1);S=calloc(16,1);S[3]=9;cp(a,5);return a->Text[3];}'
          g 'm74 the NewBlob copy loop' 9 "$B$NB"
          RD='struct t{int p;int s;};struct t* mk(){struct t* q;q=calloc(1,16);q->s=42;return q;}int f(int fl){int r;r=0;if(fl){struct t* a=mk();r=a->s;}else{struct t* a=mk();r=a->s+1;}return r;}int main(){return f(0);}'
          g 'm72 redeclared local' 43 "$RD"

      - name: 'BUILD BOTH WAYS: every tool, ours and the reference'
        continue-on-error: true
        run: |
          . tools/ab.sh
          M=upstream-m2planet; L=$M/M2libc; S=upstream-mescc
          ours() { o="$1"; shift; cat "$@" > "$o.c"
                   qemu-aarch64 ./stage2 < "$o.c" > "$o.s1" 2>"$o.ours.err" || true
                   cat "$o.s1" | qemu-aarch64 ./stage1 | qemu-aarch64 ./stage0-as \
                     | qemu-aarch64 ./elf "$o" || true; }
          theirs() { o="$1"; shift
                     $M/bin/M2-Planet --architecture aarch64 --bootstrap-mode \
                       -f $L/aarch64/linux/bootstrap.c -f $L/bootstrap.c "$@" \
                       -o "$o.M1" 2>"$o.err" || return 0
                     $S/bin/M1 -f $L/aarch64/aarch64_defs.M1 -f $L/aarch64/libc-core.M1 \
                       -f "$o.M1" --little-endian --architecture aarch64 -o "$o.hex2" 2>>"$o.err" || return 0
                     $S/bin/hex2 -f $L/aarch64/ELF-aarch64.hex2 -f "$o.hex2" \
                       --little-endian --architecture aarch64 --base-address 0x400000 \
                       -o "$o" 2>>"$o.err" || return 0
                     chmod +x "$o"; }

          ours   M2-Planet $L/bootstrap.c $L/bootstrappable.c $M/cc.h $M/cc_globals.c \
                           $M/cc_reader.c $M/cc_strings.c $M/cc_types.c $M/cc_emit.c \
                           $M/cc_core.c $M/cc_macro.c $M/cc.c
          theirs refM2P    -f $M/cc.h -f $L/bootstrappable.c -f $M/cc_globals.c \
                           -f $M/cc_reader.c -f $M/cc_strings.c -f $M/cc_types.c \
                           -f $M/cc_emit.c -f $M/cc_core.c -f $M/cc_macro.c -f $M/cc.c
          ours   M1     $L/bootstrap.c $L/bootstrappable.c $S/stringify.c $S/M1-macro.c
          theirs refM1  -f $L/bootstrappable.c -f $S/stringify.c -f $S/M1-macro.c
          ours   hex2    $L/bootstrap.c $L/bootstrappable.c $S/hex2.h $S/hex2_globals.h \
                         $S/hex2_linker.c $S/hex2_word.c $S/hex2.c
          theirs refhex2 -f $L/bootstrappable.c -f $S/hex2.h -f $S/hex2_globals.h \
                         -f $S/hex2.c -f $S/hex2_linker.c -f $S/hex2_word.c

          ab_rule 'TOOL BINARIES: ours vs reference'
          ab_art 'M2-Planet  ours'      M2-Planet
          ab_art 'M2-Planet  reference' refM2P
          ab_art 'M1         ours'      M1
          ab_art 'M1         reference' refM1
          ab_art 'hex2       ours'      hex2
          ab_art 'hex2       reference' refhex2
          echo
          for t in refM2P refM1 refhex2; do
            [ -s "$t.err" ] && printf '  %-10s reference build stopped at: %s\n' "$t" "$(head -1 $t.err)"
          done
          echo "  unresolved symbols in OUR output (adr/bl with no definition):"
          for t in M2-Planet M1 hex2; do
            { grep -oE '^adr x[0-9]+ [A-Za-z_][A-Za-z0-9_]*$' "$t.s1" | awk '{print $3}'
              grep -oE '^bl [A-Za-z_][A-Za-z0-9_]*$' "$t.s1" | awk '{print $2}'; } | sort -u > /tmp/r.$t
            grep -oE '^:[A-Za-z_][A-Za-z0-9_]*$' "$t.s1" | sed 's/^://' | sort -u > /tmp/d.$t
            printf '    %-12s %s\n' "$t" "$(comm -23 /tmp/r.$t /tmp/d.$t | tr '\n' ' ' | sed 's/^ *$/NONE/')"
          done

      - name: 'A/B EVERY STAGE, EVERY TARGET'
        continue-on-error: true
        run: |
          . tools/ab.sh
          L=upstream-m2planet/M2libc
          printf 'int main(){int i;int s;s=0;for(i=1;i<10;i=i+1){s=s+i;}return s;}' > c.c
          ab_rule 'INPUT'
          ab_inputs c.c
          echo "  (expected exit code 45)"
          : > /tmp/verdicts

          for arch in aarch64 x86; do
            if [ "$arch" = aarch64 ]; then emu=qemu-aarch64; else emu=qemu-i386; fi
            echo
            echo "  ============ TARGET: $arch ============"

            echo "  -- 1of4 compile C -> .M1 --"
            ab_run 'ours   M2-Planet' 300 "o.$arch.M1" \
              qemu-aarch64 ./M2-Planet --architecture $arch --bootstrap-mode -f c.c -o "o.$arch.M1"
            ab_run 'ref    M2-Planet' 300 "r.$arch.M1" \
              upstream-m2planet/bin/M2-Planet --architecture $arch --bootstrap-mode -f c.c -o "r.$arch.M1"
            ab_cmp '       .M1' "o.$arch.M1" "r.$arch.M1"
            if cmp -s "o.$arch.M1" "r.$arch.M1"; then echo "compile.$arch OK" >> /tmp/verdicts; else echo "compile.$arch DIFF" >> /tmp/verdicts; fi

            echo "  -- 2of4 assemble .M1 -> .hex2 (both given the REFERENCE .M1) --"
            ab_run 'ours   M1' 300 "o.$arch.hex2" \
              qemu-aarch64 ./M1 -f "$L/$arch/${arch}_defs.M1" -f "$L/$arch/libc-core.M1" \
                -f "r.$arch.M1" --little-endian --architecture $arch -o "o.$arch.hex2"
            ab_run 'ref    M1' 300 "r.$arch.hex2" \
              upstream-mescc/bin/M1 -f "$L/$arch/${arch}_defs.M1" -f "$L/$arch/libc-core.M1" \
                -f "r.$arch.M1" --little-endian --architecture $arch -o "r.$arch.hex2"
            ab_cmp '       .hex2' "o.$arch.hex2" "r.$arch.hex2"
            if cmp -s "o.$arch.hex2" "r.$arch.hex2"; then echo "assemble.$arch OK" >> /tmp/verdicts; else echo "assemble.$arch DIFF" >> /tmp/verdicts; fi

            echo "  -- 3of4 link .hex2 -> ELF (both given the REFERENCE .hex2) --"
            ab_run 'ours   hex2' 300 "o.$arch.elf" \
              qemu-aarch64 ./hex2 -f "$L/$arch/ELF-$arch.hex2" -f "r.$arch.hex2" \
                --little-endian --architecture $arch --base-address 0x400000 -o "o.$arch.elf"
            ab_run 'ref    hex2' 300 "r.$arch.elf" \
              upstream-mescc/bin/hex2 -f "$L/$arch/ELF-$arch.hex2" -f "r.$arch.hex2" \
                --little-endian --architecture $arch --base-address 0x400000 -o "r.$arch.elf"
            ab_cmp '       ELF' "o.$arch.elf" "r.$arch.elf"
            if cmp -s "o.$arch.elf" "r.$arch.elf"; then echo "link.$arch OK" >> /tmp/verdicts; else echo "link.$arch DIFF" >> /tmp/verdicts; fi

            echo "  -- 4of4 run both ELFs (want 45) --"
            chmod +x "o.$arch.elf" "r.$arch.elf" 2>/dev/null || true
            set +e
            timeout 120 $emu "./o.$arch.elf" </dev/null >/dev/null 2>&1; a=$?
            timeout 120 $emu "./r.$arch.elf" </dev/null >/dev/null 2>&1; b=$?
            set -e
            printf '  %-26s ours=%-5s ref=%-5s\n' '       exit code' "$a" "$b"
            if [ "$a" = 45 ] && [ "$b" = 45 ]; then echo "run.$arch OK" >> /tmp/verdicts
            else echo "run.$arch ours=$a/ref=$b" >> /tmp/verdicts; fi
          done

      - name: 'SELF-COMPILATION, ours and the reference'
        continue-on-error: true
        run: |
          . tools/ab.sh
          M=upstream-m2planet; L=$M/M2libc
          set -- --architecture aarch64 --bootstrap-mode \
            -f $L/aarch64/linux/bootstrap.c -f $L/bootstrap.c -f $M/cc.h \
            -f $L/bootstrappable.c -f $M/cc_globals.c -f $M/cc_reader.c \
            -f $M/cc_strings.c -f $M/cc_types.c -f $M/cc_emit.c -f $M/cc_core.c \
            -f $M/cc_macro.c -f $M/cc.c
          echo "  both compilers get the identical -f list for M2-Planet's own source"
          ab_run 'ours  M2-Planet' 1800 gen2.M1    qemu-aarch64 ./M2-Planet "$@" -o gen2.M1
          ab_run 'ref   M2-Planet' 1800 refgen2.M1 upstream-m2planet/bin/M2-Planet "$@" -o refgen2.M1
          ab_cmp '      gen2 .M1' gen2.M1 refgen2.M1
          if cmp -s gen2.M1 refgen2.M1; then echo "selfcompile.M1 OK" >> /tmp/verdicts; else echo "selfcompile.M1 DIFF" >> /tmp/verdicts; fi

          echo
          echo "  assemble generation 2, both ways, from the REFERENCE .M1"
          ab_run 'ours  M1' 1800 gen2.hex2 \
            qemu-aarch64 ./M1 -f $L/aarch64/aarch64_defs.M1 -f $L/aarch64/libc-core.M1 \
              -f refgen2.M1 --little-endian --architecture aarch64 -o gen2.hex2
          ab_run 'ref   M1' 1800 refgen2.hex2 \
            upstream-mescc/bin/M1 -f $L/aarch64/aarch64_defs.M1 -f $L/aarch64/libc-core.M1 \
              -f refgen2.M1 --little-endian --architecture aarch64 -o refgen2.hex2
          ab_cmp '      gen2 .hex2' gen2.hex2 refgen2.hex2
          if cmp -s gen2.hex2 refgen2.hex2; then echo "selfcompile.hex2 OK" >> /tmp/verdicts; else echo "selfcompile.hex2 DIFF" >> /tmp/verdicts; fi

          upstream-mescc/bin/hex2 -f $L/aarch64/ELF-aarch64.hex2 -f refgen2.hex2 \
            --little-endian --architecture aarch64 --base-address 0x400000 -o M2-gen2 || true
          chmod +x M2-gen2 2>/dev/null || true
          ab_rule 'GENERATIONS'
          ab_art 'gen1 (built by stage 2)' M2-Planet
          ab_art 'gen2'                    M2-gen2
          printf 'int f(int n){if(n<2){return n;}return f(n-1)+f(n-2);}int main(){return f(10);}' > d.c
          ab_run 'gen1 on d.c' 300 d1.M1 qemu-aarch64 ./M2-Planet --architecture aarch64 --bootstrap-mode -f d.c -o d1.M1
          ab_run 'gen2 on d.c' 300 d2.M1 qemu-aarch64 ./M2-gen2   --architecture aarch64 --bootstrap-mode -f d.c -o d2.M1
          ab_run 'host on d.c' 300 d3.M1 upstream-m2planet/bin/M2-Planet --architecture aarch64 --bootstrap-mode -f d.c -o d3.M1
          ab_cmp '      gen1 vs gen2' d1.M1 d2.M1
          ab_cmp '      gen1 vs host' d1.M1 d3.M1
          if cmp -s d1.M1 d2.M1; then echo "selfhost.fixpoint OK" >> /tmp/verdicts; else echo "selfhost.fixpoint DIFF" >> /tmp/verdicts; fi

      - name: SUMMARY
        run: |
          echo "  stage                  verdict"
          echo "  ---------------------  -------"
          sort /tmp/verdicts 2>/dev/null | while read k v; do printf '  %-21s  %s\n' "$k" "$v"; done
          bad=$(grep -v ' OK$' /tmp/verdicts 2>/dev/null | wc -l)
          echo
          if [ "$bad" -eq 0 ]; then
            echo "  ALL STAGES MATCH THE REFERENCE."
          else
            echo "  $bad stage(s) differ -- compare the shas above to see where."
            exit 1
          fi
