name: no-host-chain

# SPIKE (invariants suspended). THE FIRST NO-HOST-GCC ROUND TRIP.
#
# borrow-m2 built M2-Planet, M1 and hex2 with the HOST gcc; it only ever proved
# the borrowed mechanism runs here. stage3-m2-demo removed gcc from the
# M2-Planet step but stopped at emitted .M1, never linking it. This workflow
# closes both gaps at once:
#
#   M1.c   --[ stage2 | stage1 | stage0-as | elf ]--> M1     (ours)
#   hex2.c --[ stage2 | stage1 | stage0-as | elf ]--> hex2   (ours)
#   M2.c   --[ stage2 | stage1 | stage0-as | elf ]--> M2-Planet  (m71, ours)
#
#   prog.c --[ our M2-Planet ]--> .M1 --[ our M1 ]--> .hex2
#          --[ our hex2 ]--> static ELF --[ qemu ]--> exit code
#
# GNU `as`/`ld` still assemble the stage-0 seed. That is the ONE deliberate
# remaining host dependency, allowed for now; ARCHITECTURE.md's position is that
# the assembler is untrusted and its output is confirmed by round-trip
# disassembly. Nothing else on the target path touches a host compiler.
#
# X86 IS THE POINT OF STEP 5. M2-Planet, M1 and hex2 all take --architecture at
# RUNTIME, so our aarch64 binaries can emit x86 and we run the result under
# qemu-i386. That matters because MesCC has no native aarch64 backend (x86 +
# armhf only), so the Mes -> tcc rung is only reachable on an x86 target. This
# workflow gets the toolchain to that doorstep; it does NOT attempt Mes itself.
#
# STAGING: steps 1-3 are PROBES (continue-on-error, they report ground truth
# about whether our subset covers mescc-tools). Steps 4-5 are GATES.

on:
  push:
    paths:
      - 'spikes/stage2-mini-c/**'
      - 'spikes/stage1-as/**'
      - 'spikes/stage0-as/**'
      - 'spikes/elf/**'
      - '.github/workflows/no-host-chain.yml'
  workflow_dispatch:

concurrency:
  group: no-host-chain-${{ github.ref }}
  cancel-in-progress: true

jobs:
  chain:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    env:
      M2PLANET_SHA: 34fbd5c2a9b6eb634a4f6ad95158dcd1efcf19e0
      # TODO pin once this graduates; mescc-tools is not part of the C-subset
      # spec, so it has been left at branch tip like borrow-m2 does.
    steps:
      - uses: actions/checkout@v5

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qemu-user binutils-aarch64-linux-gnu
          # NOTE: no gcc installed for the target path. The runner ships one;
          # this workflow never invokes it.

      - name: Fetch upstreams
        run: |
          git clone https://github.com/oriansj/M2-Planet.git upstream-m2planet
          git -C upstream-m2planet checkout "$M2PLANET_SHA"
          git -C upstream-m2planet submodule update --init --recursive
          git clone --recursive https://github.com/oriansj/mescc-tools.git upstream-mescc
          echo "M2-Planet : $(git -C upstream-m2planet rev-parse HEAD)"
          echo "M2libc    : $(git -C upstream-m2planet/M2libc rev-parse HEAD)"
          echo "mescc-tools: $(git -C upstream-mescc rev-parse HEAD)"

      - name: Build the ladder (GNU as for the seed only)
        run: |
          aarch64-linux-gnu-as -o s0.o spikes/stage0-as/stage0-as.aarch64.s
          aarch64-linux-gnu-ld -static -o stage0-as s0.o
          aarch64-linux-gnu-as -o elf.o spikes/elf/elf.aarch64.s
          aarch64-linux-gnu-ld -static -o elf elf.o
          cat spikes/stage1-as/stage1-as.s0 \
            | qemu-aarch64 ./stage0-as | qemu-aarch64 ./elf stage1
          cat spikes/stage2-mini-c/stage2-mini-c.s1 \
            | qemu-aarch64 ./stage1 | qemu-aarch64 ./stage0-as | qemu-aarch64 ./elf stage2
          test -x stage2 || { echo "stage2 not built"; exit 1; }

      # --- 1. PROBE: what does mescc-tools actually want compiled? -----------
      # Do not guess the -f list. Print ground truth on the first run and read
      # it off the log, the way the m50/m51 rule says to.
      - name: 'PROBE: mescc-tools inventory'
        continue-on-error: true
        run: |
          echo "--- top-level .c/.h ---"
          ls -1 upstream-mescc/*.c upstream-mescc/*.h 2>/dev/null || true
          echo "--- any kaem / bootstrap recipes (these carry the real -f lists) ---"
          find upstream-mescc -maxdepth 2 \
            \( -name 'kaem*' -o -name '*.kaem' -o -name 'bootstrap*' -o -name 'makefile' -o -name 'Makefile' \) \
            -print 2>/dev/null || true
          echo "--- M2-Planet invocations found in those recipes ---"
          grep -rn -- '-f ' upstream-mescc --include='kaem*' --include='*.kaem' 2>/dev/null | head -40 || true

      - name: Derive -f lists from upstream's makefile
        run: |
          # Stop hand-writing these. The makefile is authoritative: its M1
          # recipe is "M1-macro.c stringify.c bootstrappable.c" -- stringify.c
          # is what three hand-written lists all missed, and its absence hung
          # M1 at runtime while --help still worked.
          MK=upstream-mescc/makefile
          echo "--- makefile recipes ---"
          grep -A6 -E '^(M1|hex2):' "$MK" || true

          # 'M1:' is a phony alias for 'bin/M1'; the real rule's prerequisite
          # line already lists every source, so read that and skip the recipe.
          srcs() {
            grep -E "^bin/$1:" "$MK" | sed 's/|.*//' \
              | grep -o '[A-Za-z0-9_./-]*\.c' | awk '!seen[$0]++' \
              | grep -v 'bootstrappable\.c'
          }
          # M2-Planet is single-pass; put the main-bearing file last.
          order() {
            local m="" r=""
            for f in $1; do
              if grep -q '^int main(' "upstream-mescc/$f" 2>/dev/null; then m="$f"; else r="$r $f"; fi
            done
            echo "$r $m"
          }

          M1S=$(order "$(srcs M1)")
          H2S=$(order "$(srcs hex2)")
          [ -n "$(echo $M1S)" ] || { echo "could not derive M1 sources"; exit 1; }
          [ -n "$(echo $H2S)" ] || { echo "could not derive hex2 sources"; exit 1; }
          echo "M1 sources  : $M1S"
          echo "hex2 sources: $H2S"
          echo "M1_SRCS=$M1S" >> "$GITHUB_ENV"
          echo "HEX2_SRCS=$H2S" >> "$GITHUB_ENV"

      # --- 2. PROBE: can OUR stage 2 compile M1? -----------------------------
      # The real unknown is not M1.c but its M2libc dependencies. M2-Planet's
      # -f list needed only bootstrap.c + bootstrappable.c; if M1/hex2 pull in
      # stdio.c / stdlib.c / string.c then our stage 2 is compiling files it has
      # never seen. Adjust the list below from step 1's output.
      - name: 'PROBE: stage2 builds M1'
        continue-on-error: true
        run: |
          L=upstream-m2planet/M2libc
          S=upstream-mescc
          ls -1 $S/M1*.c $S/M1*.h 2>/dev/null || true
          # M2-Planet-style C passes headers on the -f list; '#' lines are
          # DISCARDED by our m62 rule. So a #include'd local header must be
          # concatenated in, or its declarations simply do not exist. Resolve
          # them depth-first instead of guessing.
          SEEN=""
          resolve() {
            local f="$1" d h
            d=$(dirname "$f")
            case " $SEEN " in *" $f "*) return;; esac
            SEEN="$SEEN $f"
            for h in $(sed -n 's/^#include[[:space:]]*"\([^"]*\)".*/\1/p' "$f"); do
              [ -f "$d/$h" ] && resolve "$d/$h"
            done
            echo "$f"
          }

          SEEN=""
          list="$L/bootstrap.c $L/bootstrappable.c"
          for r in $M1_SRCS; do list="$list $(resolve $S/$r)"; done
          list=$(printf '%s\n' $list | awk '!seen[$0]++' | tr '\n' ' ')
          echo "resolved -f list: $list"
          cat $list > m1src.c
          echo "M1 translation unit: $(wc -c < m1src.c) bytes  (was 28252 with headers dropped)"
          qemu-aarch64 ./stage2 < m1src.c > m1.s1
          echo "stage2 emitted: $(wc -c < m1.s1) bytes"
          grep -q '^:main' m1.s1 || { echo "NO :main in m1.s1 -- -f list incomplete"; exit 1; }
          cat m1.s1 | qemu-aarch64 ./stage1 | qemu-aarch64 ./stage0-as | qemu-aarch64 ./elf M1
          test -x M1 && echo "M1 binary: $(wc -c < M1) bytes"

      # --- 3. PROBE: can OUR stage 2 compile hex2? ---------------------------
      - name: 'PROBE: stage2 builds hex2'
        continue-on-error: true
        run: |
          L=upstream-m2planet/M2libc
          S=upstream-mescc
          ls -1 $S/hex2*.c $S/hex2*.h 2>/dev/null || true
          # M2-Planet-style C passes headers on the -f list; '#' lines are
          # DISCARDED by our m62 rule. So a #include'd local header must be
          # concatenated in, or its declarations simply do not exist. Resolve
          # them depth-first instead of guessing.
          SEEN=""
          resolve() {
            local f="$1" d h
            d=$(dirname "$f")
            case " $SEEN " in *" $f "*) return;; esac
            SEEN="$SEEN $f"
            for h in $(sed -n 's/^#include[[:space:]]*"\([^"]*\)".*/\1/p' "$f"); do
              [ -f "$d/$h" ] && resolve "$d/$h"
            done
            echo "$f"
          }

          SEEN=""
          # hex2 is FIVE files, not one. hex2.c carries main (and max_string,
          # which is what upstream's oracle complained about). Order mirrors
          # M2-Planet's own -f list: headers, then bodies, main-bearing last.
          list="$L/bootstrap.c $L/bootstrappable.c"
          for r in $HEX2_SRCS; do list="$list $(resolve $S/$r)"; done
          # resolve() runs in a subshell so SEEN never propagates back; dedupe
          # here instead, preserving first-seen order.
          list=$(printf '%s\n' $list | awk '!seen[$0]++' | tr '\n' ' ')
          echo "resolved -f list: $list"
          cat $list > hex2src.c
          echo "hex2 translation unit: $(wc -c < hex2src.c) bytes  (was 21751, missing hex2_globals.h)"
          qemu-aarch64 ./stage2 < hex2src.c > hex2.s1
          echo "stage2 emitted: $(wc -c < hex2.s1) bytes"
          grep -q '^:main' hex2.s1 || { echo "NO :main in hex2.s1 -- -f list incomplete"; exit 1; }
          cat hex2.s1 | qemu-aarch64 ./stage1 | qemu-aarch64 ./stage0-as | qemu-aarch64 ./elf hex2
          test -x hex2 && echo "hex2 binary: $(wc -c < hex2) bytes"

      # --- 4. Build M2-Planet with stage 2 (the m71 result, re-run here) -----
      - name: Build M2-Planet with stage 2
        run: |
          M=upstream-m2planet
          cat \
            $M/M2libc/bootstrap.c \
            $M/M2libc/bootstrappable.c \
            $M/cc.h $M/cc_globals.c $M/cc_reader.c $M/cc_strings.c \
            $M/cc_types.c $M/cc_emit.c $M/cc_core.c $M/cc_macro.c $M/cc.c \
            > m2.c
          qemu-aarch64 ./stage2 < m2.c > m2.s1
          cat m2.s1 | qemu-aarch64 ./stage1 | qemu-aarch64 ./stage0-as | qemu-aarch64 ./elf M2-Planet
          test -x M2-Planet || { echo "M2-Planet not built"; exit 1; }
          echo "M2-Planet: $(wc -c < M2-Planet) bytes"

      # --- 5. GATE: full round trip, NO host compiler on the path ------------
      # Skips cleanly (rather than lying) if the probes above did not produce
      # M1/hex2 yet.
      - name: 'PROBE: do our M1 and hex2 respond to argv at all?'
        continue-on-error: true
        run: |
          # m70 gave stage 2 argc/argv, but this is the first program that has
          # ever really parsed options with it. A tool that mis-parses and
          # falls through to reading stdin looks exactly like a hang, so every
          # invocation below is timeout-bounded with stdin closed.
          for t in M1 hex2; do
            set +e
            timeout 20 qemu-aarch64 "./$t" --help </dev/null >"$t.help" 2>&1
            echo "  $t --help  rc=$? (124=HUNG)  $(head -c 120 "$t.help" | tr -d '\n')"
            timeout 20 qemu-aarch64 "./$t" </dev/null >/dev/null 2>&1
            echo "  $t (no args) rc=$? (124=HUNG)"
            set -e
          done

      - name: 'PROBE: differential — our M1 vs a gcc-built M1'
        continue-on-error: true
        run: |
          # Host gcc DELIBERATELY, as an oracle only. If the .hex2 bytes match,
          # our M1 is correct and any hang is downstream of it.
          make -C upstream-mescc M1 hex2
          L=upstream-m2planet/M2libc
          printf 'int main(){return 42;}' > t.c
          timeout 60 qemu-aarch64 ./M2-Planet --architecture aarch64 \
            --bootstrap-mode -f t.c -o t.M1 </dev/null
          args="-f $L/aarch64/aarch64_defs.M1 -f $L/aarch64/libc-core.M1 -f t.M1
                --little-endian --architecture aarch64"
          set +e
          timeout 60 qemu-aarch64 ./M1 $args -o ours.hex2 </dev/null; echo "our M1 rc=$? (124=HUNG)"
          set -e
          upstream-mescc/bin/M1 $args -o theirs.hex2 || true
          if cmp -s ours.hex2 theirs.hex2; then
            echo "IDENTICAL: our M1 matches the gcc-built M1 byte for byte."
          else
            echo "DIFFER:"; ls -l ours.hex2 theirs.hex2
            diff <(head -40 ours.hex2) <(head -40 theirs.hex2) | head -20
          fi

      - name: 'PROBE: control — how fast does ANY of our compiled code read?'
        continue-on-error: true
        run: |
          # M1 does ~50 bytes/sec. Our M2-Planet has only ever read 40-byte
          # inputs, so we do not know if this is M1's problem or every binary
          # our ladder produces. Give M2-Planet a few KB and count.
          L=upstream-m2planet/M2libc
          for i in $(seq 1 60); do
            echo "int f$i(int n){int s;s=0;while(n>0){s=s+n;n=n-1;}return s;}"
          done > big.c
          echo "int main(){return f1(3);}" >> big.c
          echo "input: $(wc -c < big.c) bytes"
          set +e
          start=$(date +%s)
          timeout 300 qemu-aarch64 ./M2-Planet --architecture aarch64 \
            --bootstrap-mode -f big.c -o big.M1 </dev/null
          rc=$?; end=$(date +%s)
          set -e
          echo "M2-Planet rc=$rc in $((end-start))s -> $(wc -c < big.M1 2>/dev/null || echo 0) bytes of M1"
          echo "rate: $(( $(wc -c < big.c) / ((end-start)+1) )) input bytes/sec"

      - name: 'PROBE: let M1 actually finish (10 min budget)'
        continue-on-error: true
        run: |
          L=upstream-m2planet/M2libc
          printf 'int main(){return 42;}' > t.c
          timeout 60 qemu-aarch64 ./M2-Planet --architecture aarch64 \
            --bootstrap-mode -f t.c -o t.M1 </dev/null || true
          for f in "$L/aarch64/aarch64_defs.M1" "$L/aarch64/libc-core.M1" t.M1; do
            echo "  input $f: $(wc -c < $f) bytes"
          done
          args="-f $L/aarch64/aarch64_defs.M1 -f $L/aarch64/libc-core.M1 -f t.M1
                --little-endian --architecture aarch64"
          set +e
          start=$(date +%s)
          timeout 600 qemu-aarch64 ./M1 $args -o ours.hex2 </dev/null
          rc=$?; end=$(date +%s)
          set -e
          echo "our M1 rc=$rc after $((end-start))s (124=still going at 10min)"
          upstream-mescc/bin/M1 $args -o theirs.hex2 || true
          if [ -f ours.hex2 ] && cmp -s ours.hex2 theirs.hex2; then
            echo "IDENTICAL: our M1 is CORRECT, just slow. This is a perf bug, not a codegen bug."
          elif [ -f ours.hex2 ]; then
            echo "DIFFER: $(wc -c < ours.hex2) vs $(wc -c < theirs.hex2) bytes"
            cmp ours.hex2 theirs.hex2 | head -3
          else
            echo "no output produced"
          fi

      - name: 'PROBE: where does hex2 hit SIGILL?'
        continue-on-error: true
        run: |
          # hex2 emits a byte-identical ELF and THEN dies with signal 4, so the
          # fault is on the exit path, after the work. Get the faulting PC and
          # the last syscalls before it.
          L=upstream-m2planet/M2libc
          upstream-mescc/bin/M1 \
            -f "$L/aarch64/aarch64_defs.M1" -f "$L/aarch64/libc-core.M1" -f t.M1 \
            --little-endian --architecture aarch64 -o good.hex2 || true
          set +e
          timeout 120 qemu-aarch64 -strace ./hex2 \
            -f "$L/aarch64/ELF-aarch64.hex2" -f good.hex2 \
            --little-endian --architecture aarch64 --base-address 0x400000 \
            -o ours.elf </dev/null > h2.log 2>&1
          echo "rc=$? (132=SIGILL)"
          set -e
          echo "--- last 25 syscalls before the fault ---"
          tail -25 h2.log
          upstream-mescc/bin/hex2 -f "$L/aarch64/ELF-aarch64.hex2" -f good.hex2 \
            --little-endian --architecture aarch64 --base-address 0x400000 \
            -o theirs.elf || true
          if [ -f ours.elf ] && cmp -s ours.elf theirs.elf; then
            echo "CONFIRMED: output byte-identical to gcc-built hex2; the SIGILL is post-work."
          else
            ls -l ours.elf theirs.elf 2>/dev/null || true
          fi

      - name: 'GATE: no-host round trip (aarch64 + x86)'
        run: |
          if [ ! -x M1 ] || [ ! -x hex2 ]; then
            echo "SKIP: our M1/hex2 not built yet."
            exit 1
          fi
          L=upstream-m2planet/M2libc
          printf 'int main(){int i;int s;s=0;for(i=1;i<10;i=i+1){s=s+i;}return s;}' > t.c

          step() {  # step <label> <expected-rc> <cmd...>
            local label="$1" want="$2"; shift 2
            set +e
            timeout 60 "$@" </dev/null; local rc=$?
            set -e
            echo "  $label rc=$rc (want $want; 124=HUNG)"
            [ "$rc" = "$want" ]
          }

          run_for() {
            arch="$1"; emu="$2"; want="$3"
            step "$arch M2-Planet" 0 qemu-aarch64 ./M2-Planet \
              --architecture "$arch" --bootstrap-mode -f t.c -o t.M1 || return 1
            step "$arch M1" 0 qemu-aarch64 ./M1 \
              -f "$L/$arch/${arch}_defs.M1" -f "$L/$arch/libc-core.M1" -f t.M1 \
              --little-endian --architecture "$arch" -o t.hex2 || return 1
            step "$arch hex2" 0 qemu-aarch64 ./hex2 \
              -f "$L/$arch/ELF-$arch.hex2" -f t.hex2 \
              --little-endian --architecture "$arch" \
              --base-address 0x400000 -o "t.$arch.elf" || return 1
            step "$arch run" "$want" "$emu" "./t.$arch.elf" || return 1
          }

          ok=yes
          run_for aarch64 qemu-aarch64 45 || ok=no
          run_for x86     qemu-i386    45 || ok=no

          [ "$ok" = yes ] || { echo "FAIL"; exit 1; }
          echo "PASS: M2-Planet, M1 and hex2 all built by our ladder turned C"
          echo "into a running binary for two targets. No host compiler on the path."
