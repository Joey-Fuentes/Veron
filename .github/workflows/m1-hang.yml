name: m1-hang

# SPIKE. Our M1 does not complete on a SIX BYTE input. That is not slowness,
# it is a hang, and the earlier "50 bytes/sec" reading was an extrapolation from
# a 15 second window that should never have been made.
#
# --help returns 0, so argv and startup are fine. The hang is in processing.
# This job does one thing: run M1 on a trivial input for 20 seconds, find the
# blocks it spins in, and name them with tools/pcmap.py.

on:
  push:
    paths:
      - 'spikes/stage2-mini-c/**'
      - '.github/workflows/m1-hang.yml'
  workflow_dispatch:

concurrency:
  group: m1-hang-${{ github.ref }}
  cancel-in-progress: true

jobs:
  hang:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      M2PLANET_SHA: 34fbd5c2a9b6eb634a4f6ad95158dcd1efcf19e0
    steps:
      - uses: actions/checkout@v5

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qemu-user binutils-aarch64-linux-gnu

      - name: Fetch upstreams
        run: |
          git clone https://github.com/oriansj/M2-Planet.git upstream-m2planet
          git -C upstream-m2planet checkout "$M2PLANET_SHA"
          git -C upstream-m2planet submodule update --init --recursive
          git clone --recursive https://github.com/oriansj/mescc-tools.git upstream-mescc

      - name: Build ladder and M1
        run: |
          aarch64-linux-gnu-as -o s0.o spikes/stage0-as/stage0-as.aarch64.s
          aarch64-linux-gnu-ld -static -o stage0-as s0.o
          aarch64-linux-gnu-as -o elf.o spikes/elf/elf.aarch64.s
          aarch64-linux-gnu-ld -static -o elf elf.o
          cat spikes/stage1-as/stage1-as.s0 \
            | qemu-aarch64 ./stage0-as | qemu-aarch64 ./elf stage1
          cat spikes/stage2-mini-c/stage2-mini-c.s1 \
            | qemu-aarch64 ./stage1 | qemu-aarch64 ./stage0-as | qemu-aarch64 ./elf stage2
          L=upstream-m2planet/M2libc; S=upstream-mescc
          cat $L/bootstrap.c $L/bootstrappable.c $S/stringify.c $S/M1-macro.c > m1src.c
          qemu-aarch64 ./stage2 < m1src.c > m1.s1
          cat m1.s1 | qemu-aarch64 ./stage1 | qemu-aarch64 ./stage0-as | qemu-aarch64 ./elf M1
          make -C upstream-mescc M1 hex2
          echo "our M1: $(wc -c < M1) bytes, m1.s1 has $(grep -c '^:' m1.s1) labels"

      - name: 'Does the reference M1 handle the same input?'
        run: |
          printf ':main\n' > tiny.M1
          set +e
          timeout 30 upstream-mescc/bin/M1 -f tiny.M1 \
            --little-endian --architecture aarch64 -o ref.hex2 </dev/null
          echo "  gcc-built M1 rc=$? -> $(wc -c < ref.hex2 2>/dev/null || echo 0) bytes"
          set -e

      - name: 'ALL syscalls on a 6 byte input'
        run: |
          printf ':main\n' > tiny.M1
          set +e
          timeout 20 qemu-aarch64 -strace ./M1 -f tiny.M1 \
            --little-endian --architecture aarch64 -o /tmp/o.hex2 \
            </dev/null > sys.log 2>&1
          echo "  rc=$? (124 = hung on six bytes)"
          set -e
          echo "  total syscalls: $(wc -l < sys.log)"
          echo "  --- histogram ---"
          grep -oE '[a-z_0-9]+\(' sys.log | tr -d '(' | sort | uniq -c | sort -rn | head
          echo "  --- first 25 ---"
          head -25 sys.log
          echo "  --- last 10 ---"
          tail -10 sys.log

      - name: 'NAME THE LOOP: hottest blocks, mapped'
        run: |
          printf ':main\n' > tiny.M1
          set +e
          timeout 20 qemu-aarch64 -d in_asm -D hot.log ./M1 -f tiny.M1 \
            --little-endian --architecture aarch64 -o /tmp/o.hex2 \
            </dev/null >/dev/null 2>&1
          set -e
          echo "  trace lines: $(wc -l < hot.log)"
          echo "  --- top blocks by entry count ---"
          grep -oE '^0x[0-9a-f]+' hot.log | sort | uniq -c | sort -rn | head -10 > top.txt
          while read n addr; do
            printf '  %10s entries  ' "$n"
            python3 tools/pcmap.py m1.s1 "$addr" | tail -1
          done < top.txt

      - name: 'The C behind the hot label'
        continue-on-error: true
        run: |
          # Map the hottest label back to its function, then show that function
          # in the upstream source so the loop is readable.
          addr=$(head -1 top.txt | awk '{print $2}')
          fn=$(python3 tools/pcmap.py m1.s1 "$addr" | tail -1 \
                | sed -E 's/.*\(in ([A-Za-z0-9_]+) \+.*/\1/; t; s/.*  ([A-Za-z0-9_]+) \+.*/\1/')
          echo "hottest function: $fn"
          for f in upstream-mescc/M1-macro.c upstream-mescc/stringify.c \
                   upstream-m2planet/M2libc/bootstrap.c \
                   upstream-m2planet/M2libc/bootstrappable.c; do
            if grep -qE "^[a-zA-Z].*[ *]$fn\(" "$f"; then
              echo "--- $fn in $f ---"
              awk -v fn="$fn" '$0 ~ "^[a-zA-Z].*[ *]"fn"\\(" {p=1} p {print} p && /^}/ {exit}' "$f"
              break
            fi
          done
