name: struct-reverse-probe

# SPIKE. REDUCER for the fault m2libc-113-bisect located.
#
# Our stage-2-built M2-Planet compiles a small program byte-identically to
# upstream's (canary: 2813 bytes, sha 5ead19ee, three compilers agree), but
# segfaults on the FIRST struct any input defines. The prefix bisect narrowed
# the trigger to M2libc/sys/utsname.h -- files 1-4 of upstream's -f list define
# no struct at all -- and the PC mapped through tools/pcmap.py to:
#
#     PC 0x40e664 -> reverse_members_type_list + 156      (cc_types.c:572)
#     si_addr     =  0x120f9400048   <- a WILD pointer, not null, not truncated
#     0 writes    -- it dies parsing, long before emitting anything
#
# That function is twelve lines and does exactly three things this compiler has
# a documented history with:
#
#     struct type* root = NULL;      <- struct-pointer local WITH initialiser
#     struct type* next;             <- struct-pointer local, UNINITIALISED
#     next = head->members;          <- member LOAD  of a struct-pointer field
#     head->members = root;          <- member STORE of a struct-pointer field
#
# m71 fixed member get/set width for a `char*` field; `struct type*` is a
# different flag combination. m68 fixed prescan frame reservation for
# identifier-typed declarations; `struct T* x;` at statement position is its own
# case. m73 fixed a one-star-only declarator at file scope. This probe separates
# those so the next fix is aimed, not guessed.
#
# `members` is the SIXTH field of struct type (offset 40, all fields 8 bytes) --
# the struct is reproduced verbatim from cc.h so the offsets match the real one.
#
# EVERY probe runs TWICE: through our ladder, and through upstream's
# M2-Planet|M1|hex2. Upstream is the control. If upstream also misbehaves the
# probe program is out of subset and the probe is wrong, not the compiler.
#
# THE CONTROL NEEDS TWO THINGS AND BOTH ARE EASY TO FORGET. It needs a real
# libc -- libc-core.M1 is only _start/exit/__exit, so calloc goes unresolved --
# which means M2libc/aarch64/linux/bootstrap.c in the -f list. And that file's
# signatures are full of FILE*, a primitive M2-Planet registers ONLY inside
# if(BOOTSTRAP_MODE) (cc_types.c:177), so --bootstrap-mode is mandatory too.
# Upstream's own test1000 passes it for exactly this reason.

on:
  push:
    paths:
      - 'spikes/stage2-mini-c/**'
      - '.github/workflows/struct-reverse-probe.yml'
  workflow_dispatch:

concurrency:
  group: struct-reverse-probe-${{ github.ref }}
  cancel-in-progress: true

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      M2PLANET_SHA: bd2fe4b0659fd0ad3f476a5ad0ef801bd134665d
      MESCC_SHA: 5adfbf3
    steps:
      - uses: actions/checkout@v5

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qemu-user binutils-aarch64-linux-gnu gcc make

      - name: Fetch upstream (the control arm)
        run: |
          git clone https://github.com/oriansj/M2-Planet.git upstream-m2planet
          git -C upstream-m2planet checkout "$M2PLANET_SHA"
          git -C upstream-m2planet submodule update --init --recursive
          git clone --recursive https://github.com/oriansj/mescc-tools.git upstream-mescc
          git -C upstream-mescc checkout -q "$MESCC_SHA"
          git -C upstream-mescc submodule update --init --recursive
          make -C upstream-m2planet M2-Planet
          make -C upstream-mescc M1 hex2

      - name: Build the ladder
        run: |
          aarch64-linux-gnu-as -o s0.o spikes/stage0-as/stage0-as.aarch64.s
          aarch64-linux-gnu-ld -static -o stage0-as s0.o
          aarch64-linux-gnu-as -o elf.o spikes/elf/elf.aarch64.s
          aarch64-linux-gnu-ld -static -o elf elf.o
          cat spikes/stage1-as/stage1-as.s0 \
            | qemu-aarch64 ./stage0-as | qemu-aarch64 ./elf stage1
          cat spikes/stage2-mini-c/stage2-mini-c.s1 \
            | qemu-aarch64 ./stage1 | qemu-aarch64 ./stage0-as | qemu-aarch64 ./elf stage2
          test -x stage2

      - name: 'REDUCERS: isolate each operation in those twelve lines'
        run: |
          M=upstream-m2planet
          L=$M/M2libc
          LIB=$M/M2libc/aarch64
          fail=0

          # struct type, verbatim from cc.h -- members is field 6, offset 40.
          TYPE='struct type {
          struct type* next;
          int size;
          int offset;
          int is_signed;
          struct type* indirect;
          struct type* members;
          struct type* type;
          char* name;
          int options;
          };'

          # probe <label> <expected-rc> <c-source>
          #
          # EACH ARM GETS THE PROLOGUE IT REALLY USES. Ours: NULL as an enum,
          # and calloc/free come from the m53/m69 builtins. Control: M2libc's
          # own aarch64/linux/bootstrap.c, which is where upstream gets NULL,
          # calloc, malloc and brk. libc-core.M1 is ONLY _start/exit/__exit --
          # linking against it alone left every calloc unresolved, which is what
          # made the control disagree on eight of these and report SKIP.
          probe() {
            lbl="$1"; want="$2"; src="$3"
            rm -f p.c pc.c p.s1 p.ours p.M1 p.hex2 p.ref

            # --- ours: prog.c | stage2 | stage1 | stage0-as | elf ---
            printf 'enum {NULL = 0};\n%s\n' "$src" > p.c
            set +e
            timeout 60 qemu-aarch64 ./stage2 < p.c > p.s1 2>/dev/null
            s2rc=$?
            cat p.s1 | timeout 60 qemu-aarch64 ./stage1 \
              | timeout 60 qemu-aarch64 ./stage0-as \
              | timeout 60 qemu-aarch64 ./elf p.ours 2>/dev/null
            if [ -s p.ours ]; then
              timeout 60 qemu-aarch64 ./p.ours >/dev/null 2>&1; ours=$?
            else
              ours="nobin(s2=$s2rc)"
            fi
            set -e

            # --- control: upstream M2-Planet | M1 | hex2, WITH a real libc ---
            printf '%s\n' "$src" > pc.c
            set +e
            timeout 60 $M/bin/M2-Planet --architecture aarch64 --bootstrap-mode \
              -f "$L/aarch64/linux/bootstrap.c" -f pc.c -o p.M1 2>/tmp/ref.err
            m2rc=$?
            timeout 60 upstream-mescc/bin/M1 -f "$LIB/aarch64_defs.M1" \
              -f "$LIB/libc-core.M1" -f p.M1 --little-endian \
              --architecture aarch64 -o p.hex2 2>>/tmp/ref.err
            m1rc=$?
            timeout 60 upstream-mescc/bin/hex2 -f "$LIB/ELF-aarch64.hex2" \
              -f p.hex2 --little-endian --architecture aarch64 \
              --base-address 0x400000 -o p.ref 2>>/tmp/ref.err
            hxrc=$?
            if [ -s p.ref ]; then
              timeout 60 qemu-aarch64 ./p.ref >/dev/null 2>&1; ref=$?
            else
              ref="nobin(m2=$m2rc,m1=$m1rc,hex2=$hxrc)"
            fi
            set -e

            note=''
            [ "$ours" = 139 ] && note='OURS-SEGV'
            [ "$ours" = 124 ] && note='OURS-HUNG'
            [ "$ref"  = 139 ] && note="$note REF-SEGV"
            if [ "$ours" = "$want" ] && [ "$ref" = "$want" ]; then
              st='OK  '
            elif [ "$ref" != "$want" ]; then
              st='SKIP'; note="$note (CONTROL BROKE: $(head -1 /tmp/ref.err 2>/dev/null))"
            else
              st='XX  '; fail=1
            fi
            printf '  [%s] %-46s ours=%-4s ref=%-4s want=%-4s %s\n' \
              "$st" "$lbl" "$ours" "$ref" "$want" "$note"
          }

          echo "== declarations: does a struct-pointer local get a frame slot? =="
          probe 'struct-ptr local, assigned then compared' 7 \
            "$TYPE
            int main(){struct type* root; root=0; if(0==root){return 7;} return 1;}"

          probe 'struct-ptr local WITH initialiser' 7 \
            "$TYPE
            int main(){struct type* root=0; if(0==root){return 7;} return 1;}"

          probe 'two struct-ptr locals, 2nd uninitialised' 9 \
            "$TYPE
            int main(){struct type* root; struct type* next; root=0; next=0;
            if(0==root){if(0==next){return 9;}} return 1;}"

          probe 'struct-ptr local after a non-ptr local' 9 \
            "$TYPE
            int main(){int pad; struct type* root; struct type* next;
            pad=1; root=0; next=0;
            if(0==root){if(0==next){return 9;}} return 1;}"

          echo
          echo "== the member at offset 40 (field 6 of struct type) =="
          probe 'member STORE of literal 0, then load' 11 \
            "$TYPE
            int main(){struct type* a; a=calloc(1,sizeof(struct type));
            a->members=0; if(0==a->members){return 11;} return 1;}"

          probe 'member STORE of a pointer variable' 42 \
            "$TYPE
            int main(){struct type* a; struct type* b;
            a=calloc(1,sizeof(struct type)); b=calloc(1,sizeof(struct type));
            b->size=42; a->members=b; return a->members->size;}"

          probe 'member LOAD into a struct-ptr local' 42 \
            "$TYPE
            int main(){struct type* a; struct type* b; struct type* n;
            a=calloc(1,sizeof(struct type)); b=calloc(1,sizeof(struct type));
            b->size=42; a->members=b; n=a->members; return n->size;}"

          probe 'member chain a->members->members->size' 42 \
            "$TYPE
            int main(){struct type* a; struct type* b; struct type* c;
            a=calloc(1,sizeof(struct type)); b=calloc(1,sizeof(struct type));
            c=calloc(1,sizeof(struct type)); c->size=42;
            a->members=b; b->members=c; return a->members->members->size;}"

          echo
          echo "== the function itself =="
          REV="$TYPE
          struct type* reverse_members_type_list(struct type* head)
          {
            struct type* root; struct type* next;
            root=0;
            while(0!=head){next=head->members; head->members=root; root=head; head=next;}
            return root;
          }"

          probe 'reverse a 1-node list, head survives' 42 \
            "$REV
            int main(){struct type* a; struct type* r;
            a=calloc(1,sizeof(struct type)); a->size=42; a->members=0;
            r=reverse_members_type_list(a); return r->size;}"

          probe 'reverse a 3-node list, packed 3/2/1' 57 \
            "$REV
            int main(){struct type* a; struct type* b; struct type* c; struct type* r;
            a=calloc(1,sizeof(struct type)); b=calloc(1,sizeof(struct type));
            c=calloc(1,sizeof(struct type));
            a->size=1; b->size=2; c->size=3;
            a->members=b; b->members=c; c->members=0;
            r=reverse_members_type_list(a);
            return r->size*16 + r->members->size*4 + r->members->members->size;}"

          probe 'reverse, tail is NULL after reversal' 7 \
            "$REV
            int main(){struct type* a; struct type* b; struct type* r;
            a=calloc(1,sizeof(struct type)); b=calloc(1,sizeof(struct type));
            a->members=b; b->members=0;
            r=reverse_members_type_list(a);
            if(0==r->members->members){return 7;} return 1;}"

          echo
          echo "== verbatim source form: enum NULL + '= NULL' initialiser =="
          probe 'verbatim: enum NULL, = NULL init, NULL != head' 57 \
            "$TYPE
            struct type* reverse_members_type_list(struct type* head)
            {
              struct type* root = NULL;
              struct type* next;
              while(NULL != head)
              {
                next = head->members;
                head->members = root;
                root = head;
                head = next;
              }
              return root;
            }
            int main(){struct type* a; struct type* b; struct type* c; struct type* r;
            a=calloc(1,sizeof(struct type)); b=calloc(1,sizeof(struct type));
            c=calloc(1,sizeof(struct type));
            a->size=1; b->size=2; c->size=3;
            a->members=b; b->members=c; c->members=NULL;
            r=reverse_members_type_list(a);
            return r->size*16 + r->members->size*4 + r->members->members->size;}"

          echo
          echo "== WIDENED: what actually BUILDS the list (cc_types.c build_member) =="
          # The twelve lines above are clean, so the pointer was already garbage
          # when reverse_members_type_list received it. create_struct builds the
          # member list by PREPENDING in a loop (build_member returns i with
          # i->members = last), and utsname's members are `char sysname[65]` --
          # the ARRAY branch, whose size line is
          #     i->size = constant_expression() * member_type->type->size;
          # a CALL RESULT multiplied by a two-level member chain off a local.
          # On a value-stack machine that is exactly where call and chain
          # evaluation can misorder, so each piece gets its own reducer.
          HELP="$TYPE
          int member_size;
          struct type* mk(int v){struct type* p; p=calloc(1,sizeof(struct type));
          p->size=v; p->type=p; return p;}
          int three(){return 3;}
          struct type* rev(struct type* head){struct type* root; struct type* next;
          root=NULL;
          while(NULL!=head){next=head->members; head->members=root; root=head; head=next;}
          return root;}"

          probe 'call result -> struct-ptr local, member store' 7 \
            "$HELP
            int main(){struct type* i; struct type* m;
            i=calloc(1,sizeof(struct type)); m=mk(7); i->type=m;
            return i->type->size;}"

          probe 'member store of a call result directly' 9 \
            "$HELP
            int main(){struct type* i; i=calloc(1,sizeof(struct type));
            i->type=mk(9); return i->type->size;}"

          probe 'member chain inside arithmetic' 14 \
            "$HELP
            int main(){struct type* i; struct type* m;
            i=calloc(1,sizeof(struct type)); m=mk(7); i->type=m;
            return 2 * i->type->size;}"

          probe 'CALL RESULT * member chain (the array size line)' 21 \
            "$HELP
            int main(){struct type* mt; mt=mk(7);
            return three() * mt->type->size;}"

          probe 'that product STORED into a member' 21 \
            "$HELP
            int main(){struct type* i; struct type* mt;
            i=calloc(1,sizeof(struct type)); mt=mk(7);
            i->size = three() * mt->type->size; return i->size;}"

          probe 'global set in callee, read in caller' 5 \
            "$HELP
            int setms(){member_size=5; return 1;}
            int main(){member_size=0; setms(); return member_size;}"

          probe 'prepend in a loop, then reverse (3 nodes)' 27 \
            "$HELP
            int main(){struct type* L; struct type* q; int k;
            L=NULL; k=0;
            while(k<3){q=calloc(1,sizeof(struct type)); q->members=L;
            q->offset=k; q->size=k+1; L=q; k=k+1;}
            L=rev(L);
            return L->size*16 + L->members->size*4 + L->members->members->size;}"

          probe 'build_member + create_struct shape combined' 36 \
            "$HELP
            struct type* build(struct type* last, int off){
            struct type* i; struct type* mt;
            i=calloc(1,sizeof(struct type)); i->members=last; i->offset=off;
            mt=mk(2); i->type=mt;
            i->size = three() * mt->type->size;
            member_size = i->size; return i;}
            int main(){struct type* last; int n; int off;
            last=NULL; n=0; off=0;
            while(n<3){last=build(last,off); off=off+member_size; n=n+1;}
            last=rev(last);
            return last->offset*16 + last->members->offset*4
                   + last->members->members->offset;}"

          echo
          echo "== ABLATION: strip one ingredient from the failing case at a time =="
          # Every ingredient passes alone; only the composition segfaults. So
          # remove them one at a time -- the first variant that PASSES names
          # the ingredient that cannot coexist with the others.
          #
          # What is unique to the failing program: build() is the first FUNCTION
          # that has a struct-pointer PARAMETER, declares struct-pointer LOCALS,
          # AND makes calls from inside its own body -- then is called in a loop
          # with its own result fed back in as that parameter. rev() has the
          # params and locals but makes no calls; the passing prepend-loop had
          # the loop but no helper function.
          ABL="$TYPE
          int member_size;
          struct type* mk(int v){struct type* p; p=calloc(1,sizeof(struct type));
          p->size=v; p->type=p; return p;}
          int three(){return 3;}
          struct type* rev(struct type* h){struct type* r; struct type* n; r=NULL;
          while(NULL!=h){n=h->members; h->members=r; r=h; h=n;} return r;}"

          probe 'A1 base minus rev() at the end' 216 \
            "$ABL
            struct type* build(struct type* last, int off){
            struct type* i; struct type* mt;
            i=calloc(1,sizeof(struct type)); i->members=last; i->offset=off;
            mt=mk(2); i->type=mt; i->size=three()*mt->type->size;
            member_size=i->size; return i;}
            int main(){struct type* last; int n; int off; last=NULL; n=0; off=0;
            while(n<3){last=build(last,off); off=off+member_size; n=n+1;}
            return last->offset*16 + last->members->offset*4
                   + last->members->members->offset;}"

          probe 'A2 base minus the global (off computed inline)' 36 \
            "$ABL
            struct type* build(struct type* last, int off){
            struct type* i; struct type* mt;
            i=calloc(1,sizeof(struct type)); i->members=last; i->offset=off;
            mt=mk(2); i->type=mt; i->size=three()*mt->type->size; return i;}
            int main(){struct type* last; int n; int off; last=NULL; n=0; off=0;
            while(n<3){last=build(last,off); off=off+6; n=n+1;}
            last=rev(last);
            return last->offset*16 + last->members->offset*4
                   + last->members->members->offset;}"

          probe 'A3 base minus call*chain (constant size)' 36 \
            "$ABL
            struct type* build(struct type* last, int off){
            struct type* i; struct type* mt;
            i=calloc(1,sizeof(struct type)); i->members=last; i->offset=off;
            mt=mk(2); i->type=mt; i->size=6;
            member_size=i->size; return i;}
            int main(){struct type* last; int n; int off; last=NULL; n=0; off=0;
            while(n<3){last=build(last,off); off=off+member_size; n=n+1;}
            last=rev(last);
            return last->offset*16 + last->members->offset*4
                   + last->members->members->offset;}"

          probe 'A4 base minus the second local mt' 36 \
            "$ABL
            struct type* build(struct type* last, int off){
            struct type* i;
            i=calloc(1,sizeof(struct type)); i->members=last; i->offset=off;
            i->size=three()*2; member_size=i->size; return i;}
            int main(){struct type* last; int n; int off; last=NULL; n=0; off=0;
            while(n<3){last=build(last,off); off=off+member_size; n=n+1;}
            last=rev(last);
            return last->offset*16 + last->members->offset*4
                   + last->members->members->offset;}"

          probe 'A5 base minus the loop (two explicit calls)' 24 \
            "$ABL
            struct type* build(struct type* last, int off){
            struct type* i; struct type* mt;
            i=calloc(1,sizeof(struct type)); i->members=last; i->offset=off;
            mt=mk(2); i->type=mt; i->size=three()*mt->type->size;
            member_size=i->size; return i;}
            int main(){struct type* a; struct type* b;
            a=build(NULL,0); b=build(a,6);
            return b->offset*4 + b->members->offset;}"

          probe 'A6 base with two iterations, not three' 6 \
            "$ABL
            struct type* build(struct type* last, int off){
            struct type* i; struct type* mt;
            i=calloc(1,sizeof(struct type)); i->members=last; i->offset=off;
            mt=mk(2); i->type=mt; i->size=three()*mt->type->size;
            member_size=i->size; return i;}
            int main(){struct type* last; int n; int off; last=NULL; n=0; off=0;
            while(n<2){last=build(last,off); off=off+member_size; n=n+1;}
            last=rev(last);
            return last->offset*16 + last->members->offset;}"

          probe 'A7 base with NO user calls inside build (builtins only)' 36 \
            "$ABL
            struct type* build(struct type* last, int off){
            struct type* i; struct type* mt;
            i=calloc(1,sizeof(struct type)); mt=calloc(1,sizeof(struct type));
            mt->size=2; mt->type=mt;
            i->members=last; i->offset=off; i->type=mt;
            i->size=3*mt->type->size; member_size=i->size; return i;}
            int main(){struct type* last; int n; int off; last=NULL; n=0; off=0;
            while(n<3){last=build(last,off); off=off+member_size; n=n+1;}
            last=rev(last);
            return last->offset*16 + last->members->offset*4
                   + last->members->members->offset;}"

          echo
          echo "== BRACKET: A4 passes with ONE local, A3 fails with TWO =="
          # A4 and A3 differ in nothing but the second struct-pointer local, so
          # add it back one step at a time. The first B that SEGVs is the exact
          # construct. NOTE the earlier MIN result was a FALSE PASS: its main
          # returned `off` and never dereferenced `last`, so a corrupted pointer
          # went unseen. MIN2 below repeats it with a dereference.
          BR="$TYPE
          int member_size;
          int three(){return 3;}
          struct type* rev(struct type* h){struct type* r; struct type* n; r=NULL;
          while(NULL!=h){n=h->members; h->members=r; r=h; h=n;} return r;}"
          RUN="int main(){struct type* last; int n; int off; last=NULL; n=0; off=0;
          while(n<3){last=build(last,off); off=off+member_size; n=n+1;}
          last=rev(last);
          return last->offset*16 + last->members->offset*4
                 + last->members->members->offset;}"

          probe 'B0 one local (this is A4, known good)' 36 \
            "$BR
            struct type* build(struct type* last, int off){struct type* i;
            i=calloc(1,sizeof(struct type)); i->members=last; i->offset=off;
            i->size=three()*2; member_size=i->size; return i;}
            $RUN"

          probe 'B1 + second ptr local DECLARED, never used' 36 \
            "$BR
            struct type* build(struct type* last, int off){struct type* i;
            struct type* mt;
            i=calloc(1,sizeof(struct type)); i->members=last; i->offset=off;
            i->size=three()*2; member_size=i->size; return i;}
            $RUN"

          probe 'B2 + second ptr local = NULL' 36 \
            "$BR
            struct type* build(struct type* last, int off){struct type* i;
            struct type* mt;
            i=calloc(1,sizeof(struct type)); mt=NULL; i->members=last;
            i->offset=off; i->size=three()*2; member_size=i->size; return i;}
            $RUN"

          probe 'B3 + second ptr local = i' 36 \
            "$BR
            struct type* build(struct type* last, int off){struct type* i;
            struct type* mt;
            i=calloc(1,sizeof(struct type)); mt=i; i->members=last;
            i->offset=off; i->size=three()*2; member_size=i->size; return i;}
            $RUN"

          probe 'B4 + second ptr local = calloc(...)' 36 \
            "$BR
            struct type* build(struct type* last, int off){struct type* i;
            struct type* mt;
            i=calloc(1,sizeof(struct type)); mt=calloc(1,sizeof(struct type));
            i->members=last; i->offset=off; i->size=three()*2;
            member_size=i->size; return i;}
            $RUN"

          probe 'B5 + second local is an int, not a pointer' 36 \
            "$BR
            struct type* build(struct type* last, int off){struct type* i;
            int mt;
            i=calloc(1,sizeof(struct type)); mt=2; i->members=last;
            i->offset=off; i->size=three()*2; member_size=i->size; return i;}
            $RUN"

          probe 'MIN2 struct-free, but DEREFERENCING the result' 12 \
            "int member_size;
            int* build(int* last, int off){int* i; int* mt;
            i=calloc(1,8); mt=calloc(1,8); i[0]=off; mt[0]=2;
            member_size=6; return i;}
            int main(){int* last; int n; int off; last=NULL; n=0; off=0;
            while(n<3){last=build(last,off); off=off+member_size; n=n+1;}
            return last[0];}"

          echo
          echo "== PADDING: hold the program constant, vary ONLY the code size =="
          # A4 and B0 are the SAME construct. A4 additionally defines mk(), which
          # it never calls, and A4 passes while B0 SEGVs. Dead code changes the
          # outcome, so this is a LAYOUT bug, not a construct bug -- and every
          # earlier conclusion (second local, global, loop) was really measuring
          # emitted size.
          #
          # Two things in the emitted program are DATA sitting in the instruction
          # stream: each global (b __gs<name> / :g_<name> / eight .byte 0) and
          # calloc's bump pointer :__mp (eight .byte 0). Both are 8-byte objects
          # reached with `ldr x`, but instructions are 4 bytes, so whether they
          # land 8-ALIGNED depends on how much code precedes them.
          #
          # Add one dead function at a time. If pass/fail alternates with a
          # period of two instructions, that is the alignment of those objects.
          PADBASE="$BR
          struct type* build(struct type* last, int off){struct type* i;
          i=calloc(1,sizeof(struct type)); i->members=last; i->offset=off;
          i->size=three()*2; member_size=i->size; return i;}"

          addr() { python3 tools/pcmap.py "$1" --list 2>/dev/null \
                   | awk -v n="$2" '$2==n{print $1; exit}'; }

          printf '  %-4s %-9s %-8s %-12s %-12s %s\n' \
                 PAD BYTES RC 'g_member_size' '__mp' VERDICT
          for n in 0 1 2 3 4 5 6 7; do
            pad=''
            k=0
            while [ "$k" -lt "$n" ]; do
              pad="$pad
              int dead$k(int q){return q+$k;}"
              k=$((k+1))
            done
            printf 'enum {NULL = 0};\n%s\n%s\n%s\n' "$pad" "$PADBASE" "$RUN" > pad.c
            set +e
            timeout 60 qemu-aarch64 ./stage2 < pad.c > pad.s1 2>/dev/null
            rm -f pad.bin
            cat pad.s1 | timeout 60 qemu-aarch64 ./stage1 \
              | timeout 60 qemu-aarch64 ./stage0-as \
              | timeout 60 qemu-aarch64 ./elf pad.bin 2>/dev/null
            timeout 60 qemu-aarch64 ./pad.bin >/dev/null 2>&1
            rc=$?
            set -e
            gm=$(addr pad.s1 g_member_size)
            mp=$(addr pad.s1 __mp)
            gmod='-'; mmod='-'
            [ -n "$gm" ] && gmod=$(( $(printf '%d' "$gm") % 8 ))
            [ -n "$mp" ] && mmod=$(( $(printf '%d' "$mp") % 8 ))
            v=ok; [ "$rc" = 139 ] && v=SEGV; [ "$rc" = 36 ] || [ "$rc" = 139 ] || v="rc=$rc"
            printf '  %-4s %-9s %-8s %-12s %-12s %s\n' \
              "$n" "$(wc -c < pad.bin 2>/dev/null || echo 0)" "$rc" \
              "$gm (mod8=$gmod)" "$mp (mod8=$mmod)" "$v"
          done
          echo
          echo "  If SEGV tracks mod8=4 and ok tracks mod8=0, the bug is that an"
          echo "  8-byte object embedded in the code stream is only 4-byte aligned."
          echo "  If pass/fail is unrelated to those columns, layout still matters"
          echo "  but through something else -- compare two adjacent pad values."

          echo
          if [ "$fail" = 0 ]; then
            echo "PASS: every reducer agrees with the control."
            echo "      The fault is NOT in these operations in isolation --"
            echo "      widen the reducer toward cc_types.c's real caller."
          else
            echo "FAIL: a reducer diverged from the control. The first XX line is"
            echo "      the smallest program that miscompiles. That is the bug."
            exit 1
          fi
