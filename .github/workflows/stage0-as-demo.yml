name: stage0-as-demo

# SPIKE stage0-as demo (invariants suspended). Assembles a counting LOOP
# (labels + branch + cmp + add) and checks it two ways:
#   1) byte-identical to what the real assembler produces (pinpoints any
#      encoding bug to the exact instruction), and
#   2) runs end-to-end through the pipeline and exits with the computed code (5).

on:
  push:
    paths:
      - 'spikes/stage0-as/**'
      - 'spikes/elf/**'
      - '.github/workflows/stage0-as-demo.yml'
  workflow_dispatch:

concurrency:
  group: stage0-as-demo-${{ github.ref }}
  cancel-in-progress: true

jobs:
  demo:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5

      - name: Install toolchain (qemu-user + aarch64 binutils)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qemu-user binutils-aarch64-linux-gnu

      - name: Assemble a loop, compare to real `as`, and run it
        run: |
          aarch64-linux-gnu-as -o s0.o spikes/stage0-as/stage0-as.aarch64.s
          aarch64-linux-gnu-ld -static -o stage0-as s0.o
          aarch64-linux-gnu-as -o elf.o spikes/elf/elf.aarch64.s
          aarch64-linux-gnu-ld -static -o elf elf.o

          # program in stage0-as's language: count x0 from 0 to 5, exit(5)
          printf 'mov x0 0\nmov x1 5\n:a\nadd x0 x0 1\ncmp x0 x1\nb.ne a\nmov x8 93\nsvc\n' > prog.s0
          echo "=== program ==="; cat prog.s0

          # reference bytes from the real assembler (same program)
          printf '.text\n.global _start\n_start:\n\tmov x0,#0\n\tmov x1,#5\na:\n\tadd x0,x0,#1\n\tcmp x0,x1\n\tb.ne a\n\tmov x8,#93\n\tsvc #0\n' > ref.s
          aarch64-linux-gnu-as -o ref.o ref.s
          aarch64-linux-gnu-objcopy -O binary --only-section=.text ref.o ref.bin

          # our output
          cat prog.s0 | qemu-aarch64 ./stage0-as > our.bin

          echo "=== bytes ==="
          echo "ours: $(od -An -v -tx1 our.bin | tr -d ' \n')"
          echo "ref : $(od -An -v -tx1 ref.bin | tr -d ' \n')"

          # run end to end
          cat prog.s0 | qemu-aarch64 ./stage0-as | qemu-aarch64 ./elf out.elf
          set +e; qemu-aarch64 ./out.elf; rc=$?; set -e
          echo "=== run: exit $rc (expected 5) ==="

          byteok=no; cmp -s our.bin ref.bin && byteok=yes

          {
            echo "## stage0-as — labels + control flow"
            echo '```'
            echo "byte-identical to real as : $byteok"
            echo "loop program exit         : $rc  (expected 5)"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$byteok" = "yes" ] && [ "$rc" = "5" ]; then
            echo "PASS: labels/branches/arithmetic assemble byte-identically AND run"
          else
            echo "FAIL: byteok=$byteok exit=$rc — compare the two hex lines above"
            exit 1
          fi
