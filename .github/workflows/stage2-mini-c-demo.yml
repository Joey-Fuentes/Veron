name: stage2-mini-c-demo

# SPIKE (invariants suspended). Stage 2 = mini-c. Now supports VARIABLES:
#   int main(){ int a=<expr>; int b=<expr>; ... return <expr>; }
# single-char var names -> labeled byte slots (:a..:z) in the emitted program;
# a factor may be a number, a variable (load), or ( expr ). Compiler uses
# shunting-yard; emitted code uses a brk value stack. Written in stage-1's
# language. (Byte-sized vars: values 0-255 for this increment.)

on:
  push:
    paths:
      - 'spikes/stage2-mini-c/**'
      - 'spikes/stage1-as/**'
      - 'spikes/stage0-as/**'
      - 'spikes/elf/**'
      - '.github/workflows/stage2-mini-c-demo.yml'
  workflow_dispatch:

concurrency:
  group: stage2-mini-c-demo-${{ github.ref }}
  cancel-in-progress: true

jobs:
  demo:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends qemu-user binutils-aarch64-linux-gnu
      - name: Build ladder and compile C with variables
        run: |
          aarch64-linux-gnu-as -o s0.o spikes/stage0-as/stage0-as.aarch64.s
          aarch64-linux-gnu-ld -static -o stage0-as s0.o
          aarch64-linux-gnu-as -o elf.o spikes/elf/elf.aarch64.s
          aarch64-linux-gnu-ld -static -o elf elf.o
          cat spikes/stage1-as/stage1-as.s0 | qemu-aarch64 ./stage0-as | qemu-aarch64 ./elf stage1
          cat spikes/stage2-mini-c/stage2-mini-c.s1 | qemu-aarch64 ./stage1 | qemu-aarch64 ./stage0-as | qemu-aarch64 ./elf stage2
          test -x stage2 || { echo "stage2 not built"; exit 1; }

          fail=0
          try() {
            printf '%s' "$1" | qemu-aarch64 ./stage2 > out.s
            cat out.s | qemu-aarch64 ./stage0-as | qemu-aarch64 ./elf a.out
            set +e; qemu-aarch64 ./a.out; rc=$?; set -e
            printf '  %-52s exit=%-4s want=%-4s %s\n' "$1" "$rc" "$2" "$([ "$rc" = "$2" ] && echo OK || { echo DIFF; fail=1; })"
          }
          echo "== stage-2 compiling C with variables =="
          try 'int main(){int a=2; int b=3; return a+b;}'             5
          try 'int main(){int a=10; return a*a;}'                     100
          try 'int main(){int a=5; int b=a+1; return a*b;}'           30
          try 'int main(){int a=100; int b=50; return a-b;}'          50
          try 'int main(){int x=7; return (x+1)*2;}'                  16
          try 'int main(){int a=2; int b=3; int c=4; return a+b*c;}'  14
          try 'int main(){int a=3; int b=a*a; int c=b+1; return c;}'  10
          try 'int main(){int a=2; int b=a+a; int c=b*b; return c;}'  16
          try 'int main(){return 2+3*4;}'                             14
          try 'int main(){int a=200; return a;}'                      200

          {
            echo "## stage2-mini-c — variables + assignment"
            echo '```'
            echo "int a=2;int b=3;return a+b;  -> 5"
            echo "int a=5;int b=a+1;return a*b;-> 30"
            echo "int a=3;int b=a*a;int c=b+1;return c; -> 10"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$fail" = 0 ]; then
            echo "PASS: our stage-2 compiles variables/assignment to working aarch64 code."
          else
            echo "FAIL: see DIFFs above"; exit 1
          fi
