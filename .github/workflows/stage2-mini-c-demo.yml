name: stage2-mini-c-demo

# SPIKE (invariants suspended). Stage 2 = mini-c. Supports:
#   one-or-more  int name(params){ ... }  functions; a body has
#   int a=<expr>; a=<expr>; if(<expr>){...} while(<expr>){...} return <expr>;
# MULTI-CHAR names -> FRAME-RELATIVE 64-bit WORD (8-byte) slots at x10+off in
# DECLARATION order (params first, then locals; off=i*8) — int is the machine word
# (int == pointer width), resolved by a live symbol table +
# word ldr/str; a factor may be a number, a variable (load), ( expr ), or a CALL
# f(a,b). Expressions support + - * and unsigned / % (udiv; % = a-(a/b)*b) and
# comparisons < > <= >= == != (branchless,
# unsigned-32, yielding 0/1) so conditions can be relations. Precedence, low->high:
# == !=  <  < > <= >=  <  + -  <  * . <= is '>' flipped, >= is '<' flipped,
# != is (d|-d)>>63, == is != flipped (all reuse the existing sign-bit recipe).
# Control flow (if/while, nested) tests the condition for nonzero; codegen is
# iterative with a block stack and NAMED labels (b.eq __L<id> / b __L<id>) since
# A22 -- backpatched @<pos> positions are retired, and stage1
# passes these through. FUNCTIONS use :name / bl name (resolved by stage1) plus a
# runtime calling convention: x9 value stack, x10 frame base, x11 frame stack
# (frames nest -> recursion). A call evaluates args L->R onto the value stack then
# bl f; the callee saves x10/x30, opens a frame, pops params, and 'return e'
# restores and rets with the result on the value stack. Program is entered via
# 'bl main'; main's return is the exit code. So the pipeline is now
#   prog.c | stage2 | stage1 | stage0-as | elf
# and the only labels an emitted program carries are function names (never
# per-if/while or per-variable). With the enlarged 64KB input / 256KB output
# buffers, large multi-block programs compile and run — see the 80-block test.
# Compiler uses shunting-yard (re-entrant, for call arguments) + a value stack.
# Written in stage-1's language.
#
# NB: with only + - * and a mod-256 exit, byte vs word storage is
# indistinguishable by exit code, so this demo also STRUCTURALLY checks the
# emitted program (word ldr/str + frame-relative vars, no slot labels; if/while
# zero-test + numeric branches; :func labels + prologue/epilogue for calls)
# and byte-compares the word ldr/str forms against real `as`. Exit codes for the
# loop/if/function/recursion programs are genuine end-to-end checks.

on:
  push:
    paths:
      - 'spikes/stage2-mini-c/**'
      - 'spikes/stage1-as/**'
      - 'spikes/stage0-as/**'
      - 'spikes/elf/**'
      - '.github/workflows/stage2-mini-c-demo.yml'
  workflow_dispatch:

concurrency:
  group: stage2-mini-c-demo-${{ github.ref }}
  cancel-in-progress: true

jobs:
  demo:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 2   # A24 byte-compares stage 2 against HEAD~1
      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends qemu-user binutils-aarch64-linux-gnu
      - name: Build ladder and compile C (variables, if/while, reassignment)
        run: |
          aarch64-linux-gnu-as -o s0.o spikes/stage0-as/stage0-as.aarch64.s
          aarch64-linux-gnu-ld -static -o stage0-as s0.o
          aarch64-linux-gnu-as -o elf.o spikes/elf/elf.aarch64.s
          aarch64-linux-gnu-ld -static -o elf elf.o
          cat spikes/stage1-as/stage1-as.s0 | qemu-aarch64 ./stage0-as | qemu-aarch64 ./elf stage1
          cat spikes/stage2-mini-c/stage2-mini-c.s1 | qemu-aarch64 ./stage1 | qemu-aarch64 ./stage0-as | qemu-aarch64 ./elf stage2
          test -x stage2 || { echo "stage2 not built"; exit 1; }

          # ---- byte-compare the WORD var load/store forms against real `as` ----
          printf 'ldr w0 x1\nstr w0 x1\n' > ld.s0
          printf '.text\n.global _start\n_start:\n\tldr w0,[x1]\n\tstr w0,[x1]\n' > ld_ref.s
          aarch64-linux-gnu-as -o ld_ref.o ld_ref.s
          aarch64-linux-gnu-objcopy -O binary --only-section=.text ld_ref.o ld_ref.bin
          cat ld.s0 | qemu-aarch64 ./stage0-as > ld.bin
          ld_ok=no; cmp -s ld.bin ld_ref.bin && ld_ok=yes
          echo "word ldr/str ours: $(od -An -v -tx1 ld.bin | tr -d ' \n')"
          echo "word ldr/str ref : $(od -An -v -tx1 ld_ref.bin | tr -d ' \n')"

          # ---- byte-compare the NEW udiv instruction against real `as` ----
          printf 'udiv x0 x1 x0\nudiv x5 x3 x2\n' > udiv.s0
          printf '.text\n.global _start\n_start:\n\tudiv x0,x1,x0\n\tudiv x5,x3,x2\n' > udiv_ref.s
          aarch64-linux-gnu-as -o udiv_ref.o udiv_ref.s
          aarch64-linux-gnu-objcopy -O binary --only-section=.text udiv_ref.o udiv_ref.bin
          cat udiv.s0 | qemu-aarch64 ./stage0-as > udiv.bin
          udiv_ok=no; cmp -s udiv.bin udiv_ref.bin && udiv_ok=yes
          echo "udiv ours: $(od -An -v -tx1 udiv.bin | tr -d ' \n')"
          echo "udiv ref : $(od -An -v -tx1 udiv_ref.bin | tr -d ' \n')"

          # ---- byte-compare the NEW eor instruction against real `as` ----
          # `^` lowers onto this stage-0 leaf. EOR is the logical shifted-register
          # sibling of AND (0x8A..) and ORR (0xAA..), differing only in opc, so it
          # is 0xCA.. -- but "differs only in opc" is exactly the kind of claim that
          # must be settled by the real assembler, not by derivation.
          printf 'eor x0 x1 x0\neor x9 x9 x1\neor x5 x3 x2\n' > eor.s0
          printf '.text\n.global _start\n_start:\n\teor x0,x1,x0\n\teor x9,x9,x1\n\teor x5,x3,x2\n' > eor_ref.s
          aarch64-linux-gnu-as -o eor_ref.o eor_ref.s
          aarch64-linux-gnu-objcopy -O binary --only-section=.text eor_ref.o eor_ref.bin
          cat eor.s0 | qemu-aarch64 ./stage0-as > eor.bin
          eor_ok=no; cmp -s eor.bin eor_ref.bin && eor_ok=yes
          echo "eor ours: $(od -An -v -tx1 eor.bin | tr -d ' \n')"
          echo "eor ref : $(od -An -v -tx1 eor_ref.bin | tr -d ' \n')"

          # ---- A31: Rn=31 in ADD (immediate) is SP, not XZR -------------------------
          # The argv preamble reads the kernel's initial stack with `add x3 x31 0`.
          # That is only correct if ADD (immediate) treats Rn=31 as the stack pointer --
          # and the REGISTER form of add treats Rm=31 as XZR instead, so "31 means SP"
          # is exactly the kind of claim that must be settled by the real assembler
          # rather than derived. `mov x3, sp` IS `add x3, sp, #0`. Note the preamble
          # deliberately copies SP into an ordinary register first and never uses SP as
          # a load base: on AArch64 an SP-based access faults unless SP is 16-byte
          # aligned, and nothing in this ladder maintains that invariant.
          printf 'add x3 x31 0\nadd x0 x3 8\n' > sp.s0
          printf '.text\n.global _start\n_start:\n\tmov x3,sp\n\tadd x0,x3,#8\n' > sp_ref.s
          aarch64-linux-gnu-as -o sp_ref.o sp_ref.s
          aarch64-linux-gnu-objcopy -O binary --only-section=.text sp_ref.o sp_ref.bin
          cat sp.s0 | qemu-aarch64 ./stage0-as > sp.bin
          sp_ok=no; cmp -s sp.bin sp_ref.bin && sp_ok=yes
          echo "sp ours: $(od -An -v -tx1 sp.bin | tr -d ' \n')"
          echo "sp ref : $(od -An -v -tx1 sp_ref.bin | tr -d ' \n')"

          # ---- structural: emitted program uses WORD forms + FRAME-RELATIVE vars ----
          printf '%s' 'int main(){int a=5; int b=a+2; return b;}' | qemu-aarch64 ./stage2 > word.s
          struct_ok=yes
          grep -q 'ldr x0 x1' word.s || { echo "MISSING 64-bit word var load"; struct_ok=no; }
          grep -q 'str x0 x1' word.s || { echo "MISSING 64-bit word var store"; struct_ok=no; }
          grep -q 'str x0 x9' word.s || { echo "MISSING 64-bit value push"; struct_ok=no; }
          grep -q 'ldrb w0 x1' word.s && { echo "REGRESSION: byte var load present"; struct_ok=no; }
          grep -q 'strb w0 x1' word.s && { echo "REGRESSION: byte var store present"; struct_ok=no; }
          # variables are frame-relative (x10 base, decl-order 8-byte slots, 4-digit off)
          grep -q 'add x10 x11 16' word.s || { echo "MISSING frame-base setup (add x10 x11 16)"; struct_ok=no; }
          grep -q 'add x1 x10 '   word.s || { echo "MISSING frame-relative var access"; struct_ok=no; }
          grep -q 'add x1 x10 0000' word.s || { echo "MISSING 1st-decl var offset 0000"; struct_ok=no; }
          grep -q 'add x1 x10 0008' word.s || { echo "MISSING 2nd-decl var offset 0008"; struct_ok=no; }
          grep -q '^:a$'          word.s && { echo "REGRESSION: labeled :a slot present"; struct_ok=no; }
          grep -q '^:z$'          word.s && { echo "REGRESSION: labeled :z slot present"; struct_ok=no; }
          grep -q '^\.byte 0$'    word.s && { echo "REGRESSION: .byte 0 slot table present"; struct_ok=no; }

          # ---- structural: pointers emit address-of (add x0 x10) + deref (ldr x1 x1) ----
          printf '%s' 'int main(){int x=5; int* p; p=&x; *p=*p+1; return *p;}' | qemu-aarch64 ./stage2 > ptr.s
          grep -q 'add x0 x10' ptr.s || { echo "MISSING &name address-of (add x0 x10)"; struct_ok=no; }
          grep -q 'ldr x1 x1'  ptr.s || { echo "MISSING *name deref (ldr x1 x1)"; struct_ok=no; }

          # ---- structural: arrays scale the index by 8 (lsl x2 x2 x3) + base+index ----
          printf '%s' 'int main(){int a[3]; int i; i=0; while(i<3){a[i]=i; i=i+1;} return a[2];}' | qemu-aarch64 ./stage2 > arr.s
          grep -q 'lsl x2 x2 x3' arr.s || { echo "MISSING subscript index scaling (lsl x2 x2 x3)"; struct_ok=no; }
          grep -q 'add x1 x1 x2'  arr.s || { echo "MISSING subscript base+index (add x1 x1 x2)"; struct_ok=no; }

          # ---- structural: char access uses byte load/store (ldrb/strb) + char literal ----
          printf '%s' "int main(){char s[4]; char* p; p=s; s[0]=65; return p[0];}" | qemu-aarch64 ./stage2 > byte.s
          grep -q 'ldrb w0 x1' byte.s || { echo "MISSING char byte load (ldrb w0 x1)"; struct_ok=no; }
          grep -q 'strb w0 x1' byte.s || { echo "MISSING char byte store (strb w0 x1)"; struct_ok=no; }
          printf '%s' "int main(){char c; c='A'; return c;}" | qemu-aarch64 ./stage2 > clit.s
          grep -q 'mov x0 0065' clit.s || { echo "MISSING char literal value (mov x0 0065)"; struct_ok=no; }

          # ---- structural: string literal -> adr into a data section (:__d + .byte) ----
          printf '%s' 'int main(){char* s; s="hi"; return s[0];}' | qemu-aarch64 ./stage2 > str.s
          grep -q 'adr x0 __d' str.s || { echo "MISSING string literal address (adr x0 __d)"; struct_ok=no; }
          grep -q ':__d'       str.s || { echo "MISSING data-section label (:__d)"; struct_ok=no; }
          grep -q '.byte'      str.s || { echo "MISSING data-section bytes (.byte)"; struct_ok=no; }

          # ---- structural: a global is addressed via adr g_<name> + a :g_ data label ----
          printf '%s' 'int g; int main(){g=5; return g;}' | qemu-aarch64 ./stage2 > glob.s
          grep -q 'adr x1 g_' glob.s || { echo "MISSING global address (adr x1 g_)"; struct_ok=no; }
          grep -q ':g_'       glob.s || { echo "MISSING global data label (:g_)"; struct_ok=no; }

          # ---- structural: bitwise-and lowers to `and`, left-shift to `lsl` ----
          printf '%s' 'int main(){return 12&10;}' | qemu-aarch64 ./stage2 > band.s
          grep -q 'and x0 x1 x0' band.s || { echo "MISSING bitwise-and codegen (and x0 x1 x0)"; struct_ok=no; }
          printf '%s' 'int main(){return 1<<4;}' | qemu-aarch64 ./stage2 > bshl.s
          grep -q 'lsl x0 x1 x0' bshl.s || { echo "MISSING shift codegen (lsl x0 x1 x0)"; struct_ok=no; }

          # ---- structural: else emits a skip branch plus the if-cond branch ----
          # A22: both are NAMED labels now, not backpatched @<pos> positions.
          printf '%s' 'int main(){if(0){return 1;}else{return 2;}return 3;}' | qemu-aarch64 ./stage2 > ielse.s
          grep -q 'b.eq __L' ielse.s || { echo "MISSING if-cond branch (b.eq __L)"; struct_ok=no; }
          grep -q '^b __L'   ielse.s || { echo "MISSING else skip branch (b __L)"; struct_ok=no; }

          # ---- structural: if/while emit a zero-test + a NAMED branch (A22) ----
          # SUPERSEDES the m29 backpatched-numeric design. Backpatching existed only
          # because stage0-as's 128-entry symtab capped a program's labels; m32 made
          # stage 1 a numeric RESOLVER, so labels are bounded only by memory. Every
          # branch now names its target, which is what lets stage 2 stream its output.
          # Labels in an emitted program are function names plus generated :__L ids.
          cf_ok=yes
          printf '%s' 'int main(){int a=1; if(a){ a=a+1; } return a;}' | qemu-aarch64 ./stage2 > if.s
          grep -q 'cmp x0 0'   if.s || { echo "if: MISSING zero-test"; cf_ok=no; }
          grep -q 'b.eq __L'   if.s || { echo "if: MISSING named skip branch b.eq __L"; cf_ok=no; }
          grep -q '@'          if.s && { echo "if: an absolute @<pos> survived"; cf_ok=no; }
          printf '%s' 'int main(){int a=3; while(a){ a=a-1; } return a;}' | qemu-aarch64 ./stage2 > wh.s
          grep -q '^b __L'     wh.s || { echo "while: MISSING named back branch b __L"; cf_ok=no; }
          grep -q 'b.eq __L'   wh.s || { echo "while: MISSING named exit branch b.eq __L"; cf_ok=no; }
          [ "$(grep -c '^:__L' wh.s)" = 2 ] || { echo "while: expected exactly 2 generated labels"; cf_ok=no; }
          for f in if.s wh.s; do
            grep '^:' "$f" | grep -v '^:main$' | grep -qv '^:__L' \
              && { echo "$f: unexpected label (only :main and :__L* allowed)"; cf_ok=no; }
          done
          # backpatching guaranteed target validity BY CONSTRUCTION; labels do not, so
          # check it directly: every branch target defined, every definition referenced.
          for f in if.s wh.s; do
            grep -o '^:__L[0-9]*' "$f" | sed 's/^://' | sort -u > cf_def.txt
            grep -oE '^b(\.eq|\.ne)? +__L[0-9]*' "$f" | awk '{print $2}' | sort -u > cf_ref.txt
            comm -23 cf_ref.txt cf_def.txt | grep -q . && { echo "$f: branch to an UNDEFINED label"; cf_ok=no; }
            comm -13 cf_ref.txt cf_def.txt | grep -q . && { echo "$f: UNREFERENCED label definition"; cf_ok=no; }
          done

          # ---- structural: relational < > are branchless (sign bit of a difference) ----
          rel_ok=yes
          printf '%s' 'int main(){int a=3; int b=5; return a<b;}' | qemu-aarch64 ./stage2 > lt.s
          grep -q 'sub x0 x1 x0' lt.s || { echo "'<': MISSING sub a-b";      rel_ok=no; }
          grep -q 'mov x2 63'    lt.s || { echo "'<': MISSING sign-bit index"; rel_ok=no; }
          grep -q 'lsr x0 x0 x2' lt.s || { echo "'<': MISSING logical shift";  rel_ok=no; }
          grep -q 'b\.'          lt.s && { echo "'<': UNEXPECTED branch (should be branchless)"; rel_ok=no; }
          printf '%s' 'int main(){int a=3; int b=5; return a>b;}' | qemu-aarch64 ./stage2 > gt.s
          grep -q 'sub x0 x0 x1' gt.s || { echo "'>': MISSING sub b-a"; rel_ok=no; }

          # ---- structural: == != <= >= are branchless (reuse the sign-bit recipe) ----
          eq_ok=yes
          printf '%s' 'int main(){int a=3; int b=5; return a!=b;}' | qemu-aarch64 ./stage2 > ne.s
          grep -q 'orr x0 x0 x2' ne.s || { echo "'!=': MISSING d|-d (orr)";     eq_ok=no; }
          grep -q 'sub x2 x2 x0' ne.s || { echo "'!=': MISSING negate d";       eq_ok=no; }
          grep -q 'sub x0 x2 x0' ne.s && { echo "'!=': UNEXPECTED flip";        eq_ok=no; }
          grep -q 'b\.'          ne.s && { echo "'!=': UNEXPECTED branch";      eq_ok=no; }
          printf '%s' 'int main(){int a=3; int b=5; return a==b;}' | qemu-aarch64 ./stage2 > eq.s
          grep -q 'orr x0 x0 x2' eq.s || { echo "'==': MISSING d|-d (orr)";     eq_ok=no; }
          grep -q 'sub x0 x2 x0' eq.s || { echo "'==': MISSING flip (1-x)";     eq_ok=no; }
          printf '%s' 'int main(){int a=3; int b=5; return a<=b;}' | qemu-aarch64 ./stage2 > le.s
          grep -q 'sub x0 x0 x1' le.s || { echo "'<=': MISSING '>' sub b-a";    eq_ok=no; }
          grep -q 'sub x0 x2 x0' le.s || { echo "'<=': MISSING flip (1-x)";     eq_ok=no; }
          printf '%s' 'int main(){int a=3; int b=5; return a>=b;}' | qemu-aarch64 ./stage2 > ge.s
          grep -q 'sub x0 x1 x0' ge.s || { echo "'>=': MISSING '<' sub a-b";    eq_ok=no; }
          grep -q 'sub x0 x2 x0' ge.s || { echo "'>=': MISSING flip (1-x)";     eq_ok=no; }

          # ---- structural: pointer arithmetic scales the int operand by pointee size (A7a) ----
          # `int* p; p=p+2;` scales the integer operand (x0) by the element size before the
          # add: `mov x3 3; lsl x0 x0 x3`. No other codegen shape emits `lsl x0 x0 x3`
          # (comparisons shift x0 by x2=63; subscripts scale x2, not x0). char* must NOT
          # scale (element size 1); a pointer-minus-pointer difference divides by 8 (lsr x0 x0 x3).
          ptr_ok=yes
          printf '%s' 'int main(){int a[3]; int* p; p=a; p=p+2; return *p;}' | qemu-aarch64 ./stage2 > psc.s
          grep -q 'lsl x0 x0 x3' psc.s || { echo "ptr+int: MISSING pointee scaling (lsl x0 x0 x3)"; ptr_ok=no; }
          printf '%s' 'int main(){char s[3]; char* p; p=s; p=p+2; return *p;}' | qemu-aarch64 ./stage2 > pscc.s
          grep -q 'lsl x0 x0 x3' pscc.s && { echo "char*+int: UNEXPECTED scaling (char* element size is 1)"; ptr_ok=no; }
          printf '%s' 'int main(){int a[4]; int* p; int* q; p=a; q=a+3; return q-p;}' | qemu-aarch64 ./stage2 > psd.s
          grep -q 'lsr x0 x0 x3' psd.s || { echo "ptr-ptr: MISSING element-size divide (lsr x0 x0 x3)"; ptr_ok=no; }

          fail=0
          try() {
            # A2: emitted programs carry :func labels (calls/recursion) alongside
            # numeric @ if/while branches, so resolve through stage1 before stage0-as:
            #   prog.c | stage2 | stage1 | stage0-as | elf
            printf '%s' "$1" | qemu-aarch64 ./stage2 > out.s
            cat out.s | qemu-aarch64 ./stage1 | qemu-aarch64 ./stage0-as | qemu-aarch64 ./elf a.out
            set +e; qemu-aarch64 ./a.out; rc=$?; set -e
            if [ "$rc" = "$2" ]; then st=OK; else st=DIFF; fail=1; fi
            printf '  %-64s exit=%-4s want=%-4s %s\n' "$1" "$rc" "$2" "$st"
          }
          echo "== stage-2: 64-bit machine-word model (int == pointer width) =="
          # small values exit as before; these overflow 32 bits then divide, so a
          # correct exit proves the value stack + frame slots are genuinely 64-bit.
          try 'int main(){int a=2000; return a*a*a/1000;}'        0
          try 'int main(){int a=3000; int b=3000; return a*b/7;}' 82
          echo "== stage-2: pointer-arithmetic scaling — p+n / n+p / p-n / p-q by pointee size (A7a) =="
          # the int operand of pointer +/- is scaled by sizeof(*p) (8 for int*, 1 for char*);
          # p-q divides the byte difference by the element size. This makes bare pointer
          # arithmetic consistent with a[i] subscripting (which already scaled). These are
          # the cases that were WRONG before scaling (p+1 added 1 byte, not sizeof(*p)).
          try 'int main(){int a[3]; a[0]=10; a[1]=20; a[2]=30; int* p; p=a; p=p+2; return *p;}'        30
          try 'int main(){int a[3]; a[0]=10; a[1]=20; a[2]=30; int* p; p=a; p=p+1; return *p;}'        20
          try 'int main(){int a[3]; a[0]=10; a[1]=20; a[2]=30; int* p; p=a; p=2+p; return *p;}'        30
          try 'int main(){int a[3]; a[0]=10; a[1]=20; a[2]=30; int* p; p=a; p=p+2; p=p-1; return *p;}' 20
          try 'int main(){char s[3]; s[0]=65; s[1]=66; s[2]=67; char* q; q=s; q=q+2; return *q;}'      67
          try 'int main(){int a[5]; int* p; p=a; int* q; q=a; q=q+3; return q-p;}'                     3
          try 'int main(){char s[8]; char* p; p=s; char* q; q=s; q=q+5; return q-p;}'                  5
          try 'int main(){int a[4]; a[0]=1; a[1]=2; a[2]=3; a[3]=4; int* p; p=a; int s; s=0; int i; i=0; while(i<4){ s=s+*p; p=p+1; i=i+1; } return s;}'  10
          try 'int slen(char* s){int n; n=0; while(*s){ n=n+1; s=s+1; } return n;} int main(){return slen("hello");}'  5
          try 'int g[3]; int main(){g[0]=4; g[1]=9; g[2]=13; int* p; p=g; p=p+2; return *p;}'          13
          try 'int* gp; int a[3]; int main(){a[0]=1; a[1]=2; a[2]=3; gp=a; gp=gp+1; return *gp;}'      2
          try 'int at(int* p,int i){p=p+i; return *p;} int main(){int a[4]; a[0]=5; a[1]=6; a[2]=7; a[3]=8; return at(a,3);}'  8
          echo "== stage-2: control flow — if / else (A6a) =="
          # the then-block's closing brace peeks for else; nested + while-embedded else work.
          try 'int main(){if(0){return 5;}else{return 7;}return 9;}'                                       7
          try 'int main(){if(1){return 5;}else{return 7;}return 9;}'                                       5
          try 'int max(int a,int b){if(a>b){return a;}else{return b;}} int main(){return max(3,8);}'       8
          try 'int sign(int x){if(x>0){return 1;}else{if(x<0){return 2;}else{return 0;}}} int main(){return sign(-3);}'  2
          try 'int main(){int i; int s; s=0; i=0; while(i<5){if(i>2){s=s+i;}else{s=s+1;} i=i+1;} return s;}'  10
          echo "== stage-2: operators — unary !/-/~ + bitwise &/| + shifts <<,>> (A5a) =="
          # unary markers are pushed at highest precedence; a `prec` table places all
          # fifteen operators at their correct C levels; binary & vs address-of by position.
          try 'int main(){int x; x=5; return -x+8;}'                                    3
          try 'int main(){return !0;}'                                                  1
          try 'int main(){return ~5;}'                                                  250
          try 'int main(){return 12&10;}'                                               8
          try 'int main(){return 12|3;}'                                                15
          try 'int main(){return 1<<4;}'                                                16
          try 'int main(){int a; a=6; return a&3|8;}'                                   10
          try 'int main(){return !(3>5);}'                                              1
          try 'int main(){int i; int s; s=0; i=0; while(i<8){s=s|1<<i; i=i+1;} return s;}'  255
          echo "== stage-2: globals — file-scope vars in the data section (A4b) =="
          # globals reuse the data section (g_<name> labels); resolution is frame-first.
          try 'int g; int main(){g=5; return g;}'                                                                       5
          try 'int g; int set(){g=9; return 0;} int main(){set(); return g;}'                                          9
          try 'int a[3]; int main(){a[0]=4; a[1]=6; return a[0]+a[1];}'                                                10
          try 'int counter; int inc(){counter=counter+1; return 0;} int main(){inc(); inc(); inc(); return counter;}'  3
          try 'int g; int main(){int* p; p=&g; *p=42; return g;}'                                                      42
          echo "== stage-2: string literals + static data section (A4a) =="
          # "..." is a char* into a data section emitted after the code (adr-addressed).
          try 'int main(){char* s; s="A"; return s[0];}'                                                                65
          try 'int main(){char* s; s="abc"; return s[2];}'                                                             99
          try 'int len(char* p){int n; n=0; while(p[n]){n=n+1;} return n;} int main(){return len("hello");}'          5
          try 'int sum(char* p){int s; int i; s=0; i=0; while(p[i]){s=s+p[i]; i=i+1;} return s;} int main(){return sum("AB");}' 131
          try 'int f(char* a,char* b){return a[0]+b[0];} int main(){return f("MN","XY");}'                            165
          echo "== stage-2: char + byte access (char c, char* p, char s[N], ldrb/strb) (A3d) =="
          # char scalars are word-stored (char promotes to int); char* deref and
          # char[] subscript use BYTE access (ldrb/strb). char[N] is byte-packed.
          try "int main(){char c; c='A'; return c;}"                                                                    65
          try "int main(){char s[4]; s[0]=72; s[1]=105; return s[0]+s[1];}"                                             177
          try "int main(){char s[4]; char* p; s[0]=88; p=s; return *p;}"                                               88
          try "int main(){char s[8]; int i; i=0; while(i<8){s[i]=i+65; i=i+1;} return s[3];}"                          68
          try "int main(){char a[3]; a[0]=250; a[1]=250; return a[0]+a[1];}"                                          244
          try "int len(char* p){int n; n=0; while(p[n]){n=n+1;} return n;} int main(){char s[8]; s[0]=97; s[1]=98; s[2]=99; s[3]=0; return len(s);}" 3
          echo "== stage-2: arrays (int a[N], subscript a[i], decay) (A3c) =="
          # int arrays on the word model: indexed load/store + decay to a pointer.
          try 'int main(){int a[3]; a[0]=5; a[1]=7; return a[0]+a[1];}'                                                  12
          try 'int main(){int a[5]; int i; i=0; while(i<5){a[i]=i*i; i=i+1;} return a[3];}'                              9
          try 'int main(){int a[3]; a[2]=99; int* p; p=a; return p[2];}'                                                99
          try 'int sum(int* p,int n){int s; int i; s=0; i=0; while(i<n){s=s+p[i]; i=i+1;} return s;} int main(){int a[4]; a[0]=1; a[1]=2; a[2]=3; a[3]=4; return sum(a,4);}' 10
          try 'int dot(int* a,int* b,int n){int s; int i; s=0; i=0; while(i<n){s=s+a[i]*b[i]; i=i+1;} return s;} int main(){int x[3]; int y[3]; x[0]=1; x[1]=2; x[2]=3; y[0]=4; y[1]=5; y[2]=6; return dot(x,y,3);}' 32
          echo "== stage-2: pointers (& address-of, * deref, *p = e store-through) (A3b) =="
          # single-level pointers on the word model: indirection + pass-by-reference.
          try 'int main(){int x=5; int* p; p=&x; return *p;}'                                                    5
          try 'int main(){int x=0; int* p; p=&x; *p=42; return x;}'                                              42
          try 'int set(int* q){*q=9; return 0;} int main(){int x=0; set(&x); return x;}'                         9
          try 'int swap(int* a,int* b){int t=*a; *a=*b; *b=t; return 0;} int main(){int x=3; int y=8; swap(&x,&y); return x*10+y;}' 83
          try 'int inc(int* q){*q=*q+1; return 0;} int main(){int c=41; inc(&c); inc(&c); return c;}'            43
          echo "== stage-2: word-sized variables (frame-relative) =="
          try 'int main(){int a=2; int b=3; return a+b;}'             5
          try 'int main(){int a=10; return a*a;}'                     100
          try 'int main(){int a=5; int b=a+1; return a*b;}'           30
          try 'int main(){int x=7; return (x+1)*2;}'                  16
          try 'int main(){int a=2; int b=3; int c=4; return a+b*c;}'  14
          # many distinct variables — no per-variable labels needed anymore
          try 'int main(){int a=1; int b=2; int c=3; int d=4; int e=5; return a+b+c+d+e;}'  15
          try 'int main(){int z=25; return z*4;}'                     100

          echo "== stage-2: reassignment =="
          try 'int main(){int a=5; a=a+3; return a;}'                 8
          try 'int main(){int a=1; a=2; a=3; return a*10;}'           30

          echo "== stage-2: if (nonzero-truth) =="
          try 'int main(){int a=5; if(a){ a=a+1; } return a;}'        6
          try 'int main(){int a=0; if(a){ a=99; } return a+7;}'       7
          try 'int main(){int a=3; if(a-3){ a=99; } return a;}'       3

          echo "== stage-2: while (loops + termination) =="
          try 'int main(){int n=10; int s=0; while(n){ s=s+n; n=n-1; } return s;}'   55
          try 'int main(){int n=4; int f=1; while(n){ f=f*n; n=n-1; } return f;}'    24
          try 'int main(){int a=0; while(a){ a=a-1; } return a+9;}'                  9

          echo "== stage-2: nested control flow =="
          try 'int main(){int i=3; int t=0; while(i){ int j=2; while(j){ t=t+1; j=j-1; } i=i-1; } return t;}'  6
          try 'int main(){int a=6; int c=0; while(a){ if(a){ c=c+2; } a=a-1; } return c;}'                     12
          try 'int main(){int a=1; int b=1; int r=0; if(a){ if(b){ r=5; } } return r;}'                        5
          # 80 sequential if-blocks: numeric backpatched branches (no per-if label)
          # + enlarged buffers (input 64KB, output 256KB) let this compile and run —
          # far beyond both the old ~63-label ceiling and the old ~4.4KB output buffer.
          many='int main(){int a=0;'; for k in $(seq 1 80); do many="$many if(a<10000){a=a+1;}"; done; many="$many return a;}"
          try "$many"  80

          echo "== stage-2: relational < > (unsigned-32, count-up loops) =="
          try 'int main(){int i=0; int s=0; while(i<10){ s=s+i; i=i+1; } return s;}'   45
          try 'int main(){int i=1; int f=1; while(i<5){ f=f*i; i=i+1; } return f;}'    24
          try 'int main(){int n=5; int s=0; while(n>0){ s=s+n; n=n-1; } return s;}'    15
          try 'int main(){int a=3; int b=5; if(a<b){ return 1; } return 0;}'          1
          try 'int main(){int a=5; int b=5; if(a<b){ return 1; } return 0;}'          0
          try 'int main(){int a=7; int b=2; if(a>b){ return 9; } return 0;}'          9
          try 'int main(){int a=3; int b=4; return (a<b)+(b<a);}'                     1
          try 'int main(){return 2*2<3;}'                                             0
          try 'int main(){int i=0; int t=0; while(i<3){ int j=0; while(j<2){ t=t+1; j=j+1; } i=i+1; } return t;}'  6

          echo "== stage-2: equality / relational-eq == != <= >= (unsigned-32) =="
          try 'int main(){int a=5; int b=5; return a==b;}'                            1
          try 'int main(){int a=5; int b=6; return a==b;}'                            0
          try 'int main(){int a=5; int b=6; return a!=b;}'                            1
          try 'int main(){int a=5; int b=5; return a!=b;}'                            0
          try 'int main(){int a=4; int b=5; return a<=b;}'                            1
          try 'int main(){int a=6; int b=5; return a<=b;}'                            0
          try 'int main(){int a=5; int b=5; return a>=b;}'                            1
          try 'int main(){int a=4; int b=5; return a>=b;}'                            0
          try 'int main(){return 2+3==5;}'                                            1
          try 'int main(){int a=1; int b=2; int c=3; return a==b<c;}'                 1
          try 'int main(){int i=1; int s=0; while(i<=5){ s=s+i; i=i+1; } return s;}'  15
          try 'int main(){int i=10; int s=0; while(i>=1){ s=s+i; i=i-1; } return s;}' 55
          try 'int main(){int a=7; if(a==7){ return 3; } return 9;}'                  3
          try 'int main(){int a=7; if(a!=7){ return 3; } return 9;}'                  9
          try 'int main(){int a=8; int b=8; int c=0; if(a==b){ if(a>=b){ c=42; } } return c;}'  42

          echo "== stage-2: unsigned division / and % (udiv) =="
          # structural: '/' lowers to a single udiv, '%' to udiv;mul;sub.
          div_ok=yes
          printf '%s' 'int main(){return 17/5;}' | qemu-aarch64 ./stage2 > dv.s
          grep -q 'udiv x0 x1 x0' dv.s || { echo "'/': MISSING udiv"; div_ok=no; }
          printf '%s' 'int main(){return 17%5;}' | qemu-aarch64 ./stage2 > md.s
          grep -q 'udiv x2 x1 x0' md.s || { echo "'%': MISSING udiv"; div_ok=no; }
          grep -q 'mul x2 x2 x0'  md.s || { echo "'%': MISSING mul";  div_ok=no; }
          grep -q 'sub x0 x1 x2'  md.s || { echo "'%': MISSING sub";  div_ok=no; }
          try 'int main(){return 17/5;}'                        3
          try 'int main(){return 17%5;}'                        2
          try 'int main(){return 100/7;}'                       14
          try 'int main(){return 100%7;}'                       2
          try 'int main(){int a=84; int b=4; return a/b;}'      21
          try 'int main(){return 2+10/2;}'                      7
          try 'int main(){return 20/4/5;}'                      1
          try 'int main(){return 3*4/2;}'                       6
          try 'int main(){int n=20; int d=6; return n/d*d+n%d;}'  20
          try 'int gcd(int a,int b){while(b){ int t=a%b; a=b; b=t; } return a;} int main(){return gcd(48,36);}'  12

          echo "== stage-2: functions + call stack + recursion (A2) =="
          # structural: a call carries a :func label + bl, a real prologue/epilogue,
          # and the caller enters via bl main. These are resolved by stage1 (above).
          fn_ok=yes
          printf '%s' 'int add(int a,int b){return a+b;} int main(){return add(2,3);}' | qemu-aarch64 ./stage2 > fn.s
          grep -q '^:add'        fn.s || { echo "fn: MISSING :add label"; fn_ok=no; }
          grep -q 'bl add'       fn.s || { echo "fn: MISSING bl add"; fn_ok=no; }
          grep -q 'bl main'      fn.s || { echo "fn: MISSING bl main entry"; fn_ok=no; }
          grep -q 'str x10 x11'  fn.s || { echo "fn: MISSING frame save (str x10 x11)"; fn_ok=no; }
          grep -q 'str x30 x1'   fn.s || { echo "fn: MISSING return-addr save (str x30 x1)"; fn_ok=no; }
          grep -q 'ldr x30 x1'   fn.s || { echo "fn: MISSING epilogue restore (ldr x30 x1)"; fn_ok=no; }
          # calls + argument passing
          try 'int add(int a,int b){return a+b;} int main(){return add(2,3);}'                    5
          try 'int sq(int x){int y=x*x; return y;} int main(){return sq(9);}'                      81
          try 'int inc(int a){return a+1;} int dbl(int a){return a*2;} int main(){return dbl(inc(4));}'  10
          try 'int add(int a,int b){return a+b;} int main(){return add(add(1,2),add(3,4));}'       10
          try 'int f(int aa,int bb,int cc){return aa*100+bb*10+cc;} int main(){return f(1,2,3);}'  123
          try 'int f(int n){n=n+5; return n*2;} int main(){return f(10);}'                         30
          # recursion: linear, tree, tail-with-accumulator, mutual, Ackermann
          try 'int fact(int n){if(n){return n*fact(n-1);} return 1;} int main(){return fact(5);}'  120
          try 'int sum(int n){if(n){return n+sum(n-1);} return 0;} int main(){return sum(10);}'    55
          try 'int fib(int n){if(n<2){return n;} return fib(n-1)+fib(n-2);} int main(){return fib(10);}'  55
          try 'int pw(int b,int e){if(e){return b*pw(b,e-1);} return 1;} int main(){return pw(2,7);}'  128
          try 'int tri(int n){int s=0; int i=1; while(i<=n){ s=s+i; i=i+1; } return s;} int main(){return tri(10);}'  55
          try 'int ev(int n){if(n){return od(n-1);} return 1;} int od(int n){if(n){return ev(n-1);} return 0;} int main(){return ev(10);}'  1
          try 'int ack(int m,int n){if(m){if(n){return ack(m-1,ack(m,n-1));} return ack(m-1,1);} return n+1;} int main(){return ack(2,3);}'  9
          try 'int compute(int count,int step){int total=count*step; return total+count;} int main(){return compute(6,4);}'  30

          echo "== stage-2: structs — definitions, sizeof, . / -> member access, chains, params, globals (A8a) =="
          # structural: sizeof(struct T) folds to the total byte size (one 8-byte word per
          # field); a member access adds the field's byte offset to a base address then
          # word/byte loads or stores; `->` (and a value base) reach the struct via the
          # same offset add, with a pointer base derefed first (ldr x1 x1); struct globals
          # get a :g_<name> data label sized to the struct. Field names live in a struct
          # table (never emitted as labels) — the only labels are still :func names.
          sm_ok=yes
          printf '%s' 'struct P{int x;int y;};int main(){return sizeof(struct P);}' | qemu-aarch64 ./stage2 > sz.s
          grep -q 'mov x0 0016' sz.s || { echo "sizeof(struct): MISSING size fold (mov x0 0016)"; sm_ok=no; }
          printf '%s' 'struct P{int x;int y;};int main(){struct P p;p.x=3;p.y=5;return p.x;}' | qemu-aarch64 ./stage2 > mem.s
          grep -q 'add x1 x1 0008' mem.s || { echo "member: MISSING 2nd-field offset add (add x1 x1 0008)"; sm_ok=no; }
          grep -q 'add x1 x1 0000' mem.s || { echo "member: MISSING 1st-field offset add (add x1 x1 0000)"; sm_ok=no; }
          grep '^:' mem.s | grep -v '^:main$' | grep -v '^:f$' | grep -qv '^:__L' \
            && { echo "member: unexpected label (field names must not be labels)"; sm_ok=no; }
          printf '%s' 'struct N{int v;struct N* nx;};int main(){struct N a;struct N* q;q=&a;q->v=7;return q->v;}' | qemu-aarch64 ./stage2 > arw.s
          grep -q 'ldr x1 x1' arw.s || { echo "->: MISSING pointer-base deref (ldr x1 x1)"; sm_ok=no; }
          printf '%s' 'struct P{int x;int y;};struct P g;int main(){g.x=1;return g.x;}' | qemu-aarch64 ./stage2 > gsr.s
          grep -q ':g_g' gsr.s || { echo "struct global: MISSING :g_ data label"; sm_ok=no; }
          grep -q 'adr x1 g_g' gsr.s || { echo "struct global: MISSING adr g_ base address"; sm_ok=no; }
          # ---- structural: &member — address-of a struct field computes the MEMBER address
          # (base + field byte offset) and pushes it; it must NOT leak the field name as a
          # stray primary (adr x0 <field>) nor scale the address. This is the exact m49
          # regression shape: the bad `&p.y` emitted `adr x0 y` (a wild address) which real
          # qemu SIGSEGVs on — the bench used to tolerate it, so this greps for the shape. ----
          printf '%s' 'struct P{int x;int y;};int main(){struct P p;int* q;q=&p.y;return *q;}' | qemu-aarch64 ./stage2 > amp.s
          grep -q 'add x1 x1 0008' amp.s || { echo "&member: MISSING field-offset add (add x1 x1 0008)"; sm_ok=no; }
          grep -q 'str x1 x9'      amp.s || { echo "&member: MISSING address push (str x1 x9)"; sm_ok=no; }
          grep -q 'adr x0 x'       amp.s && { echo "&member REGRESSION: field leaked as a primary (adr x0 x)"; sm_ok=no; }
          grep -q 'lsl'            amp.s && { echo "&member REGRESSION: address was scaled (lsl on address-of path)"; sm_ok=no; }

          # ---- structural: function pointers — a function name decays to its entry address
          # (adr x0 <fn>), a call through the variable loads the code address then branches
          # (ldr x16 + blr x16), a direct call still uses bl, and a global fnptr gets a
          # :g_<name> data label (A9). The bl-vs-blr split is read off the symbol tables. ----
          printf '%s' 'int inc(int n){return n+1;} int main(){int (*fp)(int); fp=inc; return fp(41);}' | qemu-aarch64 ./stage2 > fp.s
          fp_ok=yes
          grep -q 'adr x0 inc' fp.s || { echo "fnptr: MISSING function-name decay (adr x0 inc)"; fp_ok=no; }
          grep -q 'ldr x16 x1' fp.s || { echo "fnptr: MISSING code-address load (ldr x16 x1)"; fp_ok=no; }
          grep -q 'blr x16'    fp.s || { echo "fnptr: MISSING call-through (blr x16)"; fp_ok=no; }
          printf '%s' 'int inc(int n){return n+1;} int apply(int (*f)(int),int x){return f(x);} int main(){return apply(inc,41);}' | qemu-aarch64 ./stage2 > fpa.s
          grep -q 'bl apply' fpa.s || { echo "fnptr: MISSING direct call still uses bl (bl apply)"; fp_ok=no; }
          grep -q 'blr x16'  fpa.s || { echo "fnptr: MISSING param call-through (blr x16)"; fp_ok=no; }
          printf '%s' 'int inc(int n){return n+1;} int (*gp)(int); int main(){gp=inc; return gp(99);}' | qemu-aarch64 ./stage2 > fpg.s
          grep -q ':g_gp'  fpg.s || { echo "fnptr global: MISSING :g_ data label"; fp_ok=no; }
          grep -q 'blr x16' fpg.s || { echo "fnptr global: MISSING call-through (blr x16)"; fp_ok=no; }

          echo "== stage-2: structs — behavioural (sizeof, . / -> get+set, char fields, chains, params, globals) =="
          # sizeof folds to the packed word size; one 8-byte slot per field (int/char/ptr).
          try 'struct P{int x;int y;};int main(){return sizeof(struct P);}'                                     16
          try 'struct P{int x;int y;int z;};int main(){return sizeof(struct P);}'                               24
          try 'struct C{char a;int b;};int main(){return sizeof(struct C);}'                                    16
          try 'struct N{int v;struct N* nx;};int main(){return sizeof(struct N);}'                              16
          try 'struct P{int x;int y;int z;};int main(){int n; n=sizeof(struct P)/sizeof(int); return n;}'       3
          # value structs: '.' get/set, multiple fields, char fields, field-from-field, two locals.
          try 'struct P{int x;int y;};int main(){struct P p; p.x=7; p.y=9; return p.x+p.y;}'                    16
          try 'struct P{int x;int y;int z;};int main(){struct P p; p.x=1; p.y=2; p.z=3; return p.x+p.y+p.z;}'  6
          try 'struct C{char a;int b;};int main(){struct C c; c.a=65; c.b=100; return c.a+c.b;}'               165
          try 'struct P{int x;int y;};int main(){struct P p; p.x=5; p.y=p.x+10; return p.y;}'                  15
          try 'struct P{int x;int y;};int main(){struct P p; p.x=10; struct P q; q.x=20; return p.x+q.x;}'     30
          # pointers to structs: '->' get/set (a value base and a pointer base share codegen).
          try 'struct P{int x;int y;};int main(){struct P p; struct P* q; q=&p; q->x=17; q->y=25; return p.x+p.y;}'  42
          try 'struct P{int x;int y;};int main(){struct P p; p.y=7; struct P* q; q=&p; return q->y;}'          7
          # chains: follow a pointer field, then read/write the next field (get and set).
          try 'struct N{int v;struct N* nx;};int main(){struct N b; b.v=99; struct N a; a.nx=&b; return a.nx->v;}'  99
          try 'struct N{int v;struct N* nx;};int main(){struct N b; struct N a; a.nx=&b; a.nx->v=77; return b.v;}'  77
          try 'struct N{int v;struct N* nx;};int main(){struct N c; c.v=3; struct N b; b.nx=&c; struct N a; a.nx=&b; return a.nx->nx->v;}'  3
          # &member: the address of a field is an ordinary lvalue address. These four
          # broaden the coverage the m49 fix earned — offset 0, a nonzero offset, a
          # write THROUGH &member, a char field (ptype 1), and &(ptr->field). Until m49
          # this whole class was effectively untested on hardware (it segfaulted).
          try 'struct P{int x;int y;};int main(){struct P p; p.x=8; int* q; q=&p.x; return *q;}'               8
          try 'struct P{int x;int y;};int main(){struct P p; p.y=7; int* q; q=&p.y; return *q;}'               7
          try 'struct P{int x;int y;};int main(){struct P p; int* q; q=&p.x; *q=42; return p.x;}'             42
          try 'struct C{char a;int b;};int main(){struct C c; c.a=65; char* q; q=&c.a; return *q;}'           65
          try 'struct P{int x;int y;};int main(){struct P p; p.y=9; struct P* r; r=&p; int* q; q=&r->y; return *q;}'  9
          # struct-pointer parameters + a real linked-list traversal with a while loop.
          try 'struct P{int x;int y;};int gv(struct P* p){return p->x+p->y;} int main(){struct P p; p.x=10; p.y=20; return gv(&p);}'  30
          try 'struct N{int v;struct N* nx;};int sm(struct N* p){int s; s=0; while(p){ s=s+p->v; p=p->nx; } return s;} int main(){struct N c; c.v=3; c.nx=0; struct N b; b.v=2; b.nx=&c; struct N a; a.v=1; a.nx=&b; return sm(&a);}'  6
          try 'struct N{int v;struct N* nx;};int cnt(struct N* p){int n; n=0; while(p){ n=n+1; p=p->nx; } return n;} int main(){struct N c; c.nx=0; struct N b; b.nx=&c; struct N a; a.nx=&b; return cnt(&a);}'  3
          try 'struct N{int v;struct N* nx;};int last(struct N* p){while(p->nx){ p=p->nx; } return p->v;} int main(){struct N c; c.v=7; c.nx=0; struct N b; b.nx=&c; struct N a; a.nx=&b; return last(&a);}'  7
          # struct globals: value + pointer, member get/set, and a chain through globals.
          try 'struct P{int x;int y;};struct P g; int main(){g.x=13; g.y=4; return g.x+g.y;}'                  17
          try 'struct C{char a;int b;};struct C gc; int main(){gc.a=9; gc.b=33; return gc.a+gc.b;}'            42
          try 'struct N{int v;struct N* nx;};struct N n; struct N* gp; int main(){n.v=42; gp=&n; return gp->v;}'  42
          try 'struct N{int v;struct N* nx;};struct N a; struct N b; int main(){b.v=5; a.v=10; a.nx=&b; return a.nx->v;}'  5

          echo "== stage-2: function pointers — int (*f)(...), decay, call-through blr (A9) =="
          # exit codes through prog.c | stage2 | stage1 | stage0-as | elf
          try 'int inc(int n){return n+1;} int main(){int (*fp)(int); fp=inc; return fp(41);}'                              42
          try 'int inc(int n){return n+1;} int apply(int (*f)(int),int x){return f(x);} int main(){return apply(inc,41);}'  42
          try 'int seven(){return 7;} int callit(int (*f)()){return f();} int main(){return callit(seven);}'               7
          try 'int add(int a,int b){return a+b;} int main(){int (*fp)(int,int); fp=add; return fp(30,12);}'                 42
          try 'int inc(int n){return n+1;} int (*gp)(int); int main(){gp=inc; return gp(99);}'                             100
          try 'int add1(int n){return n+1;} int dbl(int n){return n*2;} int main(){int (*fp)(int); int acc; int i; acc=0; i=0; while(i<5){fp=add1; acc=fp(acc); fp=dbl; acc=fp(acc); i=i+1;} return acc;}'  62
          try 'int counter; int bump(){counter=counter+1; return counter;} int twice(int (*f)()){f(); f(); return counter;} int main(){counter=0; return twice(bump);}'  2

          # ---- structural: large integer literals (>= 2^16) via movz + movk ----
          # a bare `mov` is a 16-bit MOVZ; a literal >= 65536 is materialised as
          # `mov x0 <lo16>` + a `movk x0 <hw> <shift>` per nonzero higher halfword.
          # (This is the fix for the 256KB SIGSEGV: `mov x0 262143` overflowed the
          # immediate into the shift field, giving movz #0xffff,lsl#48 -> wild addr.)
          lit_ok=yes
          printf '%s' 'int main(){return 262143;}' | qemu-aarch64 ./stage2 > big.s
          grep -q 'mov x0 65535' big.s || { echo "biglit: MISSING low half (mov x0 65535)"; lit_ok=no; }
          grep -q 'movk x0 3 16' big.s || { echo "biglit: MISSING high half (movk x0 3 16)"; lit_ok=no; }
          printf '%s' 'int main(){return 999;}' | qemu-aarch64 ./stage2 > small.s
          grep -q 'movk x0' small.s && { echo "biglit: small literal must NOT emit movk x0"; lit_ok=no; }

          echo "== stage-2: large integer literals (>= 2^16) via movz + movk =="
          try 'int main(){return 262143;}'                                 255
          try 'int main(){return 262144;}'                                 0
          try 'int main(){return 1000000;}'                                64
          try 'int main(){return 70000 - 65536;}'                          112
          try 'int main(){int a=100000; int b=3; return a*b/1000;}'        44
          try 'int main(){int* p=calloc(100000,8); p[99999]=42; return p[99999];}'  42

          # ---- structural: heap — calloc/free lower to a direct `bl`, and a bump
          # allocator over a large anonymous `mmap` arena is appended ONCE at program
          # end for the builtins actually used (and only if the user did not define
          # their own). calloc maps the arena via mmap (syscall 222; MAP_ANONYMOUS, so
          # kernel-zeroed) and bump-allocates; the bump pointer __mp is emitted inline
          # after the routine. mmap (not brk) because qemu-user's brk region is small.
          # A user definition overrides the builtin. ----
          heap_ok=yes
          printf '%s' 'int main(){int* p=calloc(1,8); return 0;}' | qemu-aarch64 ./stage2 > heap.s
          grep -q 'bl calloc'  heap.s || { echo "heap: MISSING direct call (bl calloc)"; heap_ok=no; }
          grep -q '^:calloc'   heap.s || { echo "heap: MISSING calloc runtime routine (:calloc)"; heap_ok=no; }
          grep -q 'mov x8 222' heap.s || { echo "heap: MISSING mmap syscall (mov x8 222)"; heap_ok=no; }
          grep -q '^:__mp'     heap.s || { echo "heap: MISSING inline bump pointer (:__mp)"; heap_ok=no; }
          grep -q '^:free'     heap.s && { echo "heap: UNEXPECTED :free (free unused here)"; heap_ok=no; }
          printf '%s' 'int main(){int* p=calloc(1,8); free(p); return 0;}' | qemu-aarch64 ./stage2 > heapf.s
          grep -q '^:free'     heapf.s || { echo "heap: MISSING free runtime routine (:free)"; heap_ok=no; }
          printf '%s' 'int main(){int a=5; return a;}' | qemu-aarch64 ./stage2 > noheap.s
          grep -q '^:calloc'   noheap.s && { echo "heap: runtime emitted when unused"; heap_ok=no; }
          printf '%s' 'int calloc(int a,int b){return 77;} int main(){return calloc(1,2);}' | qemu-aarch64 ./stage2 > heapo.s
          [ "$(grep -c '^:calloc' heapo.s)" = 1 ] || { echo "heap: user override did not suppress the builtin"; heap_ok=no; }
          grep -q '^:__mp'     heapo.s && { echo "heap: overridden builtin still emitted __mp"; heap_ok=no; }

          echo "== stage-2: heap — calloc / free bump allocator over an mmap arena (A10) =="
          # calloc(count,size) returns a distinct, zero-filled, 8-byte-rounded block from
          # a large anonymous mmap arena that persists; free is a safe no-op. The 64KB and
          # 256KB buffers exceed qemu-user's small brk region — they prove the arena is
          # mmap-backed, not brk-grown. The linked-list cases build nodes on the heap and
          # walk them through a helper taking a struct-pointer parameter (the M2 shape).
          try 'int main(){int* p=calloc(4,8); p[0]=10; p[1]=20; return p[0]+p[1];}'                    30
          try 'int main(){int* p=calloc(3,8); return p[0]+p[1]+p[2];}'                                 0
          try 'int main(){char* s=calloc(10,1); s[0]=65; s[1]=66; return s[0]+s[1];}'                  131
          try 'int main(){int* a=calloc(2,8); int* b=calloc(2,8); a[0]=5; b[0]=7; return a[0]+b[0];}'  12
          try 'int main(){int* p=calloc(3,8); p[2]=55; return p[2];}'                                  55
          try 'int main(){int* p=calloc(1000,8); p[999]=123; return p[999];}'                          123
          try 'int main(){char* b=calloc(65536,1); b[65535]=7; return b[65535];}'                      7
          try 'int main(){char* b=calloc(262144,1); b[262143]=9; return b[262143];}'                   9
          try 'struct T{int k; int t; struct T* nx;}; int main(){struct T* t=calloc(1,sizeof(struct T)); t->k=40; t->t=2; return t->k+t->t;}'  42
          try 'int main(){int* p=calloc(2,8); p[0]=40; p[1]=2; int r=p[0]; int q=p[1]; return r+q;}'   42
          try 'int main(){int* p=calloc(1,8); p[0]=9; int r=p[0]; free(p); return r;}'                 9
          try 'int main(){int i=0; int last=0; while(i<50){int* p=calloc(1,8); p[0]=i+1; last=p[0]; i=i+1;} return last;}'  50
          try 'struct N{int v; struct N* nx;};int sm(struct N* p){int s; s=0; while(p){s=s+p->v; p=p->nx;} return s;} int main(){struct N* a=calloc(1,sizeof(struct N)); struct N* b=calloc(1,sizeof(struct N)); struct N* c=calloc(1,sizeof(struct N)); a->v=1; a->nx=b; b->v=2; b->nx=c; c->v=3; c->nx=0; return sm(a);}'  6
          try 'struct N{int v; struct N* nx;};int cnt(struct N* p){int n; n=0; while(p){n=n+1; p=p->nx;} return n;} int main(){struct N* a=calloc(1,sizeof(struct N)); struct N* b=calloc(1,sizeof(struct N)); struct N* c=calloc(1,sizeof(struct N)); a->nx=b; b->nx=c; c->nx=0; return cnt(a);}'  3
          try 'int calloc(int a, int b){return 77;} int main(){return calloc(1,2);}'                   77

          # ---- structural: file I/O — open/read/write/close/exit lower to a direct
          # `bl`, and a thin syscall wrapper is appended ONCE per used builtin (unless
          # the user defines their own). open is openat(56) with AT_FDCWD (-100, built
          # as 0-100 since mov is a 16-bit MOVZ); read=63, write=64, close=57, exit=93.
          # Numbers + the openat shape match M2libc/aarch64 exactly, so real M2libc
          # (which defines its own read/write/_open/close/_exit) overrides them.
          echo "== stage-2: file I/O structural — open/read/write/close/exit (A12) =="
          io_ok=yes
          printf '%s' 'int main(){char b[8];int fd;fd=open("f",0,0);read(fd,b,8);write(1,b,8);close(fd);exit(0);return 0;}' | qemu-aarch64 ./stage2 > io.s
          grep -q 'bl open'    io.s || { echo "io: MISSING direct call (bl open)";  io_ok=no; }
          grep -q 'bl read'    io.s || { echo "io: MISSING direct call (bl read)";  io_ok=no; }
          grep -q 'bl write'   io.s || { echo "io: MISSING direct call (bl write)"; io_ok=no; }
          grep -q 'bl close'   io.s || { echo "io: MISSING direct call (bl close)"; io_ok=no; }
          grep -q 'bl exit'    io.s || { echo "io: MISSING direct call (bl exit)";  io_ok=no; }
          grep -q '^:open'     io.s || { echo "io: MISSING open runtime (:open)";   io_ok=no; }
          grep -q 'mov x8 56'  io.s || { echo "io: open is not openat (mov x8 56)"; io_ok=no; }
          grep -q 'sub x0 x0 100' io.s || { echo "io: open MISSING AT_FDCWD (sub x0 x0 100)"; io_ok=no; }
          grep -q 'mov x8 63'  io.s || { echo "io: read not __NR_read (mov x8 63)"; io_ok=no; }
          grep -q 'mov x8 64'  io.s || { echo "io: write not __NR_write (mov x8 64)"; io_ok=no; }
          grep -q 'mov x8 57'  io.s || { echo "io: close not __NR_close (mov x8 57)"; io_ok=no; }
          printf '%s' 'int main(){int a=5; return a;}' | qemu-aarch64 ./stage2 > noio.s
          grep -q '^:open'     noio.s && { echo "io: runtime emitted when unused"; io_ok=no; }
          printf '%s' 'int write(int a,int b,int c){return 9;} int main(){return write(1,2,3);}' | qemu-aarch64 ./stage2 > iow.s
          [ "$(grep -c '^:write' iow.s)" = 1 ] || { echo "io: user write override did not suppress the builtin"; io_ok=no; }

          echo "== stage-2: file I/O behavioural — a compiled program reads a file and writes one (A12) =="
          # exit(code) reaches the exit builtin (not the prologue fallthrough); write(1,...)
          # reaches stdout; and a real open/read/write/close round-trip on qemu's own
          # filesystem copies a source file to an output file.
          try 'int main(){exit(9); return 0;}'   9
          printf '%s' 'int main(){write(1,"IO-OK",5); return 0;}' | qemu-aarch64 ./stage2 > iostdout.s
          cat iostdout.s | qemu-aarch64 ./stage1 | qemu-aarch64 ./stage0-as | qemu-aarch64 ./elf a.out
          set +e; ioout=$(qemu-aarch64 ./a.out); set -e
          if [ "$ioout" = "IO-OK" ]; then st=OK; else st=DIFF; io_ok=no; fi
          printf '  %-64s out=%-8s want=%-8s %s\n' 'write(1,"IO-OK",5)' "$ioout" "IO-OK" "$st"
          printf 'copy-this-source-text' > io_in
          printf '%s' 'int main(){int fd;char b[64];int n;fd=open("io_in",0,0);n=read(fd,b,64);close(fd);fd=open("io_out",577,420);write(fd,b,n);close(fd);return n;}' | qemu-aarch64 ./stage2 > iocopy.s
          cat iocopy.s | qemu-aarch64 ./stage1 | qemu-aarch64 ./stage0-as | qemu-aarch64 ./elf a.out
          set +e; qemu-aarch64 ./a.out; rc=$?; set -e
          if [ "$rc" = 21 ] && [ "$(cat io_out)" = "copy-this-source-text" ]; then st=OK; else st=DIFF; io_ok=no; fi
          printf '  %-64s exit=%-4s want=%-4s out=%s %s\n' 'open/read/write/close file copy' "$rc" 21 "$(cat io_out 2>/dev/null)" "$st"

          echo "== stage-2: single-pass @-target accounting (definition order) =="
          # stage2 is single-pass: if/while targets are ABSOLUTE @<byte-pos> values
          # it computes from its own emitted-instruction counter, which advances
          # once per emitted line ("every line is 4 bytes"). A 0-byte emitted line
          # (a blank) therefore desynchronises the counter from the real
          # instruction count -- and since the counter is monotonic across the
          # whole program, the drift corrupts the @-targets of every function
          # emitted AFTERWARDS, not the one that caused it. Symptom: a later
          # function silently returns garbage, or loops forever when the mis-aimed
          # target skips a loop bound. Guard the invariant AND the symptom.
          emit_ok=yes
          DECLS='struct N{int v;int w;struct N* nx;};struct N* HEAD;struct N* TAIL;'
          APPENDF='int append(int v){struct N* n=calloc(1,sizeof(struct N));n->v=v;n->nx=0;if(HEAD==0){HEAD=n;TAIL=n;}else{TAIL->nx=n;TAIL=n;}return 0;}'
          printf '%s' "$DECLS$APPENDF"'int main(){return 0;}' | qemu-aarch64 ./stage2 > acct.s
          # structural: no blank line anywhere in the CODE region. A23 emits data
          # INLINE (behind a skip branch), so the old 'stop at the first .byte'
          # split truncated the region to ~19 of 232 lines and checked almost
          # nothing while still reporting OK. SKIP data lines instead of halting.
          grep -v '^\.byte' acct.s | grep -v '^\.ascii' > acct_code.s
          blanks=$(grep -c '^[[:space:]]*$' acct_code.s || true)
          if [ "$blanks" = 0 ]; then st=OK; else st=DIFF; emit_ok=no; fi
          printf '  %-64s blanks=%-4s want=%-4s %s\n' 'no 0-byte (blank) line emitted in code region' "$blanks" 0 "$st"
          # behavioural: definition ORDER must not change a function's meaning.
          # timeout bounds a runaway so a regression fails fast instead of hanging.
          vtry() {
            printf '%s' "$1" | qemu-aarch64 ./stage2 > vout.s
            cat vout.s | qemu-aarch64 ./stage1 | qemu-aarch64 ./stage0-as | qemu-aarch64 ./elf a.out
            set +e; timeout 30 qemu-aarch64 ./a.out; rc=$?; set -e
            if [ "$rc" = "$2" ]; then st=OK; else st=DIFF; emit_ok=no; fi
            printf '  %-64s exit=%-4s want=%-4s %s\n' "$3" "$rc" "$2" "$st"
          }
          vtry "$DECLS$APPENDF"'int g(){int a;if(0){a=9;}else{a=3;}return a;}int main(){return g();}' 3 'if/else victim defined after append'
          vtry "$DECLS$APPENDF"'int g(){int i;int s;i=0;s=0;while(i<3){s=s+1;i=i+1;}return s;}int main(){return g();}' 3 'while victim defined after append'
          vtry "$DECLS$APPENDF"'int g(){int i;int j;int c;i=0;c=0;while(i<3){j=0;while(j<1){c=c+1;j=j+1;}i=i+1;}return c;}int main(){return g();}' 3 'nested-while victim after append (runaway guard)'
          # the three-way shape that used to miscompile into a runaway: a recursive
          # emit path + a separator predicate + an allocating builder in one program
          THREE="$DECLS"'int issep(int c){if(c==32){return 1;}if(c==44){return 1;}return 0;}int emit_span(struct N* p,int n){if(p==0){return n;}if(issep(p->v)){return n;}p->w=n;return emit_span(p->nx,n+1);}int emit_list(struct N* p){if(p==0){return 0;}if(issep(p->v)){return emit_list(p->nx);}return emit_span(p,0)+emit_list(p->nx);}int build(int n){if(n==0){return 0;}append(65+n);return 1+build(n-1);}'"$APPENDF"
          vtry "$THREE"'int main(){return build(3);}' 3 'emit path + issep + allocating builder: builder count'
          vtry "$THREE"'int main(){build(3);return emit_list(HEAD);}' 6 'emit path + issep + allocating builder: traversal'

          echo "== stage-2: front end — comments, bare blocks, struct* return types =="
          # Four independent front-end gaps, each of which used to present as a
          # HANG or a wild-address fault rather than a wrong answer, so every
          # case here is timeout-bounded: a regression must fail fast, not hang
          # the runner.
          fe_ok=yes
          ftry() {
            # EVERY stage is timeout-bounded, not just the run: a front-end
            # regression can hang the COMPILER, and an unbounded compile step
            # hangs the runner until the job is cancelled instead of failing.
            set +e
            printf '%s' "$1" | timeout 30 qemu-aarch64 ./stage2 > fout.s
            if [ $? -ne 0 ] || [ ! -s fout.s ]; then
              fe_ok=no
              printf '  %-64s %s\n' "$3" 'COMPILE FAILED/HUNG'
              set -e; return
            fi
            cat fout.s | timeout 30 qemu-aarch64 ./stage1 | timeout 30 qemu-aarch64 ./stage0-as | timeout 30 qemu-aarch64 ./elf a.out
            set -e
            set +e; timeout 30 qemu-aarch64 ./a.out; rc=$?; set -e
            if [ "$rc" = "$2" ]; then st=OK; else st=DIFF; fe_ok=no; fi
            printf '  %-64s exit=%-4s want=%-4s %s\n' "$3" "$rc" "$2" "$st"
          }
          # comments: the tokenizer had no comment rule, so '/' fell through to
          # the operator path and the comment body was lexed as source.
          ftry 'int main(){/* hi */ return 7;}' 7 'block comment stripped'
          ftry $'int main(){/* a\nb */return 3;}' 3 'multi-line block comment stripped'
          ftry $'int main(){// hi\nreturn 7;}' 7 'line comment stripped'
          ftry 'int main(){return 12/3;}' 4 'division still lexes (comment rule needs // or /*)'
          # bare blocks: if/while push a block record; a bare '{' pushed none, so
          # its '}' popped the enclosing record or ended the function early.
          ftry 'int main(){{return 7;}}' 7 'bare block statement'
          ftry 'int main(){int i;i=0;while(i<3){i=i+1;}{int fd;fd=7;return fd+i;}}' 10 'block-scoped declaration'
          ftry 'int main(){int a;{a=2;}{int b;b=3;return a+b;}}' 5 'consecutive bare blocks'
          ftry 'int main(){int i;int s;i=0;s=0;while(i<3){{s=s+1;}i=i+1;}return s;}' 3 'bare block nested inside while'
          # struct* returns: 'struct T *f()' was routed to the global-struct path,
          # which skipped to the first ';' -- inside the body -- and resumed
          # top-level parsing mid-function.
          FT_T='struct T{int v;struct T* nx;};'
          ftry "$FT_T"'struct T* f(){return 0;}int main(){return 5;}' 5 'struct* return type (trivial body)'
          ftry "$FT_T"'struct T* mk(int v){struct T* n=calloc(1,sizeof(struct T));n->v=v;n->nx=0;return n;}int main(){struct T* p;p=mk(9);return p->v;}' 9 'struct* return type (returns a real node)'
          ftry "$FT_T"'struct T* HEAD;int main(){HEAD=0;return 4;}' 4 'global struct pointer is still a global'
          # global data. The m55 bound existed because data went into a FIXED region
          # wedged between the tables: overflowing it clobbered saved state, so m55
          # made it stop cleanly. A23 emits data INLINE into the streaming output,
          # so there is no region left to overflow -- the limit is GONE, not merely
          # reported, and a large global must now simply compile and run.
          ftry 'char A[16];int main(){A[0]=65;return A[0];}' 65 'small global array still works'
          ftry 'char A[8192];char B[16384];int main(){return 3;}' 3 'large globals compile (no fixed data region)'

          echo "== stage-2: short-circuit &&/||, hex literals, ^ (A16) =="
          # Short-circuiting cannot be emitted like an ordinary binary operator: a
          # shunting-yard emits when it POPS an operator, by which point both
          # operands are already evaluated. So &&/|| emit their test+branch at PUSH
          # time (where the left operand is final) and backpatch at apply time, with
          # the patch slot keyed by the operator's OPSTACK INDEX -- which is what
          # makes it re-entrancy-safe inside call arguments for free.
          #
          # The point of the feature is the branch, so the load-bearing cases here
          # are BEHAVIOURAL: a side effect that must NOT happen, and a null deref
          # that must NOT be reached. M2-Planet guards its null derefs this way
          # (`NULL != a && a->s`), so getting this wrong is a SIGSEGV, not a wrong
          # answer. Timeout-bounded like the front-end section: a mis-aimed
          # backpatch can loop forever rather than return something wrong.
          sc_ok=yes
          stry() {
            set +e
            printf '%s' "$1" | timeout 30 qemu-aarch64 ./stage2 > sc.s
            if [ $? -ne 0 ] || [ ! -s sc.s ]; then
              sc_ok=no
              printf '  %-64s %s\n' "$3" 'COMPILE FAILED/HUNG'
              set -e; return
            fi
            cat sc.s | timeout 30 qemu-aarch64 ./stage1 | timeout 30 qemu-aarch64 ./stage0-as | timeout 30 qemu-aarch64 ./elf a.out
            set -e
            set +e; timeout 30 qemu-aarch64 ./a.out; rc=$?; set -e
            if [ "$rc" = "$2" ]; then st=OK; else st=DIFF; sc_ok=no; fi
            printf '  %-64s exit=%-4s want=%-4s %s\n' "$3" "$rc" "$2" "$st"
          }
          # truth table + C's 0/1 normalisation (the result is 1, not the operand)
          stry 'int main(){return 1&&1;}' 1 '&& true'
          stry 'int main(){return 1&&0;}' 0 '&& false'
          stry 'int main(){return 5&&3;}' 1 '&& normalises to 1 (not 3)'
          stry 'int main(){return 0||0;}' 0 '|| false'
          stry 'int main(){return 0||7;}' 1 '|| normalises to 1 (not 7)'
          stry 'int main(){return 1&&1&&1;}' 1 '&& chain'
          stry 'int main(){return 0||0||3;}' 1 '|| chain'
          # THE point: the right operand must not be evaluated.
          SCB='int g;int bump(){g=g+1;return 1;}'
          stry "$SCB"'int main(){int r;g=0;r=0&&bump();return g;}' 0 '&& skips RHS (no side effect)'
          stry "$SCB"'int main(){int r;g=0;r=1&&bump();return g;}' 1 '&& runs RHS when LHS true'
          stry "$SCB"'int main(){int r;g=0;r=1||bump();return g;}' 0 '|| skips RHS (no side effect)'
          stry "$SCB"'int main(){int r;g=0;r=0||bump();return g;}' 1 '|| runs RHS when LHS false'
          # the M2-Planet shape: a null guard. Without short-circuiting this SIGSEGVs.
          SCN='struct N{int v;struct N* nx;};'
          stry "$SCN"'int main(){struct N* p;p=0;if(p&&p->v){return 9;}return 3;}' 3 'null guard p&&p->v does not deref'
          stry "$SCN"'int main(){struct N* p;p=0;if(0!=p&&p->v){return 9;}return 3;}' 3 'null guard 0!=p&&p->v does not deref'
          stry "$SCN"'int main(){struct N* p;p=calloc(1,16);p->v=7;if(p&&p->v){return 9;}return 3;}' 9 'guard still passes when non-null'
          # precedence: || < && < | < ^ < & < == < relational. Each case differs
          # from the naive left-to-right answer, so they actually discriminate.
          stry 'int main(){return 1||0&&0;}' 1 'precedence 1||0&&0 (not (1||0)&&0)'
          stry 'int main(){return (1||0)&&0;}' 0 'precedence parenthesised'
          stry 'int main(){return 1|2&&1;}' 1 'precedence | tighter than &&'
          stry 'int main(){return 1|2^3;}' 1 'precedence ^ tighter than |'
          stry 'int main(){return 6^3&1;}' 7 'precedence & tighter than ^'
          stry 'int main(){return 1^1==1;}' 0 'precedence == tighter than ^'
          # re-entrancy: patch slots are keyed by opstack index, so short-circuits
          # nested in call arguments (and calls inside operands) need no save/restore.
          stry 'int f(int a,int b){return a+b*10;}int main(){return f(1&&1,0||5);}' 11 '&& inside call arguments'
          stry 'int one(){return 1;}int zero(){return 0;}int main(){return one()&&zero()||one();}' 1 'calls inside && operands'
          # order dependence (the m54 symptom): a victim defined AFTER a
          # short-circuiting function must still mean what it meant alone.
          SCC='int chk(int a,int b){if(a>0&&b>0){return 1;}return 0;}'
          stry "$SCC"'int g(){int a;if(0){a=9;}else{a=3;}return a;}int main(){return g();}' 3 'victim if/else after &&'
          stry "$SCC"'int g(){int i;int s;i=0;s=0;while(i<3){s=s+1;i=i+1;}return s;}int main(){return g();}' 3 'victim while after &&'
          # hex literals -- and decimal must be untouched by the new lexer rule.
          stry 'int main(){return 0x2A;}' 42 'hex 0x2A'
          stry 'int main(){return 0xff;}' 255 'hex lowercase 0xff'
          stry 'int main(){return 0XFF;}' 255 'hex uppercase 0XFF'
          stry 'int main(){return 0x0;}' 0 'hex zero'
          stry 'int main(){return 0;}' 0 'bare 0 still decimal'
          stry 'int main(){return 10;}' 10 'decimal unchanged'
          stry 'int main(){int c;c=321;return c&0xFF;}' 65 'hex mask (M2 shape: & 0xFF)'
          stry 'int main(){return 0x12345&0xFF;}' 69 'hex >=2^16 goes through movk path'
          stry 'int main(){int a[0x10];a[15]=7;return a[15];}' 7 'hex array size a[0x10]'
          stry 'int main(){int a[16];a[15]=7;return a[15];}' 7 'decimal array size unchanged'
          # ^ itself, and the neighbours it must not have disturbed.
          stry 'int main(){return 12^10;}' 6 'xor 12^10'
          stry 'int main(){int x;x=93;return x^x;}' 0 'xor x^x == 0'
          stry 'int main(){return (12|3)+(12&8);}' 23 'orr/and unchanged by ^'
          # structural: || is the ONLY thing that emits `b.ne @` (if/while and &&
          # use `b.eq __L`, back-branches use `b __L`), so this pins the inversion.
          printf '%s' 'int f(int a,int b){return a&&b;}int main(){return 0;}' | qemu-aarch64 ./stage2 > scand.s
          printf '%s' 'int f(int a,int b){return a||b;}int main(){return 0;}' | qemu-aarch64 ./stage2 > scor.s
          printf '%s' 'int f(int a,int b){return a^b;}int main(){return 0;}'  | qemu-aarch64 ./stage2 > scxor.s
          grep -q 'b.eq __L' scand.s || { echo "  MISSING && forward branch (b.eq __L)"; sc_ok=no; }
          grep -q 'b.ne '    scand.s && { echo "  REGRESSION: && emitted an inverted branch"; sc_ok=no; }
          grep -q 'b.ne __L' scor.s  || { echo "  MISSING || inverted branch (b.ne __L)"; sc_ok=no; }
          grep -q 'eor x0 x1 x0' scxor.s || { echo "  MISSING ^ lowering (eor x0 x1 x0)"; sc_ok=no; }
          printf '  %-64s %s\n' 'emitted branch forms: && b.eq / || b.ne / ^ eor' \
                 "$([ "$sc_ok" = yes ] && echo OK || echo DIFF)"

          echo "== stage-2: goto + labels (A17) =="
          # A label definition emits a NAMED label and `goto L` emits `b <label>`,
          # both resolved by stage1 (a two-pass numeric resolver since m32) -- which
          # is why a FORWARD goto needs no backpatching in this single-pass compiler.
          # The name carries a per-function index (__Lg<idx>_<name>) so labels are
          # FUNCTION-scoped as C requires; M2-Planet's own compiler emits the bare
          # name into one flat namespace, so this is stricter than the target needs.
          #
          # The load-bearing risk is the A13 x17 invariant: a label line assembles to
          # 0 bytes, so if it ever bumped the emitted-instruction counter, the numeric
          # @-targets of every function emitted AFTERWARDS would drift -- a silent,
          # deferred, order-dependent corruption. Guarded exactly (a label must shift
          # no @-target) and behaviourally (a function defined after a goto-using one
          # must still return what it returns alone). Timeout-bounded: a mis-aimed
          # branch loops forever rather than returning something wrong.
          goto_ok=yes
          gtry() {
            set +e
            printf '%s' "$1" | timeout 30 qemu-aarch64 ./stage2 > gt.s
            if [ $? -ne 0 ] || [ ! -s gt.s ]; then
              goto_ok=no
              printf '  %-64s %s\n' "$3" 'COMPILE FAILED/HUNG'
              set -e; return
            fi
            cat gt.s | timeout 30 qemu-aarch64 ./stage1 | timeout 30 qemu-aarch64 ./stage0-as | timeout 30 qemu-aarch64 ./elf a.out
            set -e
            set +e; timeout 30 qemu-aarch64 ./a.out; rc=$?; set -e
            if [ "$rc" = "$2" ]; then st=OK; else st=DIFF; goto_ok=no; fi
            printf '  %-64s exit=%-4s want=%-4s %s\n' "$3" "$rc" "$2" "$st"
          }
          # the shapes M2-Planet actually uses: a backward jump to a label at body top
          # (its `reset:` loop idiom, 12 of its 13 gotos), one forward jump to a label
          # near the end (`goto exit_success;`), and jumps out of several open blocks.
          gtry 'int main(){int i;int s;i=0;s=0;top: i=i+1;s=s+i;if(i<4){goto top;}return s;}' 10 'backward goto (loop idiom)'
          gtry 'int main(){int a;a=1;goto done;a=99;done: return a+4;}' 5 'forward goto skips code'
          gtry 'int f(int n){int s;s=0;again: s=s+n;n=n-1;if(n>0){goto again;}return s;}int main(){return f(4);}' 10 'label at top of a function body'
          gtry 'int main(){int i;i=0;top: i=i+1;if(i<20){if(i<10){while(i<50){i=i+3;goto top;}}}return i;}' 13 'goto out of if/if/while'
          gtry 'int main(){int i;i=0;while(1){i=i+1;if(i>5){goto out;}}out: return i;}' 6 'goto out of a while loop'
          gtry 'int main(){int a;a=0;top: a=a+1;if(a>3){return a;}else{goto top;}return 99;}' 4 'goto from an else arm'
          gtry 'int main(){int a;a=0;one: a=a+1;if(a<2){goto one;}two: a=a+10;if(a<30){goto two;}return a;}' 32 'two labels in one function'
          gtry 'int a(){int i;i=0;lp: i=i+1;if(i<3){goto lp;}return i;}int b(){int j;j=0;lp: j=j+2;if(j<8){goto lp;}return j;}int main(){return a()+b();}' 11 'same label name in two functions'
          gtry 'int g(){int i;i=0;lp: i=i+1;if(i<3){goto lp;}return i;}int later(){int k;k=0;while(k<7){k=k+1;}return k;}int main(){return g()*10+later();}' 37 'function after a goto-using one is unaffected'
          # structural
          printf '%s' 'int main(){int i;i=0;top: i=i+1;if(i<3){goto top;}return i;}' | qemu-aarch64 ./stage2 > gto.s
          grep -q '^b __Lg' gto.s || { echo "  MISSING goto branch (b __Lg)"; goto_ok=no; }
          grep -q '^:__Lg0001_top$' gto.s || { echo "  MISSING function-indexed label (:__Lg0001_top)"; goto_ok=no; }
          grep -q 'b.eq __L' gto.s || { echo "  MISSING if branch alongside the goto label"; goto_ok=no; }
          [ "$(grep -c '^$' gto.s)" = 0 ] || { echo "  REGRESSION: blank emitted line (x17 accounting)"; goto_ok=no; }
          # exact 0-byte/0-tick witness: adding a label must shift no @-target
          # A22 retires the 0-byte/0-tick @-target witness: there are no absolute
          # positions left to shift. What must still hold is that a goto label is
          # emitted as a definition and branched to by name.
          printf '%s' 'int main(){int i;i=0;top: if(i<3){goto top;}return i;}' | qemu-aarch64 ./stage2 > glab.s
          grep -q '^:__Lg0001_top$' glab.s || { echo "  MISSING goto label definition"; goto_ok=no; }
          grep -q '^b __Lg0001_top$' glab.s || { echo "  MISSING goto branch by name"; goto_ok=no; }
          # a program with no goto must carry no goto machinery at all
          printf '%s' 'int main(){int i;i=0;while(i<3){i=i+1;}return i;}' | qemu-aarch64 ./stage2 > gnone.s
          grep -q '__Lg' gnone.s && { echo "  REGRESSION: non-goto program emitted __Lg"; goto_ok=no; }
          printf '  %-64s %s\n' 'structural: b __Lg / :__Lg<idx>_ / label costs 0 bytes' \
                 "$([ "$goto_ok" = yes ] && echo OK || echo DIFF)"

          echo "== stage-2: forward prototypes (A18) =="
          # `int f(int, int);` at file scope. Before this rung funcloop committed to a
          # DEFINITION the moment it saw `(` after the name, so the `;` where `{` should
          # be derailed it and the compiler HUNG. That made it the biggest single
          # blocker on real M2-Planet code, which declares nearly every function ahead
          # of use (73 sites across its eight self-host files). Fixed with a
          # paren-matching lookahead: scan from `(` to its partner, skip whitespace,
          # branch on `;` (prototype) vs anything else (definition).
          #
          # A prototype declares nothing and emits nothing -- correct here, not a
          # shortcut: the bl-vs-blr split is read off the symbol tables (a called name
          # in NO table is a function -> direct `bl`), so a function is callable without
          # a prior declaration. Unnamed parameters fall out for free, since the
          # declarator is never parsed. Timeout-bounded: the old failure was a HANG.
          proto_ok=yes
          ptry() {
            set +e
            printf '%s' "$1" | timeout 30 qemu-aarch64 ./stage2 > pt.s
            if [ $? -ne 0 ] || [ ! -s pt.s ]; then
              proto_ok=no
              printf '  %-64s %s\n' "$3" 'COMPILE FAILED/HUNG'
              set -e; return
            fi
            cat pt.s | timeout 30 qemu-aarch64 ./stage1 | timeout 30 qemu-aarch64 ./stage0-as | timeout 30 qemu-aarch64 ./elf a.out
            set -e
            set +e; timeout 30 qemu-aarch64 ./a.out; rc=$?; set -e
            if [ "$rc" = "$2" ]; then st=OK; else st=DIFF; proto_ok=no; fi
            printf '  %-64s exit=%-4s want=%-4s %s\n' "$3" "$rc" "$2" "$st"
          }
          ptry 'int add(int a,int b);int main(){return add(3,4);}int add(int a,int b){return a+b;}' 7 'prototype with named params'
          ptry 'int add(int,int);int main(){return add(20,22);}int add(int a,int b){return a+b;}' 42 'prototype with UNNAMED params'
          ptry 'struct N{int v;struct N* nx;};struct N* mk(int v);int main(){struct N* p;p=mk(9);return p->v;}struct N* mk(int v){struct N* n;n=calloc(1,sizeof(struct N));n->v=v;return n;}' 9 'struct* return-type prototype'
          ptry 'void bump(void);int G;int main(){bump();bump();return G;}void bump(void){G=G+3;}' 6 'void prototype'
          ptry 'int fact(int n);int main(){return fact(5);}int fact(int n){if(n<2){return 1;}return n*fact(n-1);}' 120 'prototype + recursion'
          ptry 'int odd(int n);int even(int n){if(n==0){return 1;}return odd(n-1);}int odd(int n){if(n==0){return 0;}return even(n-1);}int main(){return even(10)+odd(7);}' 2 'prototype enabling mutual recursion'
          ptry "$(printf 'int add(int a,\n  int b);\nint main(){return add(6,6);}\nint add(int a,int b){return a+b;}')" 12 'prototype spanning lines'
          ptry 'int add(int a,int b){return a+b;}int main(){return add(1,2);}' 3 'no prototype (regression)'
          # structural: a prototype must emit ZERO bytes -- the strongest form of the
          # A13 x17 guarantee, since output is byte-identical with and without it.
          printf '%s' 'int add(int a,int b){return a+b;}int main(){return add(1,2);}' | qemu-aarch64 ./stage2 > pnop.s
          printf '%s' 'int add(int,int);int add(int a,int b){return a+b;}int main(){return add(1,2);}' | qemu-aarch64 ./stage2 > pwip.s
          cmp -s pnop.s pwip.s || { echo "  REGRESSION: a prototype changed the emitted output"; proto_ok=no; }
          printf '%s' 'int f(int);int g(int);int h(int);int main(){return 1;}' | qemu-aarch64 ./stage2 > ponly.s
          [ "$(grep '^:' ponly.s)" = ':main' ] || { echo "  REGRESSION: a prototype emitted a label"; proto_ok=no; }
          printf '  %-64s %s\n' 'structural: prototypes emit zero bytes and no label' \
                 "$([ "$proto_ok" = yes ] && echo OK || echo DIFF)"

          echo "== stage-2: braceless statement bodies (A19) =="
          # `if(cond) return x;` with no braces -- ~370 sites in M2-Planet's self-host
          # (199 return, 120 call/assign, 34 bare else, 11 break, 2 goto), silently
          # miscompiled until now. Two parts, and the first is the subtle one:
          #
          # (1) The CONDITION had to be bounded. compile_expr did not stop at the
          #     condition's ')' -- it relied on the body's '{' to terminate it, and
          #     ce_kw treats ANY keyword in operand position as `sizeof`. So
          #     `if(a) return 5;` swallowed `return` into the condition, and
          #     `if(a) f(b);` emitted the call as part of the condition and then
          #     tested ITS result. Fixed by scanning to the matching ')' and
          #     temporarily lowering x21 (input length) so the tokenizer reports EOF
          #     there, which compile_expr already terminates on cleanly. The scanner
          #     skips char/string literals as the lexer does, so `if(c=='(')` is safe.
          # (2) A braceless body closes after ONE statement: block records carry
          #     kind+4, and statement-completion exits route through `stmtend`, which
          #     pops while the top record is braceless. Close routines re-enter it, so
          #     `if(a) if(b) x;` unwinds and a dangling `else` binds to the inner `if`.
          bl_ok=yes
          btry() {
            set +e
            printf '%s' "$1" | timeout 30 qemu-aarch64 ./stage2 > bl.s
            if [ $? -ne 0 ] || [ ! -s bl.s ]; then
              bl_ok=no
              printf '  %-64s %s\n' "$3" 'COMPILE FAILED/HUNG'
              set -e; return
            fi
            cat bl.s | timeout 30 qemu-aarch64 ./stage1 | timeout 30 qemu-aarch64 ./stage0-as | timeout 30 qemu-aarch64 ./elf a.out
            set -e
            set +e; timeout 30 qemu-aarch64 ./a.out; rc=$?; set -e
            if [ "$rc" = "$2" ]; then st=OK; else st=DIFF; bl_ok=no; fi
            printf '  %-64s exit=%-4s want=%-4s %s\n' "$3" "$rc" "$2" "$st"
          }
          btry 'int main(){int a;a=1;if(a) return 5;return 9;}' 5 'braceless if + return'
          btry 'int main(){int a;a=0;if(a) return 5;return 9;}' 9 'braceless if, false, falls through'
          btry 'int main(){int a;a=0;if(1) a=7;return a;}' 7 'braceless if + assignment'
          btry 'int G;int bump(){G=G+4;return 0;}int main(){if(1) bump();return G;}' 4 'braceless if + call statement'
          btry 'int main(){int i;i=0;while(i<5) i=i+1;return i;}' 5 'braceless while'
          btry 'int main(){int a;a=0;if(a) return 1;else return 8;}' 8 'bare else'
          btry 'int f(int n){if(n<1) return 10;else if(n<2) return 20;else return 30;}int main(){return f(1);}' 20 'braceless else-if chain'
          btry 'int main(){int a;a=0;if(a){a=1;}else a=6;return a;}' 6 'braced then + bare else'
          btry 'int main(){int a;a=1;if(a) a=3;else{a=9;}return a;}' 3 'bare then + braced else'
          btry 'int main(){int a;int b;a=1;b=1;if(a) if(b) return 7;return 2;}' 7 'nested braceless if'
          btry 'int f(int a,int b){if(a) if(b) return 1;else return 2;return 3;}int main(){return f(1,0);}' 2 'dangling else binds to the INNER if'
          btry 'int main(){int i;i=0;if(1) while(i<6){i=i+1;}return i;}' 6 'braceless if whose body is a braced while'
          btry 'int main(){int a;a=0;if(1) {a=4;}return a;}' 4 'braceless if whose body is a block'
          btry 'int main(){int i;i=0;top: i=i+1;if(i<4) goto top;return i;}' 4 'braceless if + goto (A17 interop)'
          btry 'int main(){int a;a=5;if(a) ;return a;}' 5 'empty statement as the body'
          # condition-bounding regressions
          btry 'int f(int c){if(c==40) return 3;return 9;}int main(){return f(40);}' 3 'condition compares a paren char code'
          btry 'int p(int n){return n;}int main(){if(p(1)) return 6;return 0;}' 6 'call inside the condition'
          btry 'int main(){int a;a=2;if(((a+1)*2)==6) return 4;return 0;}' 4 'nested parens in the condition'
          btry 'int main(){int a;int b;a=1;b=0;if(a&&!b) return 5;return 0;}' 5 'short-circuit operators in the condition'
          # structural: a BRACED program must be byte-identical to the braced-only era,
          # i.e. this rung is a pure superset. Checked against the same program's
          # emission being stable and label-shaped as before.
          printf '%s' 'int main(){int a;a=5;if(a){a=a+1;}return a;}' | qemu-aarch64 ./stage2 > blbr.s
          grep -q 'b.eq __L' blbr.s || { echo "  REGRESSION: braced if lost its branch"; bl_ok=no; }
          grep '^:' blbr.s | grep -v '^:main$' | grep -qv '^:__L' \
            && { echo "  REGRESSION: braced if emitted an unexpected label"; bl_ok=no; }
          [ "$(grep -c '^$' blbr.s)" = 0 ] || { echo "  REGRESSION: blank emitted line (x17 accounting)"; bl_ok=no; }
          printf '%s' 'int main(){int a;a=1;if(a) return 5;return 9;}' | qemu-aarch64 ./stage2 > blbl.s
          [ "$(grep -c '^$' blbl.s)" = 0 ] || { echo "  REGRESSION: braceless body emitted a blank line (x17)"; bl_ok=no; }
          grep -q 'b.eq __L' blbl.s || { echo "  MISSING branch for a braceless if"; bl_ok=no; }
          printf '  %-64s %s\n' 'structural: braced unchanged, braceless drift-free' \
                 "$([ "$bl_ok" = yes ] && echo OK || echo DIFF)"

          # The payoff witness: M2-Planet-SHAPED code exercising A17+A18+A19 at once.
          # `in_set` and `match` are the shape of M2-Planet's own helpers (`match`
          # written as its goto-loop idiom). Exit 42 only if every assertion holds.
          printf "int match(char* a, char* b);\nint in_set(int c, char* s);\nint in_set(int c, char* s)\n{\n\twhile(0 != s[0])\n\t{\n\t\tif(c == s[0]) return 1;\n\t\ts = s + 1;\n\t}\n\treturn 0;\n}\nint match(char* a, char* b)\n{\n\tint i = 0;\nmloop:\n\tif(a[i] != b[i]) return 0;\n\tif(a[i] == 0) return 1;\n\ti = i + 1;\n\tgoto mloop;\n}\nint main()\n{\n\tif(!match(\"hello\",\"hello\")) return 1;\n\tif(match(\"hello\",\"world\")) return 2;\n\tif(!in_set(101, \"abcde\")) return 3;\n\tif(in_set(122, \"abcde\")) return 4;\n\treturn 42;\n}\n" > m2shape.c
          set +e
          timeout 30 qemu-aarch64 ./stage2 < m2shape.c > m2shape.s
          if [ $? -ne 0 ] || [ ! -s m2shape.s ]; then
            echo "  m2-shaped program: COMPILE FAILED/HUNG"; bl_ok=no
          else
            cat m2shape.s | timeout 30 qemu-aarch64 ./stage1 | timeout 30 qemu-aarch64 ./stage0-as | timeout 30 qemu-aarch64 ./elf a.out
            timeout 30 qemu-aarch64 ./a.out; rc=$?
            if [ "$rc" = 42 ]; then st=OK; else st=DIFF; bl_ok=no; fi
            printf '  %-64s exit=%-4s want=%-4s %s\n' 'M2-shaped: prototypes + goto + braceless + strings' "$rc" 42 "$st"
          fi
          set -e

          echo "== stage-2: string/char escapes (A20) =="
          # ~993 escapes in M2-Planet's self-host -- the largest single count, and the
          # one gap no source rewrite could paper over: the escapes are inside the
          # assembly text M2-Planet EMITS ("\n# Core program\n"), so a lexer that
          # stores \n as two literal bytes yields a compiler whose OUTPUT is textually
          # wrong everywhere. Distribution: \n 964, \\ 10, \' 7, \" 7, \t 4, \r 1.
          # Three sites had to agree: the char-literal lexer (it assumed a 3-char 'X'),
          # the string scanner (it stopped at the first '"', even an escaped one), and
          # the data-section emitter (it copied source bytes verbatim). The A19
          # condition scanner needed it too, since it skips literals to keep its paren
          # count honest.
          #
          # Sources are built with printf OCTAL escapes -- \047 ' , \042 " , \134 \ --
          # so no shell or YAML quoting layer can silently alter the test input.
          esc_ok=yes
          LEN='int len(char* p){int n;n=0;while(p[n]){n=n+1;}return n;}'
          etry() {
            printf "$1" > esc.c
            set +e
            timeout 30 qemu-aarch64 ./stage2 < esc.c > esc.s
            if [ $? -ne 0 ] || [ ! -s esc.s ]; then
              esc_ok=no
              printf '  %-64s %s\n' "$3" 'COMPILE FAILED/HUNG'
              set -e; return
            fi
            cat esc.s | timeout 30 qemu-aarch64 ./stage1 | timeout 30 qemu-aarch64 ./stage0-as | timeout 30 qemu-aarch64 ./elf a.out
            set -e
            set +e; timeout 30 qemu-aarch64 ./a.out; rc=$?; set -e
            if [ "$rc" = "$2" ]; then st=OK; else st=DIFF; esc_ok=no; fi
            printf '  %-64s exit=%-4s want=%-4s %s\n' "$3" "$rc" "$2" "$st"
          }
          # char literals: the decoded value IS the observable
          etry 'int main(){char c;c=\047\134n\047;return c;}'    10 'char backslash-n -> 10'
          etry 'int main(){char c;c=\047\134t\047;return c;}'     9 'char backslash-t -> 9'
          etry 'int main(){char c;c=\047\134r\047;return c;}'    13 'char backslash-r -> 13'
          etry 'int main(){char c;c=\047\134\134\047;return c;}' 92 'char escaped backslash -> 92'
          etry 'int main(){char c;c=\047\134\047\047;return c;}' 39 'char escaped single quote -> 39'
          etry 'int main(){char c;c=\047\134\042\047;return c;}' 34 'char escaped double quote -> 34'
          etry 'int main(){char c;c=\047\1340\047;return c+7;}'   7 'char backslash-0 -> 0'
          etry 'int main(){char c;c=\047A\047;return c;}'        65 'plain char unchanged'
          # strings: an escape must occupy exactly ONE byte in the data section
          etry "$LEN"'int main(){return len(\042a\134nb\042);}'           3 'backslash-n is one byte'
          etry 'int main(){char* s;s=\042a\134nb\042;return s[1];}'      10 'string backslash-n value'
          etry 'int main(){char* s;s=\042a\134tb\042;return s[1];}'       9 'string backslash-t value'
          etry 'int main(){char* s;s=\042a\134rb\042;return s[1];}'      13 'string backslash-r value'
          etry 'int main(){char* s;s=\042a\134\134b\042;return s[1];}'   92 'string escaped backslash value'
          # an escaped quote must NOT terminate the literal -- the scanner bug
          etry 'int main(){char* s;s=\042a\134\042b\042;return s[1];}'   34 'escaped quote does not end the string'
          etry "$LEN"'int main(){return len(\042a\134\042b\042);}'        3 'escaped-quote string length is 3'
          etry 'int main(){char* s;s=\042\134nx\042;return s[0];}'       10 'escape at string start'
          etry 'int main(){char* s;s=\042x\134n\042;return s[1];}'       10 'escape at string end'
          etry "$LEN"'int main(){return len(\042\134n\134n\134n\134n\134n\042);}' 5 'all-escape string length'
          etry "$LEN"'int main(){return len(\042\134n# Core program\134n\042);}' 16 'M2 output-string shape'
          etry "$LEN"'int main(){return len(\042hello\042);}'             5 'plain string unchanged'
          # A19 interop: the condition scanner skips literals to keep parens balanced
          etry "$LEN"'int main(){if(len(\042a\134\042b\042)==3) return 8;return 0;}' 8 'escaped quote inside a condition'
          etry 'int main(){char c;c=\047\134n\047;if(c==\047\134n\047) return 6;return 0;}' 6 'escaped char literal in a condition'
          # structural: "a\nb" must lay down exactly 4 data bytes (3 + terminator),
          # i.e. the escape collapsed rather than being stored as two source bytes.
          printf 'int main(){char* s;s=\042a\134nb\042;return s[0];}' > escb.c
          qemu-aarch64 ./stage2 < escb.c > escb.s
          nb=$(grep -c '^\.byte' escb.s)
          [ "$nb" = 4 ] || { echo "  REGRESSION: escaped string emitted $nb data bytes, want 4 (escape not collapsed)"; esc_ok=no; }
          # THE property that matters: the bytes actually reaching stdout. If these
          # are not real bytes, every line M2-Planet emits is textually wrong.
          printf "$LEN"'int puts(char* s){write(1,s,len(s));return 0;}int main(){puts(\042\134n# Core program\134n\042);puts(\042a\134tb\134n\042);puts(\042q\134\042q\134n\042);puts(\042back\134\134slash\134n\042);return 0;}' > escout.c
          qemu-aarch64 ./stage2 < escout.c > escout.s
          cat escout.s | qemu-aarch64 ./stage1 | qemu-aarch64 ./stage0-as | qemu-aarch64 ./elf a.out
          set +e; timeout 30 qemu-aarch64 ./a.out > escout.txt; set -e
          printf '\n# Core program\na\tb\nq\042q\nback\134slash\n' > escwant.txt
          if cmp -s escout.txt escwant.txt; then st=OK; else st=DIFF; esc_ok=no; echo "  emitted bytes differ; got:"; od -c escout.txt | head -4; echo "  want:"; od -c escwant.txt | head -4; fi
          printf '  %-64s %s\n' 'emitted bytes reach stdout exactly (od/cmp)' "$st"
          printf '  %-64s %s\n' 'structural: escapes collapse to one data byte' \
                 "$([ "$esc_ok" = yes ] && echo OK || echo DIFF)"

          echo "== stage-2: preprocessor directives (A21) =="
          # Scoped by reading how M2-Planet's self-host is ACTUALLY built. Its own
          # bootstrap passes every translation unit as an ordered `-f` list and runs
          # with --bootstrap-mode, in which the entire preprocessor is
          # remove_preprocessor_directives: a token starting with '#' discards the
          # rest of the line. No include expansion, no macros, no conditionals.
          # That works because the -f list makes #include redundant and there are NO
          # object-like #define constants -- the only #define is the CC_H include
          # guard. NULL/TRUE/FALSE/EOF/stdin/stdout/stderr are `enum` constants in
          # M2libc/bootstrap.c, itself in the -f list. Our -f equivalent is
          # concatenated stdin, which already worked, so this is one lexer rule.
          pp_ok=yes
          pptry() {
            printf "$1" > pp.c
            set +e
            timeout 30 qemu-aarch64 ./stage2 < pp.c > pp.s
            if [ $? -ne 0 ] || [ ! -s pp.s ]; then
              pp_ok=no
              printf '  %-64s %s\n' "$3" 'COMPILE FAILED/HUNG'
              set -e; return
            fi
            cat pp.s | timeout 30 qemu-aarch64 ./stage1 | timeout 30 qemu-aarch64 ./stage0-as | timeout 30 qemu-aarch64 ./elf a.out
            set -e
            set +e; timeout 30 qemu-aarch64 ./a.out; rc=$?; set -e
            if [ "$rc" = "$2" ]; then st=OK; else st=DIFF; pp_ok=no; fi
            printf '  %-64s exit=%-4s want=%-4s %s\n' "$3" "$rc" "$2" "$st"
          }
          pptry '#include <stdio.h>\n#include \042cc.h\042\nint main(){return 7;}' 7 '#include is skipped'
          pptry '#ifndef CC_H\n#define CC_H\nint main(){return 9;}\n#endif\n' 9 'include-guard trio is skipped'
          pptry 'int a(){return 3;}\n#include \042x.h\042\nint main(){return a()+1;}' 4 'directive between functions'
          pptry 'int main(){int a;a=1;\n#ifdef FOO\n a=a+4;\nreturn a;}' 5 'directive inside a function body'
          pptry '   #include <stdlib.h>\nint main(){return 6;}' 6 'indented directive'
          # '#' is only a directive at TOKEN position. M2-Planet emits "\n# Core
          # program\n", so a rule that fired inside string literals would eat it.
          pptry "$LEN"'int main(){return len(\042#not a directive\042);}' 16 'hash inside a string is not a directive'
          pptry "$LEN"'int main(){return len(\042\134n# Core program\134n\042);}' 16 'hash in a string with an escape (A20 interop)'
          # the -f list equivalent: translation units concatenated, directives interleaved
          pptry 'int in_set(int c,char* s);\n#include \042cc.h\042\nint in_set(int c,char* s){while(0 != s[0]){if(c == s[0]) return 1;s = s + 1;}return 0;}\n#include <stdio.h>\nint main(){if(!in_set(101,\042abcde\042)) return 1;return 21;}' 21 'concatenated translation units with directives'
          # a directive must contribute nothing to the emitted program
          printf 'int main(){return 7;}' > ppa.c
          printf '#include <stdio.h>\n#define X 1\nint main(){return 7;}\n#endif\n' > ppb.c
          qemu-aarch64 ./stage2 < ppa.c > ppa.s
          qemu-aarch64 ./stage2 < ppb.c > ppb.s
          cmp -s ppa.s ppb.s || { echo "  REGRESSION: directives changed the emitted program"; pp_ok=no; }
          printf '  %-64s %s\n' 'structural: directives emit nothing' \
                 "$([ "$pp_ok" = yes ] && echo OK || echo DIFF)"

          echo "== stage-2: capacity — input, inline data, adr reach (A23) =="
          # The three hard-coded limits that survived A22's streaming output, all now
          # structural rather than raised:
          #   input -- was a SINGLE read() of 65,000 B into a 64 KB region. One read on
          #            a pipe returns only what is buffered, so it truncated silently
          #            well below even that. Now one lazily-paged mmap arena with the
          #            tables based 128 MiB up, plus a read LOOP; overflow exits 2.
          #   data  -- was a fixed ~124 KB region between the tables, with the m55 bound
          #            reporting overflow. There is no data region now: literals and
          #            globals emit INLINE behind a skip branch, 4-byte padded.
          #   adr   -- 'adr x0 __dN' reached a TRAILING data section. adr is +-1 MB and
          #            M2-Planet's code is ~0.7-1.4 MB, so the address was silently
          #            wrong at scale. Inline data sits adjacent to its adr, so reach
          #            is O(literal size) rather than O(program size).
          cap23_ok=yes
          c23() {
            # printf expands \042 etc. only in its FORMAT string, never in a %s
            # ARGUMENT. Using '%s' here fed the compiler a literal backslash-042
            # instead of a quote, so every literal test compiled garbage and
            # segfaulted -- the same trap the escape section already documents.
            printf "$1" > c23.c
            set +e
            timeout 120 qemu-aarch64 ./stage2 < c23.c > c23.s
            if [ $? -ne 0 ] || [ ! -s c23.s ]; then
              cap23_ok=no
              printf '  %-64s %s\n' "$3" 'COMPILE FAILED/HUNG'
              set -e; return
            fi
            cat c23.s | timeout 120 qemu-aarch64 ./stage1 | timeout 120 qemu-aarch64 ./stage0-as | timeout 120 qemu-aarch64 ./elf a.out
            set -e
            set +e; timeout 120 qemu-aarch64 ./a.out; rc=$?; set -e
            if [ "$rc" = "$2" ]; then st=OK; else st=DIFF; cap23_ok=no; fi
            printf '  %-64s exit=%-4s want=%-4s %s\n' "$3" "$rc" "$2" "$st"
          }
          L23='int len(char* p){int n;n=0;while(p[n]){n=n+1;}return n;}'
          # inline data must be correct at EVERY alignment: the bytes sit in the
          # instruction stream, so a padding error misaligns everything after it.
          c23 "$L23"'int main(){return len(\042\042);}'          0 'inline literal, length 0'
          c23 "$L23"'int main(){return len(\042x\042);}'         1 'inline literal, length 1'
          c23 "$L23"'int main(){return len(\042xx\042);}'        2 'inline literal, length 2'
          c23 "$L23"'int main(){return len(\042xxx\042);}'       3 'inline literal, length 3'
          c23 "$L23"'int main(){return len(\042xxxx\042);}'      4 'inline literal, length 4 (exact boundary)'
          c23 "$L23"'int main(){return len(\042xxxxx\042);}'     5 'inline literal, length 5'
          c23 "$L23"'int main(){return len(\042xxxxxxxx\042);}'  8 'inline literal, length 8'
          c23 'char A[8192];char B[16384];int main(){return 3;}' 3 'large globals (no fixed data region left)'
          # structural: the skip branch, the padding, and adr ADJACENCY
          printf 'int main(){char* s;s=\042ab\042;return s[1];}' > c23b.c
          qemu-aarch64 ./stage2 < c23b.c > c23b.s
          grep -q '^b __ds'  c23b.s || { echo "  MISSING inline-data skip branch (b __ds)"; cap23_ok=no; }
          grep -q '^:__ds'   c23b.s || { echo "  MISSING inline-data skip label (:__ds)"; cap23_ok=no; }
          nb23=$(grep -c '^\.byte' c23b.s)
          [ "$nb23" = 4 ] || { echo "  \"ab\" emitted $nb23 data bytes, want 4 (2 + NUL + 1 pad)"; cap23_ok=no; }
          # adr must come AFTER its data label, i.e. the data is adjacent, not trailing
          dl=$(grep -n '^:__d0000$'    c23b.s | cut -d: -f1)
          al=$(grep -n '^adr x0 __d0000$' c23b.s | cut -d: -f1)
          [ -n "$dl" ] && [ -n "$al" ] && [ "$al" -gt "$dl" ] \
            || { echo "  adr does not follow its data (data is not adjacent: dl=$dl al=$al)"; cap23_ok=no; }
          # INPUT capacity: build a source past the old 64 KB single-read ceiling.
          # Note the old code could not even reach 64 KB reliably -- one read() on a
          # pipe returns only what is buffered, typically far less.
          gen_fns() {
            printf '' > c23big.c
            i=0
            while [ "$i" -lt "$1" ]; do
              printf 'int f%d(int a){int b;b=a+%d;if(b>1000){b=b-1000;}return b;}' "$i" "$i" >> c23big.c
              i=$((i+1))
            done
            printf 'int main(){return f0(7);}' >> c23big.c
          }
          for nf in 600 1200; do
            gen_fns "$nf"
            insz=$(wc -c < c23big.c | tr -d ' ')
            set +e
            timeout 180 qemu-aarch64 ./stage2 < c23big.c > c23big.s; crc=$?
            set -e
            outsz=$(wc -c < c23big.s | tr -d ' ')
            if [ "$crc" -ne 0 ] || [ ! -s c23big.s ]; then
              echo "  ${nf} functions (${insz} B input): stage2 FAILED rc=$crc"; cap23_ok=no; continue
            fi
            cat c23big.s | timeout 180 qemu-aarch64 ./stage1 | timeout 180 qemu-aarch64 ./stage0-as | timeout 180 qemu-aarch64 ./elf a.out
            set +e; timeout 180 qemu-aarch64 ./a.out; rc=$?; set -e
            if [ "$rc" = 7 ]; then st=OK; else st=DIFF; cap23_ok=no; fi
            printf '  %-64s exit=%-4s want=%-4s %s\n' "input ${insz} B -> ${outsz} B asm (${nf} functions)" "$rc" 7 "$st"
          done
          # the 1200-function case is ~73 KB of input: past the old ceiling by design.
          gen_fns 1200
          insz=$(wc -c < c23big.c | tr -d ' ')
          [ "$insz" -gt 65000 ] || { echo "  input test is too small to prove the ceiling moved ($insz B)"; cap23_ok=no; }
          printf '  %-64s %s\n' "structural: inline data padded+adjacent; input ${insz} B > old 64 KB" \
                 "$([ "$cap23_ok" = yes ] && echo OK || echo DIFF)"

          echo "== stage-2: label-based control flow, streaming, dynamic buffers (A22) =="
          # THREE changes that are really one: backpatching existed for exactly one
          # reason (TARGET-SUBSET floor item 2) -- stage0-as's 128-entry symtab capped
          # a program's label count, so stage 2 could not emit one per branch. m32
          # retired that: stage 1 became a two-pass NUMERIC RESOLVER, so labels are
          # "bounded only by memory" and the symtab is never in the path. The
          # backpatcher outlived its reason by six milestones.
          #
          # So if/while/else and &&/|| now emit NAMED labels (:__L<id> / b.eq __L<id>)
          # exactly as goto does. Consequences, none of which are new machinery:
          #   * the compiler never seeks backwards -> output STREAMS to stdout, so the
          #     old 256 KB output buffer stops being a ceiling at all
          #   * absolute @<pos> arithmetic is gone -> so is the A13 x17 invariant and
          #     the entire m54 drift bug class (silent, deferred, order-dependent)
          #   * the &&/|| patch array holds label ids instead of buffer offsets, keyed
          #     by the same opstack slot, so m57's re-entrancy property is preserved
          #
          # Backpatching gave label integrity BY CONSTRUCTION. Labels do not, so it is
          # checked directly here: every referenced label defined exactly once, every
          # definition referenced.
          lbl_ok=yes
          ltry() {
            printf '%s' "$1" > lbl.c
            set +e
            timeout 60 qemu-aarch64 ./stage2 < lbl.c > lbl.s
            if [ $? -ne 0 ] || [ ! -s lbl.s ]; then
              lbl_ok=no
              printf '  %-64s %s\n' "$3" 'COMPILE FAILED/HUNG'
              set -e; return
            fi
            cat lbl.s | timeout 60 qemu-aarch64 ./stage1 | timeout 60 qemu-aarch64 ./stage0-as | timeout 60 qemu-aarch64 ./elf a.out
            set -e
            set +e; timeout 60 qemu-aarch64 ./a.out; rc=$?; set -e
            if [ "$rc" = "$2" ]; then st=OK; else st=DIFF; lbl_ok=no; fi
            printf '  %-64s exit=%-4s want=%-4s %s\n' "$3" "$rc" "$2" "$st"
          }
          ltry 'int main(){int i;i=0;while(i<3){i=i+1;}return i;}' 3 'while via named labels'
          ltry 'int main(){int i;int s;i=0;s=0;while(i<10){s=s+i;i=i+1;}return s;}' 45 'loop accumulate'
          ltry 'int main(){int a;a=1;if(a){a=2;}else{a=3;}return a;}' 2 'if/else via named labels'
          ltry 'int main(){int i;int t;i=0;t=0;while(i<3){int j;j=0;while(j<2){t=t+1;j=j+1;}i=i+1;}return t;}' 6 'nested loops'
          ltry 'int f(int n){if(n<2){return 1;}return n*f(n-1);}int main(){return f(5);}' 120 'recursion'
          ltry 'int main(){int a;int b;a=1;b=0;if(a&&!b) return 5;return 0;}' 5 'short-circuit via named labels'
          ltry 'int main(){int i;i=0;top: i=i+1;if(i<4) goto top;return i;}' 4 'goto coexists (A17)'
          ltry 'int f(int n){if(n<1) return 10;else if(n<2) return 20;else return 30;}int main(){return f(1);}' 20 'braceless else chain (A19)'
          # structural: no absolute positions anywhere, and label integrity
          printf '%s' 'int main(){int i;i=0;while(i<3){i=i+1;}return i;}' | qemu-aarch64 ./stage2 > lblw.s
          grep -q '@' lblw.s && { echo "  REGRESSION: an absolute @<pos> survived"; lbl_ok=no; }
          grep -q '^b\.eq __L' lblw.s || { echo "  MISSING named conditional branch"; lbl_ok=no; }
          grep -q '^b __L'     lblw.s || { echo "  MISSING named back branch"; lbl_ok=no; }
          [ "$(grep -c '^:__L' lblw.s)" = 2 ] || { echo "  while must define exactly 2 labels (top, exit)"; lbl_ok=no; }
          # every referenced label defined exactly once; every definition referenced
          for prog in 'int main(){int a;a=0;if(a){return 7;}return 9;}' \
                      'int main(){int i;i=0;while(i<3){i=i+1;}return i;}' \
                      'int main(){int a;a=1;if(a){a=2;}else{a=3;}return a;}' \
                      'int main(){int a;int b;a=1;b=0;if(a&&!b){return 5;}return 0;}'; do
            printf '%s' "$prog" | qemu-aarch64 ./stage2 > li.s
            grep -o '^:__L[0-9]*'                li.s | sed 's/^://' | sort    > li_def.txt
            grep -oE '^b(\.eq|\.ne)? +__L[0-9]*' li.s | awk '{print $2}' | sort -u > li_ref.txt
            sort -u li_def.txt > li_defu.txt
            cmp -s li_def.txt li_defu.txt || { echo "  DUPLICATE label definition"; lbl_ok=no; }
            comm -23 li_ref.txt li_defu.txt | grep -q . && { echo "  branch to an UNDEFINED label"; lbl_ok=no; }
            comm -13 li_ref.txt li_defu.txt | grep -q . && { echo "  UNREFERENCED label definition"; lbl_ok=no; }
          done
          printf '  %-64s %s\n' 'structural: no @<pos> left; label defs/refs consistent' \
                 "$([ "$lbl_ok" = yes ] && echo OK || echo DIFF)"

          # ---- capacity: the whole point of the change ------------------------------
          # Emit a program whose assembly EXCEEDS the old 256 KB output buffer, and one
          # past the old stage0-as/elf 256 KB input buffers. Before A22 these could not
          # be compiled at all; the failure was silent truncation, not an error.
          cap_ok=yes
          gen_blocks() {   # $1 = block count -> a program with that many sequential ifs
            printf 'int main(){int a;a=0;' > cap.c
            i=1
            while [ "$i" -le "$1" ]; do printf 'if(a<%d){a=a+1;}' "$i" >> cap.c; i=$((i+1)); done
            printf 'return a;}' >> cap.c
          }
          for n in 200 600 1200; do
            gen_blocks "$n"
            set +e
            timeout 120 qemu-aarch64 ./stage2 < cap.c > cap.s
            crc=$?
            set -e
            sz=$(wc -c < cap.s)
            if [ "$crc" -ne 0 ] || [ ! -s cap.s ]; then
              echo "  $n blocks: stage2 FAILED (rc=$crc)"; cap_ok=no; continue
            fi
            cat cap.s | timeout 120 qemu-aarch64 ./stage1 | timeout 120 qemu-aarch64 ./stage0-as | timeout 120 qemu-aarch64 ./elf a.out
            set +e; timeout 120 qemu-aarch64 ./a.out; rc=$?; set -e
            want=$((n % 256))
            if [ "$rc" = "$want" ]; then st=OK; else st=DIFF; cap_ok=no; fi
            printf '  %-64s exit=%-4s want=%-4s %s\n' "$n blocks -> $((sz/1024)) KB of assembly" "$rc" "$want" "$st"
          done
          # the 600- and 1200-block programs are past the OLD 256 KB buffers; assert it
          gen_blocks 1200
          qemu-aarch64 ./stage2 < cap.c > cap.s
          sz=$(wc -c < cap.s)
          [ "$sz" -gt 262144 ] || { echo "  test is too small to prove the ceiling moved ($sz B)"; cap_ok=no; }
          printf '  %-64s %s\n' "capacity: $((sz/1024)) KB emitted, old ceiling was 256 KB" \
                 "$([ "$cap_ok" = yes ] && echo OK || echo DIFF)"

          # ---- loud failure, not silent truncation ---------------------------------
          # Every remaining bound reports and exits non-zero rather than quietly
          # producing a wrong program. Proven by feeding stage0-as more than it can
          # hold is impractical here (64 MiB), so the guards are checked structurally.
          grep -q 'input exceeds INBUF_SZ' spikes/stage0-as/stage0-as.aarch64.s \
            || { echo "  stage0-as lost its overflow diagnostic"; cap_ok=no; }
          grep -q 'code exceeds CODEBUF_SZ' spikes/elf/elf.aarch64.s \
            || { echo "  elf lost its overflow diagnostic"; cap_ok=no; }
          grep -q 'input exceeds arena' spikes/stage1-as/stage1-as.s0 \
            || { echo "  stage1 lost its overflow diagnostic"; cap_ok=no; }
          grep -q 'exceeds @<pos> field width' spikes/stage2-mini-c/stage2-mini-c.s1 \
            || { echo "  stage2 lost its position-overflow guard"; cap_ok=no; }
          printf '  %-64s %s\n' 'all remaining bounds fail LOUDLY (diagnostic + exit 2)' \
                 "$([ "$cap_ok" = yes ] && echo OK || echo DIFF)"

          echo "== stage-2: self-host canary — a compiler-shaped program through the ladder (A15) =="
          # The proof-of-pivot from TARGET-SUBSET.md: compile a real COMPILER-SHAPED
          # program -- one that reads a file, builds a heap-allocated linked list of
          # token records through a function-pointer classifier, walks it with deep
          # recursion, and writes a file -- and check its output is a byte-stable
          # FIXPOINT across a second generation. This is a canary, not a rung: it is
          # the cheap de-risk that a compiler compiling compiler-shaped input works
          # through this ladder at all.
          #
          # NB canon returns the output LENGTH as its exit status, so a successful run
          # exits NONZERO (and the status is the low byte of the length -- exit codes
          # are one byte). Every invocation is therefore `set +e`-wrapped and judged on
          # its OUTPUT FILE, not on its exit status.
          selfhost_ok=yes
          CANON=spikes/stage2-mini-c/selfhost/canon.c

          # --- build canon through the full ladder; every stage timeout-bounded -------
          set +e
          timeout 60 qemu-aarch64 ./stage2 < "$CANON" > canon.s; crc=$?
          set -e
          if [ "$crc" != 0 ] || [ ! -s canon.s ]; then
            echo "  selfhost: canon.c FAILED TO COMPILE (rc=$crc)"; selfhost_ok=no
          else
            cat canon.s | timeout 60 qemu-aarch64 ./stage1 \
                        | timeout 60 qemu-aarch64 ./stage0-as \
                        | timeout 60 qemu-aarch64 ./elf canon
          fi
          if [ ! -x canon ]; then
            echo "  selfhost: canon did not build"; selfhost_ok=no
          fi

          # run canon over a file: $1 = input path, output always lands in ./out
          run_canon() {
            rm -f in out
            cp "$1" in
            set +e; timeout 60 qemu-aarch64 ./canon >/dev/null 2>&1; set -e
          }

          if [ "$selfhost_ok" = yes ]; then
            # --- (1) compiler-shaped run: messy input -> one canonical token per line --
            printf '  int  main( ) {\n\t int   x =\t42 ;\n   return   x+x ;\n}\n' > sh_sample
            printf 'int\nmain(\n)\n{\nint\nx\n=\n42\n;\nreturn\nx+x\n;\n}\n' > sh_want
            run_canon sh_sample
            if cmp -s out sh_want; then st=OK; else st=DIFF; selfhost_ok=no; fi
            printf '  %-64s lines=%-5s want=%-5s %s\n' 'tokenizes messy input to one token per line' \
                   "$(wc -l < out | tr -d ' ')" "$(wc -l < sh_want | tr -d ' ')" "$st"

            # --- (2) fixpoint: canon(canon(x)) == canon(x), byte for byte -------------
            cp out sh_gen1
            run_canon sh_gen1
            cp out sh_gen2
            if cmp -s sh_gen1 sh_gen2; then st=OK; else st=DIFF; selfhost_ok=no; fi
            printf '  %-64s gen1=%-5s gen2=%-5s %s\n' 'FIXPOINT canon(canon(x)) == canon(x)' \
                   "$(wc -c < sh_gen1 | tr -d ' ')" "$(wc -c < sh_gen2 | tr -d ' ')" "$st"

            # --- (3) fixpoint over canon's OWN source text ----------------------------
            run_canon "$CANON"
            cp out sh_self1
            run_canon sh_self1
            cp out sh_self2
            if cmp -s sh_self1 sh_self2 && [ -s sh_self1 ]; then st=OK; else st=DIFF; selfhost_ok=no; fi
            printf '  %-64s bytes=%-5s %s\n' 'FIXPOINT on its own source: canon(canon(src)) == canon(src)' \
                   "$(wc -c < sh_self1 | tr -d ' ')" "$st"

            # one line out per whitespace-separated token in the source
            ntok=$(wc -w < "$CANON" | tr -d ' ')
            nline=$(wc -l < sh_self1 | tr -d ' ')
            if [ "$ntok" = "$nline" ]; then st=OK; else st=DIFF; selfhost_ok=no; fi
            printf '  %-64s lines=%-5s want=%-5s %s\n' 'own-source token count matches a whitespace split' \
                   "$nline" "$ntok" "$st"

            # --- (4) scale: the emit walk recurses once per token ---------------------
            # 500 tokens => 500-deep recursion through the ladder's frame stack.
            awk 'BEGIN{for(i=0;i<500;i++) printf "tok%d ", i; print ""}' > sh_big
            run_canon sh_big
            nline=$(wc -l < out | tr -d ' ')
            if [ "$nline" = 500 ]; then st=OK; else st=DIFF; selfhost_ok=no; fi
            printf '  %-64s lines=%-5s want=%-5s %s\n' 'scale: 500 tokens (emit recursion depth 500)' \
                   "$nline" 500 "$st"

            # --- (5) structural: the emitted program really is compiler-shaped --------
            # guards against the test silently degrading into something trivial.
            grep -q 'bl calloc' canon.s || { echo "  selfhost: MISSING heap allocation (bl calloc)"; selfhost_ok=no; }
            grep -q 'blr'       canon.s || { echo "  selfhost: MISSING indirect call (blr) — no function pointer"; selfhost_ok=no; }
            grep -q 'bl open'   canon.s || { echo "  selfhost: MISSING file open (bl open)"; selfhost_ok=no; }
            grep -q 'bl read'   canon.s || { echo "  selfhost: MISSING file read (bl read)"; selfhost_ok=no; }
            grep -q 'bl write'  canon.s || { echo "  selfhost: MISSING file write (bl write)"; selfhost_ok=no; }
            grep -q ':emit_list' canon.s || { echo "  selfhost: MISSING recursive emit walk (:emit_list)"; selfhost_ok=no; }
            printf '  %-64s %s\n' 'emitted program uses calloc + blr + file I/O + recursion' \
                   "$([ "$selfhost_ok" = yes ] && echo OK || echo DIFF)"
          fi

          echo "== stage-2: do{}while + break + continue (A24) =="
          # A do-loop emits the SAME label pair a while-loop does -- top defined at
          # the `do`, exit referenced by the condition's b.eq and defined after the
          # back branch -- which is what lets `break` be one mechanism for both:
          #
          #     :__L<top>          <- emitted at `do`
          #       <body>
          #     [:__L<cont>]       <- only if a `continue` was seen
          #       <cond>; b.eq __L<exit>
          #       b __L<top>
          #     :__L<exit>
          #
          # `break`/`continue` scan the block stack DOWNWARD for the nearest loop
          # record (kind 1=while, 4=do), skipping if/else/plain -- which is the whole
          # point: 11 of M2-Planet's 14 breaks sit in a BRACELESS `if` body inside a
          # loop. The scan masks the braceless flag, so `while(c) break;` finds it too.
          #
          # The block record grew 12 -> 16 bytes and the braceless flag moved from bit
          # 2 to bit 3. That was FORCED: stmtend reads `kind >= 4` as braceless, so a
          # braced `do` numbered 4 would have been closed by the first `;` inside its
          # own body. Everything sharing that stack (if/else/while/braceless/nested)
          # is therefore re-checked below, and byte-compared against HEAD~1.
          #
          # Timeout-bounded throughout: the failure mode of a mis-aimed loop branch is
          # to spin forever, not to return something wrong.
          dw_ok=yes
          dwtry() {
            set +e
            printf '%s' "$1" | timeout 30 qemu-aarch64 ./stage2 > dwt.s
            if [ $? -ne 0 ] || [ ! -s dwt.s ]; then
              dw_ok=no
              printf '  %-64s %s\n' "$3" 'COMPILE FAILED/HUNG'
              set -e; return
            fi
            cat dwt.s | timeout 30 qemu-aarch64 ./stage1 | timeout 30 qemu-aarch64 ./stage0-as | timeout 30 qemu-aarch64 ./elf a.out
            set -e
            set +e; timeout 30 qemu-aarch64 ./a.out; rc=$?; set -e
            if [ "$rc" = "$2" ]; then st=OK; else st=DIFF; dw_ok=no; fi
            printf '  %-64s exit=%-4s want=%-4s %s\n' "$3" "$rc" "$2" "$st"
          }
          # the defining property: the body runs BEFORE the first test
          dwtry 'int main(){int i;i=0;do{i=i+1;}while(i>99);return i;}' 1 'body runs once when the condition is false'
          dwtry 'int main(){int i;i=9;do{i=i+1;}while(0);return i;}' 10 'while(0) still runs the body once'
          dwtry 'int main(){int i;i=0;do{i=i+1;}while(i<5);return i;}' 5 'do{}while counts to 5'
          dwtry 'int main(){int n;int f;n=4;f=1;do{f=f*n;n=n-1;}while(n);return f;}' 24 'do{}while factorial'
          # 4 of M2-Planet's 7 sites put `while` on the line AFTER the closing brace
          dwtry 'int main(){int i;i=0;
          do
          {
          i=i+1;
          }
          while(i<6);
          return i;}' 6 'while on the line after the closing brace (cc_core.c layout)'
          # braceless body -- unused by M2-Planet, free once the record widened
          dwtry 'int main(){int i;i=0;do i=i+1; while(i<7);return i;}' 7 'braceless do body'
          dwtry 'int main(){int a;int i;a=0;i=0;do{int j;j=0;do{j=j+1;a=a+1;}while(j<3);i=i+1;}while(i<2);return a;}' 6 'nested do inside do'
          dwtry 'int f(int n){int s;s=0;do{s=s+n;n=n-1;}while(n);return s;}int main(){return f(4);}' 10 'do inside a called function'
          dwtry 'int main(){int i;i=0;do{i=i+1;if(i==3){goto out;}}while(i<9);out: return i;}' 3 'goto out of a do loop'
          dwtry 'int main(){int a;int i;a=1;i=0;if(a) do{i=i+1;}while(i<4); else i=99;return i;}' 4 'do-while as a braceless if body, with else'
          # break / continue
          dwtry 'int main(){int i;i=0;do{i=i+1;if(i==3){break;}}while(i<9);return i;}' 3 'break out of a do loop'
          dwtry 'int main(){int i;i=0;while(1){i=i+1;if(i>6){break;}}return i;}' 7 'break out of a while(1)'
          dwtry 'int main(){int i;int s;i=0;s=0;while(i<5){i=i+1;if(i==2){continue;}s=s+i;}return s;}' 13 'continue in a while loop'
          dwtry 'int main(){int i;int s;i=0;s=0;while(i<4){i=i+1;if(i==2)continue;s=s+i;}return s;}' 8 'continue as a braceless if body'
          # cc_macro.c:912's exact shape: `if(match(...)) break;` inside a do{}while
          dwtry 'int main(){int i;i=0;do{i=i+1;if(i==4) break;}while(1);return i;}' 4 'braceless if break inside do (cc_macro.c shape)'
          # break binds to the INNERMOST loop and skips intervening if records
          dwtry 'int main(){int o;int t;o=0;t=0;while(o<3){o=o+1;int i;i=0;do{i=i+1;if(i==2){break;}t=t+1;}while(i<9);}return t;}' 3 'break binds to the innermost loop'
          dwtry 'int main(){int i;i=0;while(1){i=i+1;if(i>2){if(i>3){break;}}}return i;}' 4 'break scans past nested if records'
          # continue in a do jumps to the CONDITION, not the body top: i still
          # advances to 5 so the loop terminates, while s counts only i>=3
          dwtry 'int main(){int i;int s;i=0;s=0;do{i=i+1;if(i<3){continue;}s=s+1;}while(i<5);return s+i*10;}' 53 'continue in a do tests the condition'
          # conditions of the shapes M2-Planet actually writes
          dwtry 'int main(){int e;int c;int f;e=0;c=0;f=5;do{c=c+1;}while(e || (c != f));return c;}' 5 'short-circuit || condition (cc_reader.c:84)'
          # scancond bounds the condition by counting parens, so a ")" or "}" or an
          # escape inside a CHAR LITERAL there must be skipped, not counted.
          # cc_core.c:3165/2203 test against '}'; cc_reader.c:403 against '\n'.
          dwtry "int main(){char c;c=48;int i;i=0;do{i=i+1;c=c+1;}while(c != ')' && i<3);return i;}" 3 "')' in a char literal in the condition"
          dwtry "int main(){char c;c=48;int i;i=0;do{i=i+1;c=c+1;}while(c != '}' && i<4);return i;}" 4 "'}' in a char literal in the condition"
          dwtry "int main(){char c;c=5;int i;i=0;do{i=i+1;c=c+1;}while((32 != c) && (9 != c) && ('\\n' != c));return i;}" 4 "cc_reader.c:403 shape (escape in a char literal)"

          # --- structural -----------------------------------------------------------
          printf '%s' 'int main(){int i;i=0;do{i=i+1;}while(i<5);return i;}' | qemu-aarch64 ./stage2 > dw.s
          printf '%s' 'int main(){int i;i=0;while(i<3){i=i+1;}return i;}'    | qemu-aarch64 ./stage2 > dwn.s
          printf '%s' 'int main(){int i;int s;i=0;s=0;do{i=i+1;if(i<3){continue;}s=s+1;}while(i<5);return s;}' | qemu-aarch64 ./stage2 > dwc.s
          printf '%s' 'int main(){int i;i=0;do{i=i+1;if(i==3){break;}}while(i<9);return i;}' | qemu-aarch64 ./stage2 > dwb.s
          grep -q '^b __L'     dw.s || { echo "  MISSING back branch (b __L)"; dw_ok=no; }
          grep -q '^b\.eq __L' dw.s || { echo "  MISSING exit test (b.eq __L)"; dw_ok=no; }
          [ "$(grep -c '^:__L' dw.s)" = 2 ] || { echo "  WRONG label count for a do with no continue"; dw_ok=no; }
          [ "$(grep -c '^$'    dw.s)" = 0 ] || { echo "  REGRESSION: blank emitted line"; dw_ok=no; }
          # The discriminating witness. do and while emit the SAME instructions and the
          # SAME label pair -- only the ORDER differs. So check the order directly: in
          # a do the body precedes the test, in the otherwise-identical while it follows.
          # (Verified to go red when handed a while emission in place of the do one.)
          set +e
          dwa=$(grep -n '^add x0 x1 x0$' dw.s  | head -1 | cut -d: -f1)
          dwb=$(grep -n '^b\.eq __L'     dw.s  | head -1 | cut -d: -f1)
          wha=$(grep -n '^add x0 x1 x0$' dwn.s | head -1 | cut -d: -f1)
          whb=$(grep -n '^b\.eq __L'     dwn.s | head -1 | cut -d: -f1)
          set -e
          if [ -z "$dwa" ] || [ -z "$dwb" ] || [ -z "$wha" ] || [ -z "$whb" ]; then
            echo "  MISSING body/test anchors (do=$dwa/$dwb while=$wha/$whb)"; dw_ok=no
          else
            [ "$dwa" -lt "$dwb" ] || { echo "  WRONG: do tests before its body ($dwa/$dwb)"; dw_ok=no; }
            [ "$whb" -lt "$wha" ] || { echo "  WRONG: while runs its body before the test ($wha/$whb)"; dw_ok=no; }
          fi
          # The continue label is allocated LAZILY, on the first continue inside a do,
          # because continue-in-do targets the condition rather than the body top -- a
          # third label most do-loops never need. Eager allocation would emit a
          # definition nothing references, which the A22 label-integrity rule forbids.
          [ "$(grep -c '^:__L' dwc.s)" = 4 ] || { echo "  WRONG label count with a continue"; dw_ok=no; }
          [ "$(grep -c '^:__L' dwb.s)" = 3 ] || { echo "  WRONG label count with a break"; dw_ok=no; }
          # break/continue outside any loop is a LOUD failure (diagnostic + exit 2),
          # not a silently discarded identifier -- which is what they were before this
          # rung, and why m58's census called them the dangerous failure mode.
          set +e
          printf '%s' 'int main(){break;return 1;}' | timeout 30 qemu-aarch64 ./stage2 > dwe.s 2> dwe.err; rce=$?
          set -e
          [ "$rce" = 2 ] || { echo "  WRONG: break outside a loop exited $rce, want 2"; dw_ok=no; }
          if [ -s dwe.s ]; then echo "  WRONG: break outside a loop still emitted code"; dw_ok=no; fi
          grep -q 'outside a loop' dwe.err || { echo "  MISSING diagnostic on stderr"; dw_ok=no; }
          printf '  %-64s %s\n' 'structural: label pair, body-before-test, lazy continue label' \
                 "$([ "$dw_ok" = yes ] && echo OK || echo DIFF)"

          # --- byte-identity against the PRE-RUNG compiler ---------------------------
          # This rung moved the braceless flag and widened every block record, so the
          # constructs sharing that stack must emit BYTE-IDENTICAL output to before.
          # Runs only on the commit that introduces the rung (HEAD~1 has no :dodo);
          # afterwards it reports SKIP rather than comparing against itself.
          if git show HEAD~1:spikes/stage2-mini-c/stage2-mini-c.s1 > old.s1 2>/dev/null && ! grep -q '^:dodo$' old.s1; then
            cat old.s1 | qemu-aarch64 ./stage1 | qemu-aarch64 ./stage0-as | qemu-aarch64 ./elf stage2old
            dwid=yes
            dwcmp() {
              printf '%s' "$1" | qemu-aarch64 ./stage2    > dwnew.s
              printf '%s' "$1" | qemu-aarch64 ./stage2old > dwold.s
              cmp -s dwnew.s dwold.s || { dwid=no; echo "  DIFFERS: $1"; }
            }
            dwcmp 'int main(){int n;int s;n=10;s=0;while(n){s=s+n;n=n-1;}return s;}'
            dwcmp 'int main(){int a;a=0;if(a){a=1;}else{a=2;}return a;}'
            dwcmp 'int main(){int i;int t;i=3;t=0;while(i){int j;j=2;while(j){t=t+1;j=j-1;}i=i-1;}return t;}'
            dwcmp 'int main(){int a;a=1;if(a) return 7; return 3;}'
            dwcmp 'int main(){int a;int b;a=1;b=0;if(a) if(b) return 1; else return 2; return 3;}'
            dwcmp 'int f(int n){if(n<2){return n;}return f(n-1)+f(n-2);}int main(){return f(10);}'
            dwcmp 'int main(){int a[4];a[0]=7;a[1]=9;return a[0]+a[1];}'
            dwcmp 'int main(){int i;i=0;while(i<9){i=i+1;if(i==4){goto out;}}out: return i;}'
            [ "$dwid" = yes ] || dw_ok=no
            printf '  %-64s %s\n' 'byte-identical to HEAD~1 on do-free programs' \
                   "$([ "$dwid" = yes ] && echo OK || echo DIFF)"
          else
            printf '  %-64s %s\n' 'byte-identical to HEAD~1 on do-free programs' 'SKIP (HEAD~1 already has the rung)'
          fi


          echo "== stage-2: for loops (A25) =="
          # The step clause appears BEFORE the body in the source but must run AFTER
          # it, and m63 deleted backpatching. Rather than stash the step's source span
          # and re-lex it at close time, this rung emits everything in SOURCE order and
          # jumps over the step on the way in:
          #
          #     init
          #   :__L<top>
          #     cond; b.eq __L<exit>
          #     b __L<body>
          #   :__L<step>          <- continue target
          #     step
          #     b __L<top>
          #   :__L<body>
          #     body
          #     b __L<step>       <- emitted at the closing brace
          #   :__L<exit>
          #
          # Two extra unconditional branches per iteration, no replay machinery, every
          # label referenced by construction. The CLOSE is dclose_while unchanged: a for
          # record is just [a=step, b=exit, c=step+1], so "back-branch to a, define b"
          # is already right. break/continue needed one line (findloop learning kind 5).
          #
          # The init and step CLAUSES ride the ordinary statement machinery via phase
          # records (14=init, 15=step) on the block stack, which works because
          # compile_expr already terminates at `;` and at an unmatched `)` -- exactly the
          # two clause terminators. So `for(int i=0; ...)` and `for(p->n=x; ...)` work
          # for free. The block record grew 16 -> 24 bytes to hold the step phase's four
          # labels; two stride bugs during development (doif pushing 5 words not 6,
          # findloop still stepping 16) are why the nesting tests below exist.
          for_ok=yes
          ftry() {
            set +e
            printf '%s' "$1" | timeout 30 qemu-aarch64 ./stage2 > ft.s
            if [ $? -ne 0 ] || [ ! -s ft.s ]; then
              for_ok=no
              printf '  %-64s %s\n' "$3" 'COMPILE FAILED/HUNG'
              set -e; return
            fi
            cat ft.s | timeout 30 qemu-aarch64 ./stage1 | timeout 30 qemu-aarch64 ./stage0-as | timeout 30 qemu-aarch64 ./elf a.out
            set -e
            set +e; timeout 30 qemu-aarch64 ./a.out; rc=$?; set -e
            if [ "$rc" = "$2" ]; then st=OK; else st=DIFF; for_ok=no; fi
            printf '  %-64s exit=%-4s want=%-4s %s\n' "$3" "$rc" "$2" "$st"
          }
          ftry 'int main(){int i;int s;s=0;for(i=0;i<5;i=i+1){s=s+i;}return s;}' 10 'for sums 0..4'
          ftry 'int main(){int i;int n;n=0;for(i=0;i<3;i=i+1){n=n+1;}return n*10+i;}' 33 'loop variable survives with its final value'
          ftry 'int main(){int i;int s;s=0;for(i=0;i<0;i=i+1){s=s+9;}return s;}' 0 'zero-trip: for tests before the first body run'
          # M2-Planet's only shape -- all 4 of its uses are this linked-list walk
          ftry 'struct N{int v;struct N* nx;};int main(){struct N a;struct N b;a.v=3;a.nx=&b;b.v=4;b.nx=0;struct N* i;int s;s=0;for(i=&a;0 != i;i=i->nx){s=s+i->v;}return s;}' 7 'struct-pointer list walk (M2-Planet shape)'
          ftry 'int main(){int i;int s;s=0;for(i=0;i<4;i=i+1) s=s+i;return s;}' 6 'braceless for body'
          ftry 'int main(){int i;int j;int t;t=0;for(i=0;i<3;i=i+1){for(j=0;j<2;j=j+1){t=t+1;}}return t;}' 6 'nested for'
          ftry 'int main(){int i;int s;s=0;for(i=0;i<9;i=i+1){if(i==4){break;}s=s+1;}return s;}' 4 'break out of a for'
          ftry 'int main(){int i;int s;s=0;for(i=0;i<5;i=i+1){if(i==2){continue;}s=s+i;}return s;}' 8 'continue in a for'
          # if continue jumped to the top instead of the step this SPINS rather than
          # returning a wrong answer -- hence the timeout bound on every stage
          ftry 'int main(){int i;int s;s=0;for(i=0;i<4;i=i+1){continue;}return i;}' 4 'continue reaches the step (else infinite)'
          ftry 'int main(){int s;s=0;for(int i=0;i<4;i=i+1){s=s+i;}return s;}' 6 'declaration as the init clause'
          ftry 'int main(){int i;i=0;for(;i<5;i=i+1){}return i;}' 5 'empty init clause'
          ftry 'int main(){int i;for(i=0;i<5;){i=i+1;}return i;}' 5 'empty step clause'
          ftry 'int main(){int i;i=0;for(;;){i=i+1;if(i>6){break;}}return i;}' 7 'for(;;) with break'
          ftry 'int f(int x){return x*2;}int main(){int i;int s;s=0;for(i=1;i<4;i=i+1){s=s+f(i);}return s;}' 12 'call in a for body'
          ftry 'int main(){int i;for(i=0;i<9;i=i+1){if(i==3){goto out;}}out: return i;}' 3 'goto out of a for'
          ftry 'int main(){int a;int i;int s;a=1;s=0;if(a) for(i=0;i<3;i=i+1) s=s+1; return s;}' 3 'for as a braceless if body'
          # break binds to the innermost loop across all three loop forms
          ftry 'int main(){int i;int j;int t;t=0;for(i=0;i<3;i=i+1){j=0;while(1){j=j+1;if(j>1){break;}t=t+1;}}return t;}' 3 'for containing a while, break binds inner'
          ftry 'int main(){int i;int t;t=0;for(i=0;i<3;i=i+1){int k;k=0;do{k=k+1;t=t+1;}while(k<2);}return t;}' 6 'for containing a do{}while'

          # --- structural -----------------------------------------------------------
          printf '%s' 'int main(){int i;int s;s=0;for(i=0;i<3;i=i+1){s=s+i;}return s;}' | qemu-aarch64 ./stage2 > f.s
          printf '%s' 'int main(){int i;int s;s=0;for(i=0;i<9;i=i+1){if(i==4){break;}s=s+1;}return s;}' | qemu-aarch64 ./stage2 > fb.s
          printf '%s' 'int main(){int i;int s;s=0;for(i=0;i<5;i=i+1){if(i==2){continue;}s=s+i;}return s;}' | qemu-aarch64 ./stage2 > fc.s
          [ "$(grep -c '^:__L' f.s)" = 4 ] || { echo "  WRONG label count for a plain for"; for_ok=no; }
          [ "$(grep -c '^$'    f.s)" = 0 ] || { echo "  REGRESSION: blank emitted line"; for_ok=no; }
          # THE layout witness. The four labels are ALLOCATED top, exit, step, body but
          # DEFINED top, step, body, exit -- so the definition order is ids 0, 2, 3, 1.
          # That single line pins the whole jump-over shape: emit the step after the
          # body, or drop the branch over it, and this order changes.
          fdo=$(grep '^:__L' f.s | tr -d ':_L' | tr '\n' ' ')
          [ "$fdo" = "000000000 000000002 000000003 000000001 " ] || {
            echo "  WRONG label layout order: $fdo"; for_ok=no; }
          # continue targets the STEP (2nd definition); break targets the EXIT, which is
          # always the LAST definition -- it is emitted at the closing brace, after every
          # label the body itself allocated (the if here adds a 5th).
          fstep=$(grep '^:__L' fc.s | sed -n 2p | tr -d ':')
          grep -q "^b $fstep\$" fc.s || { echo "  continue does not branch to the step label"; for_ok=no; }
          fexit=$(grep '^:__L' fb.s | tail -1 | tr -d ':')
          grep -q "^b $fexit\$" fb.s || { echo "  break does not branch to the exit label"; for_ok=no; }
          [ "$fexit" = "__L000000001" ] || { echo "  exit label is not defined last: $fexit"; for_ok=no; }
          printf '  %-64s %s\n' 'structural: 4-label jump-over layout, continue->step, break->exit' \
                 "$([ "$for_ok" = yes ] && echo OK || echo DIFF)"

          # --- byte-identity against the PRE-RUNG compiler ---------------------------
          # Second record widening in two rungs (16 -> 24 bytes), so the constructs
          # sharing that stack must emit byte-identical output to before. Runs only on
          # the commit that introduces the rung; reports SKIP afterwards.
          if git show HEAD~1:spikes/stage2-mini-c/stage2-mini-c.s1 > oldf.s1 2>/dev/null && ! grep -q '^:dofor$' oldf.s1; then
            cat oldf.s1 | qemu-aarch64 ./stage1 | qemu-aarch64 ./stage0-as | qemu-aarch64 ./elf stage2oldf
            fid=yes
            fcmp() {
              printf '%s' "$1" | qemu-aarch64 ./stage2     > fnew.s
              printf '%s' "$1" | qemu-aarch64 ./stage2oldf > fold.s
              cmp -s fnew.s fold.s || { fid=no; echo "  DIFFERS: $1"; }
            }
            fcmp 'int main(){int n;int s;n=10;s=0;while(n){s=s+n;n=n-1;}return s;}'
            fcmp 'int main(){int a;a=0;if(a){a=1;}else{a=2;}return a;}'
            fcmp 'int main(){int i;int t;i=3;t=0;while(i){int j;j=2;while(j){t=t+1;j=j-1;}i=i-1;}return t;}'
            fcmp 'int main(){int a;a=1;if(a) return 7; return 3;}'
            fcmp 'int f(int n){if(n<2){return n;}return f(n-1)+f(n-2);}int main(){return f(10);}'
            fcmp 'int main(){int i;i=0;do{i=i+1;if(i==3){break;}}while(i<9);return i;}'
            fcmp 'int main(){int i;int s;i=0;s=0;while(i<5){i=i+1;if(i==2){continue;}s=s+i;}return s;}'
            fcmp 'int main(){int i;i=0;while(i<9){i=i+1;if(i==4){goto out;}}out: return i;}'
            fcmp 'int main(){int a[4];a[0]=7;a[1]=9;return a[0]+a[1];}'
            [ "$fid" = yes ] || for_ok=no
            printf '  %-64s %s\n' 'byte-identical to HEAD~1 on for-free programs' \
                   "$([ "$fid" = yes ] && echo OK || echo DIFF)"
          else
            printf '  %-64s %s\n' 'byte-identical to HEAD~1 on for-free programs' 'SKIP (HEAD~1 already has the rung)'
          fi


          echo "== stage-2: enum constants (A26) =="
          # M2-Planet's 10 enum blocks are all anonymous, all file-scope, and every
          # member has an explicit integer value (checked against the vendored source).
          # They carry NULL (287 uses), TRUE/FALSE, EOF, stdin/stdout/stderr and EXIT_*
          # -- which is exactly why m62 could strip every preprocessor directive and
          # still have those names resolve: they were never macros.
