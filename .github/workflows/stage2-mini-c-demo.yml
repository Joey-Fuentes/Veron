name: stage2-mini-c-demo

# SPIKE (invariants suspended). Stage 2 = mini-c. Compiles `return <expr>;` with
# + - * , precedence, AND parentheses. Compiler uses shunting-yard (iterative,
# no compiler recursion); emitted code uses a value stack (brk memory, x9).
# Written in stage-1's language; needs stage0-as register add/sub + mul + ldr/str.

on:
  push:
    paths:
      - 'spikes/stage2-mini-c/**'
      - 'spikes/stage1-as/**'
      - 'spikes/stage0-as/**'
      - 'spikes/elf/**'
      - '.github/workflows/stage2-mini-c-demo.yml'
  workflow_dispatch:

concurrency:
  group: stage2-mini-c-demo-${{ github.ref }}
  cancel-in-progress: true

jobs:
  demo:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends qemu-user binutils-aarch64-linux-gnu
      - name: Build ladder and compile C expressions (with parens)
        run: |
          aarch64-linux-gnu-as -o s0.o spikes/stage0-as/stage0-as.aarch64.s
          aarch64-linux-gnu-ld -static -o stage0-as s0.o
          aarch64-linux-gnu-as -o elf.o spikes/elf/elf.aarch64.s
          aarch64-linux-gnu-ld -static -o elf elf.o
          cat spikes/stage1-as/stage1-as.s0 | qemu-aarch64 ./stage0-as | qemu-aarch64 ./elf stage1
          cat spikes/stage2-mini-c/stage2-mini-c.s1 | qemu-aarch64 ./stage1 | qemu-aarch64 ./stage0-as | qemu-aarch64 ./elf stage2
          test -x stage2 || { echo "stage2 not built"; exit 1; }

          fail=0
          try() {
            printf '%s' "$1" | qemu-aarch64 ./stage2 > out.s
            cat out.s | qemu-aarch64 ./stage0-as | qemu-aarch64 ./elf a.out
            set +e; qemu-aarch64 ./a.out; rc=$?; set -e
            printf '  %-36s exit=%-4s want=%-4s %s\n' "$1" "$rc" "$2" "$([ "$rc" = "$2" ] && echo OK || { echo DIFF; fail=1; })"
          }
          echo "== stage-2 compiling C expressions (parens + precedence) =="
          try 'int main(){return 7;}'               7
          try 'int main(){return 2+3*4;}'           14
          try 'int main(){return (2+3)*4;}'         20
          try 'int main(){return 2*(3+4);}'         14
          try 'int main(){return (1+2)*(3+4);}'     21
          try 'int main(){return ((1+2))*3;}'       9
          try 'int main(){return 10-2*3;}'          4
          try 'int main(){return (10-2)*(1+1);}'    16
          try 'int main(){return 9*9;}'             81
          try 'int main(){}'                        0

          {
            echo "## stage2-mini-c — return <expr> with + - * and parentheses"
            echo '```'
            echo "(2+3)*4->20  2*(3+4)->14  (1+2)*(3+4)->21  (10-2)*(1+1)->16"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$fail" = 0 ]; then
            echo "PASS: our stage-2 compiles parenthesized expressions to working aarch64 code."
          else
            echo "FAIL: see DIFFs above"; exit 1
          fi
