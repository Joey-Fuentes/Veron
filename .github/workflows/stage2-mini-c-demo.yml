          # cc.c's actual option loop, in miniature: walk argv comparing each entry.
          atry 'int eq(char* a,char* b){int i;i=0;while(a[i]){if(a[i]!=b[i]){return 0;}i=i+1;}if(b[i]){return 0;}return 1;}int main(int argc,char** argv){int i;i=1;while(i<argc){if(eq(argv[i],"-o")){return 42;}i=i+1;}return 9;}' 42 '-o out' 'cc.c option loop: match(argv[i],"-o") over the real argv'
          atry 'int f(char** v,int i){char* p;p=v[i];return p[0];}int main(int argc,char** argv){return f(argv,1);}' 45 '-o out' 'argv passed on to a char** parameter'
          # main WITHOUT parameters must still work -- the two pushed values are simply
          # never popped, and the return value is still the top of the value stack.
          atry 'int main(){return 42;}' 42 '-o out' 'int main() with no parameters still exits correctly'
          atry 'int main(void){return 42;}' 42 '-o out' 'int main(void) still exits correctly'
          atry 'int f(int n){if(n<2){return n;}return f(n-1)+f(n-2);}int main(int argc,char** argv){return f(10);}' 55 '-o out' 'recursion under the new preamble'
          atry 'int main(int argc,char** argv){char* p;p=calloc(4,8);p[0]=42;return p[0];}' 42 '-o out' 'calloc under the new preamble'

          # --- structural: the preamble, and ONLY the preamble, changed ---------------
          printf '%s' 'int main(int argc,char** argv){return argc;}' | qemu-aarch64 ./stage2 > av1.s
          grep -q '^add x3 x31 0$' av1.s || { echo "  preamble does not read sp"; av_ok=no; }
          grep -q '^ldr x0 x3$'    av1.s || { echo "  argc not loaded from [sp]"; av_ok=no; }
          grep -q '^add x0 x3 8$'  av1.s || { echo "  argv is not sp+8"; av_ok=no; }
          [ "$(sed -n '1,/^bl main$/p' av1.s | grep -c '^str x0 x9$')" = 2 ] \
            || { echo "  wrong number of pushes before bl main"; av_ok=no; }
          # SP is copied out, never used as a load/store base (it would fault unless
          # 16-byte aligned, and nothing here maintains that).
          grep -q 'ldr x[0-9]* x31' av1.s && { echo "  SP used directly as a load base"; av_ok=no; }
          grep -q 'str x[0-9]* x31' av1.s && { echo "  SP used directly as a store base"; av_ok=no; }
          printf '  %-64s %s\n' 'structural: sp read once, two pushes, SP never a base' \
                 "$([ "$av_ok" = yes ] && echo OK || echo DIFF)"

          # --- everything after `bl main` is untouched --------------------------------
          # This rung DOES change every program's first 7 instructions, so plain
          # byte-identity is the wrong guard. The right one is that the change is
          # confined to the entry preamble: from `bl main` onward the output must match
          # the pre-rung compiler exactly.
          if git show HEAD~1:spikes/stage2-mini-c/stage2-mini-c.s1 > olda.s1 2>/dev/null && ! grep -q 'add x3 x31 0' olda.s1; then
            cat olda.s1 | qemu-aarch64 ./stage1 | qemu-aarch64 ./stage0-as | qemu-aarch64 ./elf stage2olda
            aid=yes
            acmp() {
              printf '%s' "$1" | qemu-aarch64 ./stage2      > anew.s
              printf '%s' "$1" | qemu-aarch64 ./stage2olda  > aold.s
              sed -n '/^bl main$/,$p' anew.s > anew.tail
              sed -n '/^bl main$/,$p' aold.s > aold.tail
              cmp -s anew.tail aold.tail || { aid=no; echo "  TAIL DIFFERS: $1"; }
              [ "$(( $(grep -c '' anew.s) - $(grep -c '' aold.s) ))" = 7 ] \
                || { aid=no; echo "  preamble did not grow by exactly 7 lines: $1"; }
            }
            acmp 'int main(){int a=5;int b=a+2;return b;}'
            acmp 'int fib(int n){if(n<2){return n;}return fib(n-1)+fib(n-2);}int main(){return fib(10);}'
            acmp 'int main(){int i;int s;s=0;for(i=0;i<5;i=i+1){if(i==3){continue;}s=s+i;}return s;}'
            acmp 'struct N{int v;struct N* nx;};int main(){struct N a;struct N* p;p=&a;a.v=7;return p->v;}'
            acmp 'int len(char* p){int n;n=0;while(p[n]){n=n+1;}return n;}int main(){return len("hello");}'
            acmp 'int main(){char* p;p=calloc(4,8);p[0]=42;return p[0];}'
            acmp 'int g;int arr[3];char s[8];int main(){g=1;arr[1]=2;s[0]=3;return g+arr[1]+s[0];}'
            acmp 'int main(int argc,char** argv){return 42;}'
            acmp 'int main(){char* a[2];char x[2];x[0]=42;a[1]=x;char* p;p=a[1];return p[0];}'
            acmp 'int main(){return brk(0);}'
            [ "$aid" = yes ] || av_ok=no
            printf '  %-64s %s\n' 'identical to HEAD~1 from bl main onward (+7 preamble lines)' \
                   "$([ "$aid" = yes ] && echo OK || echo DIFF)"
          else
            printf '  %-64s %s\n' 'identical to HEAD~1 from bl main onward' 'SKIP (HEAD~1 already has the rung)'
          fi


          {
            echo "## stage2-mini-c — variables, if/while, reassignment, functions + recursion"
            echo '```'
            echo "word ldr/str byte-identical to as   : $ld_ok"
            echo "emitted word forms + frame-rel vars : $struct_ok"
            echo "if/while zero-test + backpatched @pos: $cf_ok"
            echo "relational < > branchless (sub+lsr)  : $rel_ok"
            echo "equality == != <= >= branchless      : $eq_ok"
            echo "pointer arithmetic scaled by pointee : $ptr_ok"
            echo "functions + call stack + recursion   : $fn_ok"
            echo "structs: sizeof + . / -> + chains    : $sm_ok"
            echo "function pointers: decay + blr call  : $fp_ok"
            echo "large literals: movz + movk (>=2^16)  : $lit_ok"
            echo "heap: calloc/free bump alloc (mmap)  : $heap_ok"
            echo "file I/O: open/read/write/close/exit : $io_ok"
            echo "single-pass @-target accounting (order): $emit_ok"
            echo "front end: comments/blocks/struct* ret: $fe_ok"
            echo "self-host canary: compiler-shaped + fixpoint: $selfhost_ok"
            echo "short-circuit &&/||, hex literals, ^   : $sc_ok"
            echo "goto + labels (A17)                     : $goto_ok"
            echo "forward prototypes (A18)                : $proto_ok"
            echo "braceless statement bodies (A19)        : $bl_ok"
            echo "string/char escapes (A20)               : $esc_ok"
            echo "preprocessor directives (A21)           : $pp_ok"
            echo "label control flow + streaming (A22)    : $lbl_ok"
            echo "capacity / loud bounds (A22)            : $cap_ok"
            echo "capacity: input/inline data/adr (A23)   : $cap23_ok"
            echo "do{}while + break + continue (A24)     : $dw_ok"
            echo "for loops (A25)                         : $for_ok"
            echo "enum constants (A26)                    : $enum_ok"
            echo "word-typed keywords unsigned/long (A27) : $wt_ok"
            echo "identifier type names FILE/FUNCTION (A28): $tn_ok"
            echo "brk builtin (A29)                       : $brk_ok"
            echo "pointer-to-pointer / char** (A30)       : $pp_ok"
            echo "argc/argv from _start (A31)             : $av_ok"
            echo "sp encoding byte-identical to as        : $sp_ok"
            echo "eor byte-identical to as             : $eor_ok"
            echo "udiv byte-identical to as            : $udiv_ok"
            echo "unsigned / and % (udiv;mul;sub)      : $div_ok"
            echo "while(n){s=s+n;n=n-1;} sum 1..10     -> 55"
            echo "while(i<10) count-up sum            -> 45"
            echo "while(i<=5) count-up sum            -> 15"
            echo "while(i>=1) count-down sum          -> 55"
            echo "nested while (3x2 increments)        -> 6"
            echo "nested if (a==b && a>=b)             -> 42"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

          if [ "$fail" = 0 ] && [ "$ld_ok" = yes ] && [ "$udiv_ok" = yes ] && [ "$struct_ok" = yes ] && [ "$cf_ok" = yes ] && [ "$rel_ok" = yes ] && [ "$eq_ok" = yes ] && [ "$ptr_ok" = yes ] && [ "$fn_ok" = yes ] && [ "$div_ok" = yes ] && [ "$sm_ok" = yes ] && [ "$heap_ok" = yes ] && [ "$io_ok" = yes ] && [ "$lit_ok" = yes ] && [ "$emit_ok" = yes ] && [ "$fe_ok" = yes ] && [ "$selfhost_ok" = yes ] && [ "$sc_ok" = yes ] && [ "$eor_ok" = yes ] && [ "$goto_ok" = yes ] && [ "$proto_ok" = yes ] && [ "$bl_ok" = yes ] && [ "$esc_ok" = yes ] && [ "$pp_ok" = yes ] && [ "$lbl_ok" = yes ] && [ "$cap_ok" = yes ] && [ "$cap23_ok" = yes ] && [ "$dw_ok" = yes ] && [ "$for_ok" = yes ] && [ "$enum_ok" = yes ] && [ "$wt_ok" = yes ] && [ "$tn_ok" = yes ] && [ "$brk_ok" = yes ] && [ "$pp_ok" = yes ] && [ "$av_ok" = yes ] && [ "$sp_ok" = yes ]; then
            echo "PASS: stage-2 compiles variables (frame-relative, declaration-order), reassignment, if/while (nested) as backpatched numeric branches, comparisons < > <= >= == != (branchless, unsigned-32), unsigned / and % (udiv, byte-identical to as), a 64-bit machine-word model (int == pointer width), single-level POINTERS (& address-of, * dereference, *p = e store-through, pass-by-reference), int ARRAYS (int a[N], subscript a[i] rvalue+lvalue, array-name decay), CHAR + byte access (char c, char* p, char s[N], ldrb/strb, char literals), STRING LITERALS in a static data section ("..." as char*, adr-addressed), GLOBAL variables (file-scope, frame-first resolution, adr g_name), the full OPERATOR set (unary !/-/~, bitwise &/|, shifts <<,>>, C-precedence table), general POINTER ARITHMETIC scaling (p+n / n+p / p-n scale the int operand by the pointee size; p-q divides by the element size; consistent with a[i]), IF/ELSE control flow, FUNCTIONS with a real call stack + recursion (:func labels resolved by stage1), and STRUCTS (struct T{...} definitions in a struct table, sizeof(struct T), struct value + pointer locals/params/globals, . and -> member get/set including multi-link chains, &member, and linked-list traversal), and a HEAP (calloc/free lowered to a direct bl + a bump allocator over a large anonymous mmap arena appended once per used builtin: calloc returns distinct kernel-zeroed 8-byte-rounded blocks that persist, free is a no-op, a user definition overrides the builtin, mmap is used because qemu-user's brk region is small, and heap-allocated linked lists are built and traversed via struct-pointer-parameter helpers — the M2-Planet shape), and file I/O (open/read/write/close/exit lowered to a direct bl + a thin syscall wrapper appended once per used builtin: open is openat with AT_FDCWD, read/write/close/exit map to their syscalls, a user definition overrides the builtin, and a compiled program reads a source file and writes an output file on qemu's own filesystem — the compiler shape); struct field names live in the struct table and are never emitted as labels; if/while branches are numeric; word ldr/str byte-correct; and the single-pass @-target accounting invariant holds (every emitted line assembles to exactly 4 bytes, so the emitted-instruction counter stays equal to the true instruction count and a function's meaning does not depend on what was defined before it)."
          else
            echo "FAIL: run=$fail ldr/str=$ld_ok udiv=$udiv_ok struct=$struct_ok cf=$cf_ok rel=$rel_ok eq=$eq_ok ptr=$ptr_ok fn=$fn_ok div=$div_ok sm=$sm_ok heap=$heap_ok io=$io_ok lit=$lit_ok emit=$emit_ok fe=$fe_ok selfhost=$selfhost_ok sc=$sc_ok eor=$eor_ok goto=$goto_ok proto=$proto_ok braceless=$bl_ok esc=$esc_ok pp=$pp_ok lbl=$lbl_ok cap=$cap_ok cap23=$cap23_ok dowhile=$dw_ok for=$for_ok enum=$enum_ok wordtype=$wt_ok typenames=$tn_ok brk=$brk_ok ptrptr=$pp_ok argv=$av_ok sp=$sp_ok"; exit 1
          fi
