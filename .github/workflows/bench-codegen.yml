name: bench-codegen

# SPIKE (invariants suspended). WHERE IS THE 1000x GOING?
#
# Our stage2-built M1 processes ~50 input bytes/sec: 768 read syscalls in 15s,
# offset advancing, no loop. That is ~19ms per character, i.e. tens of millions
# of emulated instructions per byte. Two candidate layers:
#
#   (a) stage 2's CODEGEN -- the compiler we wrote emits pathological code
#   (b) the RUNTIME PATH  -- M2libc fgetc does one read(2) per byte, over our
#                            m53 syscall builtins, with M2libc's brk allocator
#                            (item 11) on top
#
# Same two sources, compiled by BOTH compilers, run under the same qemu:
#
#   stage 2      : src.c | stage2 | stage1 | stage0-as | elf   -> binary
#   our M2-Planet: src.c | M2-Planet | M1 | hex2               -> binary
#
# The second path is borrow-m2's recipe, already green, using UPSTREAM M1/hex2
# so this measurement does not depend on our M1 (slow) or our hex2 (SIGILLs on
# exit). If compute is comparable but I/O is not, it is (b). If both are slow,
# it is (a).

on:
  push:
    paths:
      - 'spikes/stage2-mini-c/**'
      - '.github/workflows/bench-codegen.yml'
  workflow_dispatch:

concurrency:
  group: bench-codegen-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bench:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    env:
      M2PLANET_SHA: 34fbd5c2a9b6eb634a4f6ad95158dcd1efcf19e0
    steps:
      - uses: actions/checkout@v5

      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            qemu-user binutils-aarch64-linux-gnu gcc make

      - name: Fetch upstreams
        run: |
          git clone https://github.com/oriansj/M2-Planet.git upstream-m2planet
          git -C upstream-m2planet checkout "$M2PLANET_SHA"
          git -C upstream-m2planet submodule update --init --recursive
          git clone --recursive https://github.com/oriansj/mescc-tools.git upstream-mescc

      - name: Build the ladder and our M2-Planet
        run: |
          aarch64-linux-gnu-as -o s0.o spikes/stage0-as/stage0-as.aarch64.s
          aarch64-linux-gnu-ld -static -o stage0-as s0.o
          aarch64-linux-gnu-as -o elf.o spikes/elf/elf.aarch64.s
          aarch64-linux-gnu-ld -static -o elf elf.o
          cat spikes/stage1-as/stage1-as.s0 \
            | qemu-aarch64 ./stage0-as | qemu-aarch64 ./elf stage1
          cat spikes/stage2-mini-c/stage2-mini-c.s1 \
            | qemu-aarch64 ./stage1 | qemu-aarch64 ./stage0-as | qemu-aarch64 ./elf stage2
          M=upstream-m2planet
          cat $M/M2libc/bootstrap.c $M/M2libc/bootstrappable.c \
              $M/cc.h $M/cc_globals.c $M/cc_reader.c $M/cc_strings.c \
              $M/cc_types.c $M/cc_emit.c $M/cc_core.c $M/cc_macro.c $M/cc.c > m2.c
          qemu-aarch64 ./stage2 < m2.c > m2.s1
          cat m2.s1 | qemu-aarch64 ./stage1 | qemu-aarch64 ./stage0-as | qemu-aarch64 ./elf M2-Planet
          # upstream M1/hex2 as ASSEMBLER+LINKER only -- this measurement must
          # not depend on our M1 (slow) or our hex2 (SIGILL on exit).
          make -C upstream-mescc M1 hex2

      - name: Write the two benchmarks
        run: |
          # 1. Pure compute: no syscalls in the loop at all.
          cat > compute.c <<'EOF'
          int main()
          {
          	int i;
          	int s;
          	s = 0;
          	i = 0;
          	while(i < 300000)
          	{
          		s = s + i;
          		i = i + 1;
          	}
          	return 0;
          }
          EOF
          # 2. I/O: one getchar-shaped read per byte, minimal work per byte.
          # No arrays at all in --bootstrap-mode, stack or global. M2-Planet's
          # own cc.c allocates every buffer with calloc(1, N); do the same.
          # stage 2 has a calloc builtin (m51); M2-Planet gets it from
          # M2libc/bootstrap.c.
          cat > io.c <<'EOF'
          int main()
          {
          	int n;
          	int r;
          	char* buf;
          	buf = calloc(8, 1);
          	n = 0;
          	r = read(0, buf, 1);
          	while(r > 0)
          	{
          		n = n + 1;
          		r = read(0, buf, 1);
          	}
          	return 0;
          }
          EOF
          head -c 20000 /dev/urandom | tr -dc 'a-z' > bench.dat || true
          head -c 20000 /dev/zero | tr '\0' 'x' > bench.dat
          echo "bench.dat: $(wc -c < bench.dat) bytes"

      - name: 'PROBE: what does our M2-Planet actually accept?'
        continue-on-error: true
        run: |
          # stage3-m2-demo's five samples used multiply, recursion, while,
          # char* indexing and for+break. No bitwise ops, no literal above 100,
          # everything on one line. compute.c segfaults it, so ladder up from
          # a known-good program and find the first construct that breaks.
          ok=0; bad=0
          try() {
            printf '%s' "$2" > v.c
            set +e
            timeout 60 qemu-aarch64 ./M2-Planet --architecture aarch64 \
              --bootstrap-mode -f v.c -o v.M1 </dev/null 2>v.err
            rc=$?
            set -e
            if [ "$rc" = 0 ]; then ok=$((ok+1)); printf '  [OK ] %s\n' "$1"
            else bad=$((bad+1)); printf '  [XX ] %-34s rc=%s %s\n' "$1" "$rc" "$(head -1 v.err)"
            fi
          }
          try 'baseline'            'int main(){return 42;}'
          try 'multi-line + tabs'   'int main()
          {
          	return 42;
          }'
          try 'while, small bound'  'int main(){int i;i=0;while(i<10){i=i+1;}return i;}'
          try 'literal 300000'      'int main(){int i;i=300000;return i;}'
          try 'while to 300000'     'int main(){int i;i=0;while(i<300000){i=i+1;}return 0;}'
          try 'bitwise and'         'int main(){int s;s=7;return s & 255;}'
          try 'bitwise or'          'int main(){int s;s=7;return s | 8;}'
          try 'shift'               'int main(){int s;s=7;return s << 2;}'
          try 'accumulate + and'    'int main(){int i;int s;s=0;i=0;while(i<10){s=s+i;i=i+1;}return s & 255;}'
          echo "  ok=$ok bad=$bad"

      - name: 'PROBE: compute.c through BOTH M2-Planets'
        continue-on-error: true
        run: |
          # The missing control. If upstream's gcc-built M2-Planet compiles the
          # same file and ours does not, the fault is in the binary OUR ladder
          # produced -- not in the source or the -f list.
          make -C upstream-m2planet M2-Planet
          both() {  # $1 = label, rest = -f arguments
            printf '  %-38s ' "$1"; shift
            set +e
            timeout 60 qemu-aarch64 ./M2-Planet --architecture aarch64 \
              --bootstrap-mode "$@" -o /tmp/o.M1 </dev/null 2>/tmp/e1; a=$?
            timeout 60 upstream-m2planet/bin/M2-Planet --architecture aarch64 \
              --bootstrap-mode "$@" -o /tmp/o2.M1 </dev/null 2>/tmp/e2; b=$?
            set -e
            printf 'ours=%-4s theirs=%-4s %s\n' "$a" "$b" "$(head -1 /tmp/e1)"
          }

          L=upstream-m2planet/M2libc
          both 'compute.c (the real file)' -f compute.c
          both 'io.c alone (calloc undef expected)' -f io.c

          # THE SUSPECT. aarch64/linux/bootstrap.c is the asm() file: six
          # functions written in M1 mnemonics. Stage 2 omitted it by design
          # (m71's one substitution), so our M2-Planet compiled cc_core.c's
          # asm() handling and has never once run it.
          both 'asm() file alone'      -f "$L/aarch64/linux/bootstrap.c"
          both 'M2libc bootstrap.c'    -f "$L/bootstrap.c"
          both 'asm() + bootstrap.c'   -f "$L/aarch64/linux/bootstrap.c" -f "$L/bootstrap.c"
          both 'asm() + bootstrap + io' -f "$L/aarch64/linux/bootstrap.c" -f "$L/bootstrap.c" -f io.c

          # A one-function reduction, if the file as a whole faults.
          printf 'int myexit(int value)\n{\n\tasm("mov_x0,x17" "sub_x0,x0,8" "ldr_x0,[x0]" "mov_x8,93" "svc_0");\n}\nint main(){myexit(3);return 0;}\n' > asmmin.c
          both 'minimal asm() reduction' -f asmmin.c

          # Narrow the difference from the passing variants: they were all
          # written without spaces around operators.
          printf '%s' 'int main(){int i;int s;s=0;i=0;while(i<300000){s=s+i;i=i+1;}return 0;}' > w1.c
          printf '%s' 'int main(){int i;int s;s = 0;i = 0;while(i < 300000){s = s + i;i = i + 1;}return 0;}' > w2.c
          printf 'int main()\n{\n\tint i;\n\ti = 0;\n\treturn 0;\n}\n' > w3.c
          printf 'int main()\n{\n\tint i;\n\tint s;\n\ts = 0;\n\ti = 0;\n\twhile(i < 10)\n\t{\n\t\ts = s + i;\n\t\ti = i + 1;\n\t}\n\treturn 0;\n}\n' > w4.c
          both 'one line, no spaces'        -f w1.c
          both 'one line, spaces round ops' -f w2.c
          both 'multiline, decl + assign'   -f w3.c
          both 'multiline, small loop'      -f w4.c

      - name: 'BISECT: where in M2libc/bootstrap.c do we segfault?'
        continue-on-error: true
        run: |
          # asm() is fine alone; bootstrap.c alone stops at line 55 on BOTH
          # compilers (read undefined). With the asm file in front, read
          # resolves and compilation runs the whole file -- and only ours dies.
          # Prefixes cut at top-level '}'. rc=1 is an expected diagnostic for a
          # truncated file (later symbols undefined); only rc=139 is the bug.
          L=upstream-m2planet/M2libc
          SRC=$L/bootstrap.c
          A=$L/aarch64/linux/bootstrap.c
          echo "bootstrap.c: $(wc -l < $SRC) lines"
          last=0
          for n in $(grep -n '^}' "$SRC" | cut -d: -f1); do
            head -n "$n" "$SRC" > body.c
            set +e
            timeout 60 qemu-aarch64 ./M2-Planet --architecture aarch64 \
              --bootstrap-mode -f "$A" -f body.c -o /tmp/b.M1 </dev/null 2>/dev/null
            a=$?
            timeout 60 upstream-m2planet/bin/M2-Planet --architecture aarch64 \
              --bootstrap-mode -f "$A" -f body.c -o /tmp/b2.M1 </dev/null 2>/dev/null
            b=$?
            set -e
            printf '  line %-4s ours=%-4s theirs=%s\n' "$n" "$a" "$b"
            if [ "$a" = 139 ]; then
              echo
              echo "=== FIRST SEGV -- the function at lines $((last+1))-$n ==="
              sed -n "$((last+1)),${n}p" "$SRC"
              exit 0
            fi
            last="$n"
          done
          echo "no prefix segfaulted; the fault needs the whole file"

      - name: Build each benchmark with BOTH compilers
        continue-on-error: true
        run: |
          L=upstream-m2planet/M2libc
          M1=upstream-mescc/bin/M1
          HEX2=upstream-mescc/bin/hex2

          by_stage2() {   # $1 = source, $2 = out
            qemu-aarch64 ./stage2 < "$1" > "$2.s1"
            cat "$2.s1" | qemu-aarch64 ./stage1 | qemu-aarch64 ./stage0-as \
              | qemu-aarch64 ./elf "$2"
          }
          by_m2planet() { # $1 = source, $2 = out, $3 = optional extra -f
            # --bootstrap-mode: the ONLY mode our M2-Planet has been exercised
            # in (it was built from the --bootstrap-mode -f list). Without it we
            # segfault, which is what the previous run hit.
            qemu-aarch64 ./M2-Planet --architecture aarch64 --bootstrap-mode \
              $3 -f "$1" -o "$2.M1"
            "$M1" -f "$L/aarch64/aarch64_defs.M1" -f "$L/aarch64/libc-core.M1" \
                  -f "$2.M1" --little-endian --architecture aarch64 -o "$2.hex2"
            "$HEX2" -f "$L/aarch64/ELF-aarch64.hex2" -f "$2.hex2" \
                    --little-endian --architecture aarch64 \
                    --base-address 0x400000 -o "$2"
          }

          by_stage2   compute.c compute_s2
          by_m2planet compute.c compute_m2
          by_stage2   io.c      io_s2
          # Order and file set taken from M2-Planet's own
          # test/test1000/hello-aarch64.sh: arch bootstrap.c, then bootstrap.c.
          by_m2planet io.c io_m2 "-f $L/aarch64/linux/bootstrap.c -f $L/bootstrap.c"
          ls -l compute_s2 compute_m2 io_s2 io_m2

      - name: Measure
        run: |
          bench() {  # $1 = label, $2 = binary
            set +e
            local start end rc
            start=$(date +%s%N)
            timeout 300 qemu-aarch64 "./$2" <bench.dat >/dev/null 2>&1
            rc=$?
            end=$(date +%s%N)
            set -e
            printf '  %-28s rc=%-4s %s ms\n' "$1" "$rc" "$(( (end-start)/1000000 ))"
          }
          echo "--- pure compute: 300k iterations, no syscalls ---"
          bench "compute / stage2"     compute_s2
          bench "compute / M2-Planet"  compute_m2
          echo "--- I/O: 20000 one-byte reads ---"
          bench "io / stage2"          io_s2
          bench "io / M2-Planet"       io_m2

          echo
          echo "READING THIS:"
          echo "  compute similar, io wildly different -> the runtime/syscall path"
          echo "  compute also wildly different        -> stage 2's codegen"
          echo "  both fast                            -> neither; the cost is"
          echo "    something M1 does per byte (allocation, or an O(n) scan)"

      - name: 'If compute is slow: count instructions per iteration'
        continue-on-error: true
        run: |
          # qemu can report the emitted TB count; a huge ratio here localises
          # the blowup to the loop body rather than to startup.
          for b in compute_s2 compute_m2; do
            echo "--- $b ---"
            set +e
            timeout 120 qemu-aarch64 -d nochain -D "$b.qlog" "./$b" >/dev/null 2>&1
            set -e
            echo "  trace lines: $(wc -l < "$b.qlog" 2>/dev/null || echo n/a)"
          done
