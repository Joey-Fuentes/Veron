name: qemu-mmap-probe

# SIDE PROBE (not a gate). Two diagnostics, run on the real CI host (qemu-user +
# aarch64), both isolated from the compiler ladder:
#   (A) stage0-as large-immediate encoding vs real `as`. mini-c emits integer
#       literals as a bare `mov x<d> <imm>`, but stage0-as encodes mov as a 16-bit
#       MOVZ (0xD2800000|(imm<<5)|d); for imm >= 2^16 the immediate overflows into
#       the shift/opcode bits -> a corrupt instruction. The Python bench hides this
#       (its interp keeps the full value in the decoded op), so we byte-compare the
#       real stage0-as against `as`. This is the actual cause of the 256KB SIGSEGV.
#   (B) qemu-user brk/mmap behaviour, as raw hand-written syscalls: what brk(0)
#       returns, how far brk grows, and whether an anonymous mmap of 64KB..256MB is
#       actually writable at its far end. Establishes that qemu/mmap are innocent.
# Each brk/mmap probe reports via exit code (so a SIGSEGV is visible as 139):
#   42  -> OK: far end of the region is writable
#   201 -> mmap returned an error (errno in [-4095,-1])
#   202 -> brk was capped (returned break < requested)
#   139 -> SIGSEGV: syscall "succeeded" but the far end was not backed
# This never gates the build; read the log to see exactly what happens.

on:
  push:
    paths:
      - '.github/workflows/qemu-mmap-probe.yml'
  workflow_dispatch:

concurrency:
  group: qemu-mmap-probe-${{ github.ref }}
  cancel-in-progress: true

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v5
      - name: Install toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends qemu-user binutils-aarch64-linux-gnu
      - name: qemu-aarch64 version
        run: qemu-aarch64 --version || true
      - name: Probe stage0-as large-immediate encoding vs as (the real culprit)
        run: |
          # mini-c emits integer literals as a bare `mov x<d> <imm>`, but stage0-as
          # encodes mov as 0xD2800000|(imm<<5)|d — a 16-bit MOVZ. For imm >= 2^16 the
          # immediate overflows the field -> a corrupt instruction on real hardware.
          # The Python bench hides this (its interp carries the full value in the
          # decoded op), so this byte-compares stage0-as against real `as` directly.
          aarch64-linux-gnu-as -o s0.o spikes/stage0-as/stage0-as.aarch64.s
          aarch64-linux-gnu-ld -static -o stage0-as s0.o
          enc() {   # $1=stage0-as syntax  $2=as syntax  $3=label
            printf '%s\n' "$1" | qemu-aarch64 ./stage0-as > ours.bin 2>/dev/null || true
            printf '.text\n.global _start\n_start:\n\t%s\n' "$2" > r.s
            aarch64-linux-gnu-as -o r.o r.s
            aarch64-linux-gnu-objcopy -O binary --only-section=.text r.o r.bin
            o=$(od -An -v -tx1 ours.bin | tr -d ' \n'); r=$(od -An -v -tx1 r.bin | tr -d ' \n')
            [ "$o" = "$r" ] && st=MATCH || st=DIFFER
            printf '  %-26s ours=%-18s ref=%-18s %s\n' "$3" "${o:-<empty>}" "$r" "$st"
          }
          echo "== stage0-as vs as: mov/movk immediate encoding =="
          enc 'mov x0 255'        'mov x0, #255'            'mov 255 (8b)'
          enc 'mov x0 65535'      'mov x0, #65535'          'mov 65535 (16b fits)'
          enc 'mov x0 65536'      'mov x0, #65536'          'mov 65536 (>16b)'
          enc 'mov x0 262143'     'mov x0, #262143'         'mov 262143 (the index)'
          enc 'mov x0 262144'     'mov x0, #262144'         'mov 262144 (the count)'
          enc 'movk x1 4096 16'   'movk x1, #4096, lsl #16' 'movk 4096<<16 (arena)'
          echo "  (mov values >= 65536 that DIFFER are the bug: a single 16-bit MOVZ"
          echo "   cannot hold them; the compiler must emit movz+movk instead.)"
          echo
      - name: Probe brk / mmap
        run: |
          build() { aarch64-linux-gnu-as -o p.o "$1" && aarch64-linux-gnu-ld -static -o "$2" p.o; }
          run() {   # $1=label  $2=binary
            set +e; qemu-aarch64 "./$2" >run.out 2>run.err; rc=$?; set -e
            case $rc in
              42)  msg="OK  (far end writable)";;
              201) msg="mmap FAILED (errno returned)";;
              202) msg="brk CAPPED (break < requested)";;
              139) msg="SIGSEGV (far end NOT backed)";;
              *)   msg="rc=$rc";;
            esac
            printf '  %-26s rc=%-4s %s\n' "$1" "$rc" "$msg"
            [ -s run.out ] && sed 's/^/      out: /' run.out || true
          }

          # ---------- 1) REPORT raw values (hex), no risky writes ----------
          cat > report.s <<'EOF'
          .text
          .global _start
          _start:
              mov  x0,#0
              mov  x8,#214
              svc  #0                 // brk(0) -> base
              mov  x19,x0
              bl   phex               // print base
              movz x1,#4096, lsl #16  // +256MB
              add  x0,x19,x1
              mov  x8,#214
              svc  #0                 // brk(base+256MB) -> returned break
              bl   phex
              mov  x0,#0
              movz x1,#4096, lsl #16  // mmap 256MB
              mov  x2,#3
              mov  x3,#0x22
              mov  x4,#-1
              mov  x5,#0
              mov  x8,#222
              svc  #0
              bl   phex               // print mmap(256MB) return
              mov  x0,#0
              movz x1,#4, lsl #16     // mmap 256KB
              mov  x2,#3
              mov  x3,#0x22
              mov  x4,#-1
              mov  x5,#0
              mov  x8,#222
              svc  #0
              bl   phex               // print mmap(256KB) return
              mov  x0,#0
              mov  x8,#93
              svc  #0
          phex:                       // print x0 as 16 hex digits + newline to fd 1
              sub  sp,sp,#32
              mov  x3,x0
              add  x4,sp,#16
              mov  w5,#10
              strb w5,[x4]            // newline at buf[16]
              mov  x6,#16
          1:  and  x7,x3,#0xf
              cmp  x7,#10
              b.lo 2f
              add  x7,x7,#87          // 'a'-10
              b    3f
          2:  add  x7,x7,#48          // '0'
          3:  sub  x4,x4,#1
              strb w7,[x4]
              lsr  x3,x3,#4
              subs x6,x6,#1
              b.ne 1b
              mov  x0,#1
              mov  x1,sp
              mov  x2,#17
              mov  x8,#64
              svc  #0
              add  sp,sp,#32
              ret
          EOF
          build report.s report
          echo "== raw values (16 hex each): brk_base | brk(base+256MB) | mmap(256MB) | mmap(256KB) =="
          qemu-aarch64 ./report || echo "  (report trapped rc=$?)"
          echo

          # ---------- 2) mmap far-end writability, per size ----------
          # SIZE = M << 16. M: 1=64KB 4=256KB 16=1MB 256=16MB 4096=256MB
          mmap_probe() {  # $1=M  $2=human
            cat > m.s <<EOF
          .text
          .global _start
          _start:
              mov  x0,#0
              movz x1,#$1, lsl #16
              mov  x2,#3
              mov  x3,#0x22
              mov  x4,#-1
              mov  x5,#0
              mov  x8,#222
              svc  #0
              movn x9,#4095            // x9 = -4096
              cmp  x0,x9
              b.hs .Lfail              // x0 in [-4096,-1] => mmap error
              movz x1,#$1, lsl #16
              sub  x1,x1,#1
              add  x1,x0,x1            // base + SIZE - 1
              mov  w2,#42
              strb w2,[x1]            // faults here if not backed
              ldrb w0,[x1]
              b    .Lexit
          .Lfail:
              mov  x0,#201
          .Lexit:
              mov  x8,#93
              svc  #0
          EOF
            build m.s "mm_$1"; run "mmap $2" "mm_$1"
          }
          echo "== mmap(anon) far-end write, per size =="
          mmap_probe 1    64KB
          mmap_probe 4    256KB
          mmap_probe 16   1MB
          mmap_probe 256  16MB
          mmap_probe 4096 256MB
          echo

          # ---------- 3) brk far-end writability, per size ----------
          brk_probe() {  # $1=M  $2=human
            cat > b.s <<EOF
          .text
          .global _start
          _start:
              mov  x0,#0
              mov  x8,#214
              svc  #0                 // brk(0) -> base
              mov  x10,x0
              movz x1,#$1, lsl #16
              add  x0,x10,x1
              mov  x11,x0             // requested = base+SIZE
              mov  x8,#214
              svc  #0                 // brk(requested) -> returned
              cmp  x0,x11
              b.lo .Lcap              // returned < requested => capped
              movz x1,#$1, lsl #16
              sub  x1,x1,#8
              add  x1,x10,x1          // base + SIZE - 8
              mov  x2,#42
              str  x2,[x1]           // faults here if not backed
              ldr  x0,[x1]
              b    .Lexit
          .Lcap:
              mov  x0,#202
          .Lexit:
              mov  x8,#93
              svc  #0
          EOF
            build b.s "bk_$1"; run "brk  $2" "bk_$1"
          }
          echo "== brk far-end write, per size =="
          brk_probe 1    64KB
          brk_probe 4    256KB
          brk_probe 16   1MB
          brk_probe 256  16MB
          brk_probe 4096 256MB
          echo

          # ---------- 4) our compiled-program ORDER: prologue brk(+64KB) then mmap ----------
          # Reproduces what an emitted program does: brk a 64KB stack region, THEN mmap
          # the heap arena and write far into it. $1=arena M(<<16), $2=far offset M(<<16).
          order_probe() {  # $1=arenaM  $2=farM  $3=human
            cat > o.s <<EOF
          .text
          .global _start
          _start:
              mov  x0,#0
              mov  x8,#214
              svc  #0                 // brk(0)
              mov  x19,x0
              movz x1,#1, lsl #16     // +64KB for stacks (like smainpre)
              add  x0,x19,x1
              mov  x8,#214
              svc  #0                 // brk(base+64KB)
              mov  x0,#0
              movz x1,#$1, lsl #16    // mmap arena
              mov  x2,#3
              mov  x3,#0x22
              mov  x4,#-1
              mov  x5,#0
              mov  x8,#222
              svc  #0
              movn x9,#4095
              cmp  x0,x9
              b.hs .Lfail
              movz x1,#$2, lsl #16    // far offset
              sub  x1,x1,#1
              add  x1,x0,x1           // arena + far - 1
              mov  w2,#42
              strb w2,[x1]
              ldrb w0,[x1]
              b    .Lexit
          .Lfail:
              mov  x0,#201
          .Lexit:
              mov  x8,#93
              svc  #0
          EOF
            build o.s "or_$3"; run "order arena256MB far=$3" "or_$3"
          }
          echo "== compiled-program order: brk(+64KB) then mmap(256MB), far write at N =="
          order_probe 4096 4    256KB   # write 256KB into the arena
          order_probe 4096 16   1MB
          order_probe 4096 1024 64MB
          order_probe 4096 3200 200MB
          echo

          echo "Probe complete (informational; build not gated on results)."
